name: Security Audit

on:
  push:
    paths:
      - 'Cargo.lock'
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
