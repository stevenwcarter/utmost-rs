ne":0}},{"line":240,"address":[],"length":0,"stats":{"Line":0}},{"line":241,"address":[],"length":0,"stats":{"Line":0}},{"line":254,"address":[],"length":0,"stats":{"Line":0}},{"line":255,"address":[],"length":0,"stats":{"Line":0}},{"line":256,"address":[],"length":0,"stats":{"Line":0}},{"line":258,"address":[],"length":0,"stats":{"Line":0}},{"line":260,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":109},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","engine","mov.rs"],"content":"use std::cmp;\n\nuse crate::{\n    SearchSpec,\n    types::{Endianness, bytes_to_u32},\n};\n\n/// Validate MOV/QuickTime file structure to reduce false positives\n/// Performs comprehensive validation of QuickTime atom structure\npub fn validate_mov_file(data: \u0026[u8]) -\u003e bool {\n    // MOV files are structured as atoms (also called boxes)\n    // Each atom has: [4 bytes size][4 bytes type][data]\n\n    // We need at least 8 bytes for a minimal atom\n    if data.len() \u003c 8 {\n        return false;\n    }\n\n    // Find the first atom that looks like it should contain a \"moov\" atom\n    // The search might start with different atoms, so we need to validate the structure\n    if let Some(moov_pos) = find_moov_atom(data) {\n        // Validate the moov atom structure\n        validate_moov_atom(\u0026data[moov_pos..])\n    } else {\n        // If we can't find a moov atom, this might not be a valid MOV file\n        false\n    }\n}\n\n/// Find the position of the \"moov\" atom in the data\nfn find_moov_atom(data: \u0026[u8]) -\u003e Option\u003cusize\u003e {\n    let mut pos = 0;\n\n    // The \"moov\" might be the first atom or preceded by other atoms\n    while pos + 8 \u003c= data.len() {\n        // Check if we found \"moov\" at current position\n        if \u0026data[pos..pos + 4] == b\"moov\" {\n            // This might be the type field, so the atom starts 4 bytes earlier\n            if pos \u003e= 4 {\n                return Some(pos - 4);\n            }\n        }\n\n        // Check if current position is start of an atom with \"moov\" type\n        if pos + 8 \u003c= data.len() {\n            let atom_size = bytes_to_u32(\u0026data[pos..pos + 4], Endianness::Big) as usize;\n            let atom_type = \u0026data[pos + 4..pos + 8];\n\n            if atom_type == b\"moov\" {\n                return Some(pos);\n            }\n\n            // If this is a valid atom, skip to the next one\n            if is_valid_atom_type(atom_type) \u0026\u0026 atom_size \u003e= 8 \u0026\u0026 atom_size \u003c= data.len() - pos {\n                pos += atom_size;\n            } else {\n                pos += 1; // Not a valid atom, try next byte\n            }\n        } else {\n            pos += 1;\n        }\n    }\n\n    None\n}\n\n/// Validate the structure of a moov atom\nfn validate_moov_atom(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 8 {\n        return false;\n    }\n\n    let atom_size = bytes_to_u32(\u0026data[0..4], Endianness::Big) as usize;\n    let atom_type = \u0026data[4..8];\n\n    // Verify this is actually a moov atom\n    if atom_type != b\"moov\" {\n        return false;\n    }\n\n    // Atom size should be reasonable\n    if atom_size \u003c 8 || atom_size \u003e data.len() {\n        return false;\n    }\n\n    // Parse child atoms within the moov atom\n    let mut pos = 8; // Skip atom header\n    let end_pos = cmp::min(atom_size, data.len());\n    let mut found_mvhd = false;\n    let mut found_trak = false;\n\n    while pos + 8 \u003c= end_pos {\n        if pos + 4 \u003e data.len() {\n            break;\n        }\n\n        let child_size = bytes_to_u32(\u0026data[pos..pos + 4], Endianness::Big) as usize;\n        if pos + 8 \u003e data.len() {\n            break;\n        }\n        let child_type = \u0026data[pos + 4..pos + 8];\n\n        // Validate child atom size\n        if child_size \u003c 8 || pos + child_size \u003e end_pos {\n            return false;\n        }\n\n        match child_type {\n            b\"mvhd\" =\u003e {\n                // Movie header atom - validate its structure\n                if !validate_mvhd_atom(\u0026data[pos..pos + child_size]) {\n                    return false;\n                }\n                found_mvhd = true;\n            }\n            b\"trak\" =\u003e {\n                // Track atom - validate its structure\n                if !validate_trak_atom(\u0026data[pos..pos + child_size]) {\n                    return false;\n                }\n                found_trak = true;\n            }\n            b\"udta\" | b\"meta\" | b\"iods\" =\u003e {\n                // Valid optional atoms, just check they're properly formed\n                if !is_valid_atom_structure(\u0026data[pos..pos + child_size]) {\n                    return false;\n                }\n            }\n            _ =\u003e {\n                // Unknown atom type - check if it looks like a valid atom\n                if !is_valid_atom_type(child_type) {\n                    return false;\n                }\n            }\n        }\n\n        pos += child_size;\n    }\n\n    // A valid moov atom should have at least mvhd and one trak\n    found_mvhd \u0026\u0026 found_trak\n}\n\n/// Validate movie header (mvhd) atom structure\nfn validate_mvhd_atom(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 16 {\n        return false;\n    }\n\n    let atom_size = bytes_to_u32(\u0026data[0..4], Endianness::Big) as usize;\n    let atom_type = \u0026data[4..8];\n\n    if atom_type != b\"mvhd\" || atom_size \u003c 108 {\n        return false;\n    }\n\n    // Check version field (should be 0 or 1)\n    let version = data[8];\n    if version \u003e 1 {\n        return false;\n    }\n\n    // Flags should be reasonable (3 bytes, usually 0)\n    // Skip detailed flag validation for now\n\n    // Check creation and modification times (should be reasonable)\n    let creation_time = bytes_to_u32(\u0026data[12..16], Endianness::Big);\n    let modification_time = bytes_to_u32(\u0026data[16..20], Endianness::Big);\n\n    // Times should be reasonable (not way in the future or way in the past)\n    // QuickTime epoch is 1904, so times should be \u003e 0 and \u003c some reasonable future date\n    if creation_time == 0 \u0026\u0026 modification_time == 0 {\n        return false; // Both times being 0 is suspicious\n    }\n\n    // Time scale should be reasonable (samples per second)\n    let time_scale = bytes_to_u32(\u0026data[20..24], Endianness::Big);\n    if time_scale == 0 || time_scale \u003e 1_000_000 {\n        return false;\n    }\n\n    // Duration can be 0 for live streams, so don't validate too strictly\n    let _duration = bytes_to_u32(\u0026data[24..28], Endianness::Big);\n\n    true\n}\n\n/// Validate track (trak) atom structure  \nfn validate_trak_atom(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 16 {\n        return false;\n    }\n\n    let atom_size = bytes_to_u32(\u0026data[0..4], Endianness::Big) as usize;\n    let atom_type = \u0026data[4..8];\n\n    if atom_type != b\"trak\" || atom_size \u003c 16 {\n        return false;\n    }\n\n    // Parse child atoms within the trak atom\n    let mut pos = 8; // Skip atom header\n    let end_pos = cmp::min(atom_size, data.len());\n    let mut found_tkhd = false;\n    let mut found_mdia = false;\n\n    while pos + 8 \u003c= end_pos {\n        if pos + 4 \u003e data.len() {\n            break;\n        }\n\n        let child_size = bytes_to_u32(\u0026data[pos..pos + 4], Endianness::Big) as usize;\n        if child_size \u003c 8 || pos + child_size \u003e end_pos || pos + 8 \u003e data.len() {\n            return false;\n        }\n\n        let child_type = \u0026data[pos + 4..pos + 8];\n\n        match child_type {\n            b\"tkhd\" =\u003e {\n                // Track header - basic validation\n                if child_size \u003c 32 {\n                    return false;\n                }\n                found_tkhd = true;\n            }\n            b\"mdia\" =\u003e {\n                // Media atom - should contain mdhd, hdlr, minf\n                found_mdia = true;\n            }\n            b\"edts\" | b\"tref\" | b\"load\" | b\"imap\" | b\"udta\" =\u003e {\n                // Valid optional track atoms\n            }\n            _ =\u003e {\n                // Unknown atom type\n                if !is_valid_atom_type(child_type) {\n                    return false;\n                }\n            }\n        }\n\n        pos += child_size;\n    }\n\n    // A valid trak should have both tkhd and mdia\n    found_tkhd \u0026\u0026 found_mdia\n}\n\n/// Check if an atom type consists of valid characters\nfn is_valid_atom_type(atom_type: \u0026[u8]) -\u003e bool {\n    if atom_type.len() != 4 {\n        return false;\n    }\n\n    // Atom types should be printable ASCII or specific control characters\n    for \u0026byte in atom_type {\n        match byte {\n            // Common valid atom type characters\n            b'a'..=b'z'\n            | b'A'..=b'Z'\n            | b'0'..=b'9'\n            | b' '\n            | b'.'\n            | b'-'\n            | b'_'\n            | b'('\n            | b')'\n            | 0xA9 =\u003e {} // Copyright symbol used in some atoms\n            _ =\u003e return false,\n        }\n    }\n\n    true\n}\n\n/// Basic validation that an atom has a valid structure\nfn is_valid_atom_structure(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 8 {\n        return false;\n    }\n\n    let atom_size = bytes_to_u32(\u0026data[0..4], Endianness::Big) as usize;\n    let atom_type = \u0026data[4..8];\n\n    // Size should match actual data length and be reasonable\n    atom_size \u003e= 8 \u0026\u0026 atom_size \u003c= data.len() \u0026\u0026 is_valid_atom_type(atom_type)\n}\n\n/// Determine MOV file size using heuristics\npub fn mov_file_size_heuristic(spec: \u0026SearchSpec, buf: \u0026[u8]) -\u003e usize {\n    // For MOV files, we can try to parse the atom structure to determine the actual size\n    if let Some(file_size) = determine_mov_file_size_from_atoms(buf) {\n        cmp::min(file_size, spec.max_len)\n    } else {\n        // Fallback to conservative estimate\n        cmp::min(spec.max_len, buf.len())\n    }\n}\n\n/// Determine MOV file size by parsing atom structure\nfn determine_mov_file_size_from_atoms(data: \u0026[u8]) -\u003e Option\u003cusize\u003e {\n    let mut pos = 0;\n    let mut total_size = 0;\n\n    // Parse atoms to find the total file size\n    while pos + 8 \u003c= data.len() {\n        let atom_size = bytes_to_u32(\u0026data[pos..pos + 4], Endianness::Big) as usize;\n        let atom_type = \u0026data[pos + 4..pos + 8];\n\n        if atom_size \u003c 8 {\n            break; // Invalid atom\n        }\n\n        if !is_valid_atom_type(atom_type) {\n            break; // Invalid atom type\n        }\n\n        total_size = pos + atom_size;\n\n        // If this atom extends beyond our buffer, use the buffer size\n        if pos + atom_size \u003e data.len() {\n            return Some(data.len());\n        }\n\n        pos += atom_size;\n\n        // If we've parsed all the way to the end, we have the file size\n        if pos \u003e= data.len() {\n            return Some(total_size);\n        }\n    }\n\n    if total_size \u003e 0 {\n        Some(total_size)\n    } else {\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::types::{FileType, SearchSpec, SearchType};\n\n    fn create_valid_mov_header() -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n\n        // Create a simple moov atom with mvhd and trak\n        let mvhd_data = create_mvhd_atom();\n        let trak_data = create_trak_atom();\n\n        // Calculate moov atom size\n        let moov_size = 8 + mvhd_data.len() + trak_data.len();\n\n        // moov atom header\n        data.extend_from_slice(\u0026(moov_size as u32).to_be_bytes());\n        data.extend_from_slice(b\"moov\");\n\n        // Add child atoms\n        data.extend_from_slice(\u0026mvhd_data);\n        data.extend_from_slice(\u0026trak_data);\n\n        data\n    }\n\n    fn create_mvhd_atom() -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n\n        // mvhd atom (108 bytes minimum)\n        data.extend_from_slice(\u0026108u32.to_be_bytes()); // size\n        data.extend_from_slice(b\"mvhd\"); // type\n        data.push(0); // version\n        data.extend_from_slice(\u0026[0, 0, 0]); // flags\n        data.extend_from_slice(\u0026123456u32.to_be_bytes()); // creation_time\n        data.extend_from_slice(\u0026123457u32.to_be_bytes()); // modification_time\n        data.extend_from_slice(\u00261000u32.to_be_bytes()); // time_scale\n        data.extend_from_slice(\u002630000u32.to_be_bytes()); // duration\n\n        // Fill the rest with reasonable values\n        data.extend_from_slice(\u0026[0x00, 0x01, 0x00, 0x00]); // preferred_rate\n        data.extend_from_slice(\u0026[0x01, 0x00]); // preferred_volume\n        data.extend_from_slice(\u0026[0; 10]); // reserved\n\n        // Matrix (36 bytes)\n        data.extend_from_slice(\u0026[0x00, 0x01, 0x00, 0x00]); // matrix[0]\n        data.extend_from_slice(\u0026[0; 32]); // rest of matrix\n\n        // Preview and poster times\n        data.extend_from_slice(\u0026[0; 16]);\n\n        // Selection and current times\n        data.extend_from_slice(\u0026[0; 8]);\n\n        // Next track ID\n        data.extend_from_slice(\u00262u32.to_be_bytes());\n\n        data\n    }\n\n    fn create_trak_atom() -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n\n        // Create tkhd and mdia atoms\n        let tkhd_data = create_tkhd_atom();\n        let mdia_data = create_mdia_atom();\n\n        // Calculate trak atom size\n        let trak_size = 8 + tkhd_data.len() + mdia_data.len();\n\n        // trak atom header\n        data.extend_from_slice(\u0026(trak_size as u32).to_be_bytes());\n        data.extend_from_slice(b\"trak\");\n\n        // Add child atoms\n        data.extend_from_slice(\u0026tkhd_data);\n        data.extend_from_slice(\u0026mdia_data);\n\n        data\n    }\n\n    fn create_tkhd_atom() -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n\n        // tkhd atom (92 bytes)\n        data.extend_from_slice(\u002692u32.to_be_bytes()); // size\n        data.extend_from_slice(b\"tkhd\"); // type\n        data.push(0); // version\n        data.extend_from_slice(\u0026[0, 0, 1]); // flags (track enabled)\n\n        // Fill with minimal valid data\n        data.extend_from_slice(\u0026[0; 80]); // Track header data\n\n        data\n    }\n\n    fn create_mdia_atom() -\u003e Vec\u003cu8\u003e {\n        let mut data = Vec::new();\n\n        // Simple mdia atom (just header for testing)\n        data.extend_from_slice(\u002616u32.to_be_bytes()); // size\n        data.extend_from_slice(b\"mdia\"); // type\n        data.extend_from_slice(\u0026[0; 8]); // minimal content\n\n        data\n    }\n\n    #[test]\n    fn test_validate_mov_file_valid() {\n        let valid_mov = create_valid_mov_header();\n        assert!(validate_mov_file(\u0026valid_mov));\n    }\n\n    #[test]\n    fn test_validate_mov_file_too_small() {\n        let small_data = vec![b'm', b'o', b'o', b'v']; // Only 4 bytes\n        assert!(!validate_mov_file(\u0026small_data));\n    }\n\n    #[test]\n    fn test_validate_mov_file_no_moov() {\n        let invalid_data = vec![\n            0x00, 0x00, 0x00, 0x10, // size\n            b'f', b'r', b'e', b'e', // type (not moov)\n            0x00, 0x00, 0x00, 0x00, // data\n            0x00, 0x00, 0x00, 0x00,\n        ];\n        assert!(!validate_mov_file(\u0026invalid_data));\n    }\n\n    #[test]\n    fn test_find_moov_atom() {\n        let data_with_moov = create_valid_mov_header();\n        assert_eq!(find_moov_atom(\u0026data_with_moov), Some(0));\n\n        // Test with moov not at the beginning\n        let mut data_with_prefix = vec![\n            0x00, 0x00, 0x00, 0x08, // free atom\n            b'f', b'r', b'e', b'e',\n        ];\n        data_with_prefix.extend_from_slice(\u0026data_with_moov);\n\n        assert_eq!(find_moov_atom(\u0026data_with_prefix), Some(8));\n    }\n\n    #[test]\n    fn test_validate_mvhd_atom() {\n        let mvhd_data = create_mvhd_atom();\n        assert!(validate_mvhd_atom(\u0026mvhd_data));\n\n        // Test with invalid version\n        let mut invalid_mvhd = mvhd_data.clone();\n        invalid_mvhd[8] = 5; // Invalid version\n        assert!(!validate_mvhd_atom(\u0026invalid_mvhd));\n\n        // Test with zero time scale\n        let mut invalid_mvhd2 = mvhd_data.clone();\n        invalid_mvhd2[20..24].copy_from_slice(\u00260u32.to_be_bytes());\n        assert!(!validate_mvhd_atom(\u0026invalid_mvhd2));\n    }\n\n    #[test]\n    fn test_validate_trak_atom() {\n        let trak_data = create_trak_atom();\n        assert!(validate_trak_atom(\u0026trak_data));\n    }\n\n    #[test]\n    fn test_is_valid_atom_type() {\n        assert!(is_valid_atom_type(b\"moov\"));\n        assert!(is_valid_atom_type(b\"mvhd\"));\n        assert!(is_valid_atom_type(b\"trak\"));\n        assert!(is_valid_atom_type(b\"free\"));\n        assert!(is_valid_atom_type(b\"(c) \"));\n\n        assert!(!is_valid_atom_type(b\"\\x00\\x00\\x00\\x00\"));\n        assert!(!is_valid_atom_type(b\"\\xFF\\xFF\\xFF\\xFF\"));\n        assert!(!is_valid_atom_type(b\"abc\")); // Wrong length\n    }\n\n    #[test]\n    fn test_mov_file_size_heuristic() {\n        let spec = SearchSpec::new(\n            FileType::Mov,\n            \"mov\",\n            b\"moov\",\n            None,\n            40 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let mov_data = create_valid_mov_header();\n        let size = mov_file_size_heuristic(\u0026spec, \u0026mov_data);\n        assert_eq!(size, mov_data.len());\n    }\n\n    #[test]\n    fn test_determine_mov_file_size_from_atoms() {\n        let mov_data = create_valid_mov_header();\n        let size = determine_mov_file_size_from_atoms(\u0026mov_data);\n        assert_eq!(size, Some(mov_data.len()));\n\n        // Test with invalid data\n        let invalid_data = vec![0x00, 0x00, 0x00, 0x04]; // Size too small\n        assert_eq!(determine_mov_file_size_from_atoms(\u0026invalid_data), None);\n    }\n}\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78," eturn false;\n    }\n\n    true\n}\n\n/// Validate MPEG-1 pack header structure\nfn validate_mpeg1_pack_header(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 12 {\n        return false;\n    }\n\n    // MPEG-1 pack header format:\n    // Bytes 0-3: 00 00 01 BA (already checked)\n    // Byte 4: '0010' + SCR[32:30] + marker bit\n    // Bytes 5-8: SCR and mux_rate\n    // Bytes 9-11: mux_rate continued\n\n    // Check marker bits in MPEG-1 format\n    // Byte 4: should have '0010' in upper 4 bits\n    if (data[4] \u0026 0xF0) != 0x20 {\n        return false;\n    }\n\n    // Check marker bit in byte 4 (bit 0)\n    if (data[4] \u0026 0x01) != 0x01 {\n        return false;\n    }\n\n    // Check marker bit in byte 6 (bit 0)\n    if data.len() \u003e 6 \u0026\u0026 (data[6] \u0026 0x01) != 0x01 {\n        return false;\n    }\n\n    // Check marker bit in byte 8 (bit 0)\n    if data.len() \u003e 8 \u0026\u0026 (data[8] \u0026 0x01) != 0x01 {\n        return false;\n    }\n\n    true\n}\n\n/// Validate MPEG-2 pack header structure\nfn validate_mpeg2_pack_header(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 14 {\n        return false;\n    }\n\n    // MPEG-2 pack header format:\n    // Bytes 0-3: 00 00 01 BA (already checked)\n    // Byte 4: '01' + SCR[32:30] + marker bit\n    // Bytes 5-9: SCR fields with marker bits\n    // Bytes 10-12: program_mux_rate\n    // Byte 13: pack_stuffing_length\n\n    // Check MPEG-2 identifier in byte 4 (top 2 bits = '01')\n    if (data[4] \u0026 0xC0) != 0x40 {\n        return false;\n    }\n\n    // Pack stuffing length should be reasonable (0-7)\n    let stuffing_length = data[13] \u0026 0x07;\n\n    // If there's stuffing, the stuffing bytes should be 0xFF\n    if stuffing_length \u003e 0 {\n        let total_header_size = 14 + stuffing_length as usize;\n        if data.len() \u003e= total_header_size {\n            // Check stuffing bytes are all 0xFF\n            for \u0026byte in \u0026data[14..14 + stuffing_length as usize] {\n                if byte != 0xFF {\n                    return false;\n                }\n            }\n        }\n    }\n\n    true\n}\n\n/// Check if the data contains valid MPEG stream structure beyond the pack header\nfn has_valid_mpeg_stream_structure(data: \u0026[u8]) -\u003e bool {\n    let mut pos = 4; // Start after pack start code\n    let mut found_valid_streams = 0;\n\n    // Look for additional MPEG start codes within the first few KB\n    let search_limit = cmp::min(data.len(), 4096);\n\n    while pos \u003c search_limit - 4 {\n        // Look for start code pattern: 00 00 01 XX\n        if data[pos] == 0x00 \u0026\u0026 data[pos + 1] == 0x00 \u0026\u0026 data[pos + 2] == 0x01 {\n            let stream_id = data[pos + 3];\n\n            match stream_id {\n                // Valid MPEG stream IDs\n                0xB9 =\u003e {\n                    // MPEG_program_end_code\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xBA =\u003e {\n                    // pack_start_code\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xBB =\u003e {\n                    // system_header_start_code\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xBC =\u003e {\n                    // program_stream_map\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xBD =\u003e {\n                    // private_stream_1\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xBE =\u003e {\n                    // padding_stream\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xBF =\u003e {\n                    // private_stream_2\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xC0..=0xDF =\u003e {\n                    // audio stream\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                0xE0..=0xEF =\u003e {\n                    // video stream\n                    found_valid_streams += 1;\n                    pos += 4;\n                }\n                _ =\u003e {\n                    pos += 1; // Not a valid stream ID, keep searching\n                }\n            }\n\n            // If we found at least 1 valid stream, consider it valid for shorter data\n            if found_valid_streams \u003e= 1 {\n                return true;\n            }\n        } else {\n            pos += 1;\n        }\n    }\n\n    // For pack start code only, consider it valid if it's at the beginning\n    // since this might be a very short MPEG file or just the beginning\n    if data.len() \u003e= 4 \u0026\u0026 data[0] == 0x00 \u0026\u0026 data[1] == 0x00 \u0026\u0026 data[2] == 0x01 \u0026\u0026 data[3] == 0xBA {\n        return true;\n    }\n\n    false\n}\n\n/// Determine MPG file size using heuristics\npub fn mpg_file_size_heuristic(spec: \u0026SearchSpec, buf: \u0026[u8]) -\u003e usize {\n    // For MPEG files, we need to find the end of stream marker (00 00 01 B9)\n    // or use the maximum length as fallback\n\n    if let Some(end_pos) = find_mpeg_end_marker(buf) {\n        // Add 4 bytes for the end marker itself\n        cmp::min(end_pos + 4, spec.max_len)\n    } else {\n        // No end marker found, use conservative estimate or max length\n        cmp::min(spec.max_len, buf.len())\n    }\n}\n\n/// Find MPEG program end code (00 00 01 B9)\nfn find_mpeg_end_marker(data: \u0026[u8]) -\u003e Option\u003cusize\u003e {\n    if data.len() \u003c 4 {\n        return None;\n    }\n\n    (0..=data.len() - 4).find(|\u0026i| {\n        data[i] == 0x00 \u0026\u0026 data[i + 1] == 0x00 \u0026\u0026 data[i + 2] == 0x01 \u0026\u0026 data[i + 3] == 0xB9\n    })\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::types::{FileType, SearchSpec, SearchType};\n\n    fn create_valid_mpeg1_header() -\u003e Vec\u003cu8\u003e {\n        vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start code\n            0x21, // '0010' + SCR bits + marker\n            0x00, 0x01, // SCR + marker\n            0x80, 0x01, // SCR + marker\n            0x00, 0x01, // mux_rate + marker\n            0x00, // mux_rate continued\n            // Additional data to make it look like a real stream\n            0x00, 0x00, 0x01, 0xE0, // Video stream start\n            0x00, 0x10, // Packet length\n            0x80, 0x00, 0x05, // Packet header\n            0x00, 0x00, 0x00, 0x00, 0x00, // Dummy data\n        ]\n    }\n\n    fn create_valid_mpeg2_header() -\u003e Vec\u003cu8\u003e {\n        vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start code\n            0x44, // '01' + SCR[32:30] + marker\n            0x00, 0x04, // SCR with marker\n            0x00, 0x04, // SCR with marker\n            0x00, 0x01, // SCR extension + marker\n            0x00, 0x01, 0x00, // program_mux_rate + markers (fixed last byte)\n            0x00, // pack_stuffing_length = 0 (no stuffing)\n            // Additional stream data\n            0x00, 0x00, 0x01, 0xE0, // Video stream\n            0x00, 0x10, // Packet length\n            0x80, 0x00, 0x05, // Packet header\n        ]\n    }\n\n    #[test]\n    fn test_validate_mpg_file_mpeg1_valid() {\n        let valid_mpeg1 = create_valid_mpeg1_header();\n        assert!(validate_mpg_file(\u0026valid_mpeg1));\n    }\n\n    #[test]\n    fn test_validate_mpg_file_mpeg2_valid() {\n        let valid_mpeg2 = create_valid_mpeg2_header();\n        assert!(validate_mpg_file(\u0026valid_mpeg2));\n    }\n\n    #[test]\n    fn test_validate_mpg_file_too_small() {\n        let small_data = vec![0x00, 0x00, 0x01, 0xBA, 0x20]; // Only 5 bytes\n        assert!(!validate_mpg_file(\u0026small_data));\n    }\n\n    #[test]\n    fn test_validate_mpg_file_wrong_start_code() {\n        let mut invalid_mpeg = create_valid_mpeg1_header();\n        invalid_mpeg[3] = 0xBB; // Wrong start code\n        assert!(!validate_mpg_file(\u0026invalid_mpeg));\n    }\n\n    #[test]\n    fn test_validate_mpeg1_pack_header_invalid_marker() {\n        let mut invalid_mpeg1 = create_valid_mpeg1_header();\n        invalid_mpeg1[4] = 0x20; // Missing marker bit\n        assert!(!validate_mpg_file(\u0026invalid_mpeg1));\n    }\n\n    #[test]\n    fn test_validate_mpeg2_pack_header_invalid_marker() {\n        // Test with invalid MPEG-2 identifier\n        let mut invalid_mpeg2 = create_valid_mpeg2_header();\n        invalid_mpeg2[4] = 0x80; // Change from '01' to '10' in top bits\n        assert!(!validate_mpg_file(\u0026invalid_mpeg2));\n    }\n\n    #[test]\n    fn test_validate_mpeg2_invalid_stuffing() {\n        let invalid_mpeg2 = vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start code\n            0x44, 0x00, 0x04, 0x00, 0x04, 0x00, 0x01, 0x00, 0x01, 0x03, // Valid header so far\n            0x02, // stuffing_length = 2\n            0xFE, 0xFD, // Invalid stuffing bytes (should be 0xFF)\n        ];\n        assert!(!validate_mpg_file(\u0026invalid_mpeg2));\n    }\n\n    #[test]\n    fn test_find_mpeg_end_marker() {\n        let data_with_end = vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start\n            0x00, 0x00, 0x00, 0x00, // Some data\n            0x00, 0x00, 0x01, 0xB9, // End marker\n        ];\n\n        assert_eq!(find_mpeg_end_marker(\u0026data_with_end), Some(8));\n\n        let data_without_end = vec![0x00, 0x00, 0x01, 0xBA, 0x00, 0x00];\n        assert_eq!(find_mpeg_end_marker(\u0026data_without_end), None);\n    }\n\n    #[test]\n    fn test_mpg_file_size_heuristic_with_end_marker() {\n        let spec = SearchSpec::new(\n            FileType::Mpg,\n            \"mpg\",\n            \u0026[0x00, 0x00, 0x01, 0xBA],\n            Some(\u0026[0x00, 0x00, 0x01, 0xB9]),\n            50 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let data = vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start\n            0x00, 0x00, 0x00, 0x00, // Some data\n            0x00, 0x00, 0x01, 0xB9, // End marker\n            0x00, 0x00, // Extra data after end\n        ];\n\n        let size = mpg_file_size_heuristic(\u0026spec, \u0026data);\n        assert_eq!(size, 12); // Up to and including end marker\n    }\n\n    #[test]\n    fn test_mpg_file_size_heuristic_no_end_marker() {\n        let spec = SearchSpec::new(\n            FileType::Mpg,\n            \"mpg\",\n            \u0026[0x00, 0x00, 0x01, 0xBA],\n            Some(\u0026[0x00, 0x00, 0x01, 0xB9]),\n            1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let data = vec![0x00, 0x00, 0x01, 0xBA, 0x00, 0x00, 0x00, 0x00];\n        let size = mpg_file_size_heuristic(\u0026spec, \u0026data);\n        assert_eq!(size, 8); // Uses buffer length since no end marker\n    }\n\n    #[test]\n    fn test_has_valid_mpeg_stream_structure() {\n        let data_with_streams = vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start\n            0x00, 0x00, 0x01, 0xE0, // Video stream\n            0x00, 0x00, 0x01, 0xC0, // Audio stream\n        ];\n        assert!(has_valid_mpeg_stream_structure(\u0026data_with_streams));\n\n        let data_without_streams = vec![\n            0x00, 0x00, 0x01, 0xBA, // Pack start only\n            0x00, 0x00, 0x00, 0x00, // No additional streams\n        ];\n        // This should still be considered valid if it has at least one stream\n        assert!(has_valid_mpeg_stream_structure(\u0026data_without_streams));\n    }\n}\n","traces":[{"line":7,"address":[],"length":0,"stats":{"Line":0}},{"line":9,"address":[],"length":0,"stats":{"Line":0}},{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[] s":[],"length":0,"stats":{"Line":0}},{"line":184,"address":[],"length":0,"stats":{"Line":0}},{"line":187,"address":[],"length":0,"stats":{"Line":0}},{"line":193,"address":[],"length":0,"stats":{"Line":0}},{"line":194,"address":[],"length":0,"stats":{"Line":0}},{"line":197,"address":[],"length":0,"stats":{"Line":0}},{"line":201,"address":[],"length":0,"stats":{"Line":0}},{"line":205,"address":[],"length":0,"stats":{"Line":0}},{"line":207,"address":[],"length":0,"stats":{"Line":0}},{"line":210,"address":[],"length":0,"stats":{"Line":0}},{"line":215,"address":[],"length":0,"stats":{"Line":0}},{"line":216,"address":[],"length":0,"stats":{"Line":0}},{"line":217,"address":[],"length":0,"stats":{"Line":0}},{"line":220,"address":[],"length":0,"stats":{"Line":0}},{"line":221,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":91},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","engine","pdf.rs"],"content":"use std::cmp;\n\nuse tracing::debug;\n\nuse crate::engine::{find_first_pattern, find_last_pattern};\nuse crate::types::CONSERVATIVE_FALLBACK_SIZE;\n\n/// Determine the actual size of a PDF file by finding the last %%EOF marker\n/// and validating the xref table structure\npub fn determine_pdf_file_size(buf: \u0026[u8], max_len: usize) -\u003e usize {\n    // PDF file structure:\n    // - Header: %PDF-1.x\n    // - Body: objects, streams, etc.\n    // - Cross-reference table (xref)\n    // - Trailer (contains startxref)\n    // - %%EOF marker\n\n    // PDFs can have incremental updates, so we need to find the LAST %%EOF\n    let eof_marker = b\"%%EOF\";\n\n    if let Some(eof_pos) = find_last_pattern(buf, eof_marker) {\n        debug!(\"PDF: Found last %%EOF at position {}\", eof_pos);\n\n        // Found the last %%EOF, now validate the PDF structure\n        if validate_pdf_structure(\u0026buf[..eof_pos + eof_marker.len()]) {\n            let pdf_end = eof_pos + eof_marker.len();\n\n            // Skip any trailing whitespace after %%EOF\n            let mut actual_end = pdf_end;\n            while actual_end \u003c buf.len()\n                \u0026\u0026 (buf[actual_end] == b'\\r'\n                    || buf[actual_end] == b'\\n'\n                    || buf[actual_end] == b' '\n                    || buf[actual_end] == b'\\t')\n            {\n                actual_end += 1;\n            }\n\n            debug!(\"PDF: Using last %%EOF, file size: {}\", actual_end);\n            return cmp::min(actual_end, max_len);\n        } else {\n            debug!(\"PDF: Last %%EOF failed validation, falling back\");\n        }\n    }\n\n    // Fallback: search for the first %%EOF if validation fails\n    if let Some(first_eof_pos) = find_first_pattern(buf, eof_marker) {\n        let pdf_end = first_eof_pos + eof_marker.len();\n        debug!(\"PDF: Using first %%EOF fallback, file size: {}\", pdf_end);\n        cmp::min(pdf_end, max_len)\n    } else {\n        // No %%EOF found, use conservative estimate\n        debug!(\"PDF: No %%EOF found, using conservative estimate\");\n        cmp::min(CONSERVATIVE_FALLBACK_SIZE, cmp::min(max_len, buf.len()))\n    }\n}\n\n/// Validate PDF structure by checking for startxref and xref table\nfn validate_pdf_structure(buf: \u0026[u8]) -\u003e bool {\n    // Look for \"startxref\" followed by a number and %%EOF\n    let startxref_pattern = b\"startxref\";\n\n    if let Some(startxref_pos) = find_last_pattern(buf, startxref_pattern) {\n        debug!(\"PDF: Found startxref at position {}\", startxref_pos);\n\n        // Parse the offset after startxref\n        let after_startxref = startxref_pos + startxref_pattern.len();\n        if let Some(xref_offset) = parse_pdf_number(\u0026buf[after_startxref..]) {\n            debug!(\"PDF: startxref points to offset {}\", xref_offset);\n\n            // Be more lenient with xref validation - check a wider range around the offset\n            for offset_adjustment in [0isize, -10, -20, -50, 10, 20, 50] {\n                let adjusted_offset = xref_offset as isize + offset_adjustment;\n                if adjusted_offset \u003e= 0 \u0026\u0026 (adjusted_offset as usize) \u003c buf.len() {\n                    let xref_valid = validate_pdf_xref_table(\u0026buf[adjusted_offset as usize..]);\n                    if xref_valid {\n                        debug!(\n                            \"PDF: xref table found with offset adjustment {}\",\n                            offset_adjustment\n                        );\n                        return true;\n                    }\n                }\n            }\n            debug!(\"PDF: No valid xref table found at any adjusted offset\");\n        } else {\n            debug!(\"PDF: Could not parse startxref offset\");\n        }\n    } else {\n        debug!(\"PDF: No startxref found\");\n    }\n\n    // If we can't find or validate startxref, require more-specific PDF markers\n    // to reduce false positives. \"obj\" alone is too common in binary data.\n    let has_basic_markers = find_first_pattern(buf, b\"/Length\").is_some()\n        || find_first_pattern(buf, b\"endobj\").is_some();\n\n    let has_trailer = find_first_pattern(buf, b\"trailer\").is_some();\n    let has_startxref = find_first_pattern(buf, startxref_pattern).is_some();\n\n    // Accept if we have basic PDF structure components\n    let is_valid = has_basic_markers \u0026\u0026 (has_trailer || has_startxref);\n    debug!(\n        \"PDF: Basic validation - markers: {}, trailer: {}, startxref: {}, result: {}\",\n        has_basic_markers, has_trailer, has_startxref, is_valid\n    );\n    is_valid\n}\n\n/// Parse a PDF number (integer) from buffer, skipping whitespace\nfn parse_pdf_number(buf: \u0026[u8]) -\u003e Option\u003cusize\u003e {\n    let mut i = 0;\n\n    // Skip whitespace\n    while i \u003c buf.len() \u0026\u0026 (buf[i] == b' ' || buf[i] == b'\\t' || buf[i] == b'\\r' || buf[i] == b'\\n')\n    {\n        i += 1;\n    }\n\n    // Parse decimal number\n    let mut num = 0usize;\n    let mut found_digit = false;\n\n    while i \u003c buf.len() \u0026\u0026 buf[i].is_ascii_digit() {\n        if let Some(new_num) = num\n            .checked_mul(10)\n            .and_then(|n| n.checked_add((buf[i] - b'0') as usize))\n        {\n            num = new_num;\n            found_digit = true;\n            i += 1;\n        } else {\n            // Overflow, return None\n            return None;\n        }\n    }\n\n    if found_digit { Some(num) } else { None }\n}\n\n/// Validate that there's a valid xref table at the given offset\nfn validate_pdf_xref_table(buf: \u0026[u8]) -\u003e bool {\n    debug!(\n        \"PDF: Validating xref table, buffer starts with: {:?}\",\n        String::from_utf8_lossy(\u0026buf[..cmp::min(20, buf.len())])\n    );\n\n    // Look for \"xref\" at the beginning\n    let xref_pattern = b\"xref\";\n\n    // Skip whitespace before xref\n    let mut i = 0;\n    while i \u003c buf.len() \u0026\u0026 (buf[i] == b' ' || buf[i] == b'\\t' || buf[i] == b'\\r' || buf[i] == b'\\n')\n    {\n        i += 1;\n    }\n\n    if i + xref_pattern.len() \u003c= buf.len() \u0026\u0026 buf[i..i + xref_pattern.len()] == *xref_pattern {\n        debug!(\"PDF: Found 'xref' keyword\");\n        return true;\n    }\n\n    // Alternative: look for trailer without xref (for compressed xref streams)\n    let trailer_pattern = b\"trailer\";\n    if buf.len() \u003e= trailer_pattern.len() \u0026\u0026 buf.starts_with(trailer_pattern) {\n        debug!(\"PDF: Found 'trailer' keyword\");\n        return true;\n    }\n\n    // Also check for xref stream objects (newer PDF format)\n    if find_first_pattern(buf, b\"/Type/XRef\").is_some()\n        || find_first_pattern(buf, b\"/Type /XRef\").is_some()\n    {\n        debug!(\"PDF: Found xref stream object\");\n        return true;\n    }\n\n    debug!(\"PDF: No valid xref table found\");\n    false\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // ── determine_pdf_file_size ──────────────────────────────────────────────\n\n    #[test]\n    fn test_determine_pdf_file_size_with_valid_structure() {\n        // %PDF-1.4\\n  (9 bytes, offsets 0..8)\n        // xref\\n0 1\\n (at offset 9)\n        // 0000000000 65535 f\\n\n        // startxref\\n9\\n%%EOF\\n\n        let mut buf = Vec::new();\n        buf.extend_from_slice(b\"%PDF-1.4\\n\"); // 9 bytes\n        buf.extend_from_slice(b\"xref\\n0 1\\n\");\n        buf.extend_from_slice(b\"0000000000 65535 f\\n\");\n        buf.extend_from_slice(b\"startxref\\n9\\n%%EOF\\n\");\n\n        let size = determine_pdf_file_size(\u0026buf, buf.len());\n        assert!(size \u003e 0, \"size should be non-zero\");\n        assert!(size \u003c= buf.len(), \"size should not exceed buffer length\");\n    }\n\n    #[test]\n    fn test_determine_pdf_file_size_no_eof() {\n        let buf = b\"%PDF-1.4\\nsome content without eof marker\";\n        let size = determine_pdf_file_size(buf, buf.len());\n        assert_eq!(size, cmp::min(CONSERVATIVE_FALLBACK_SIZE, buf.len()));\n    }\n\n    #[test]\n    fn test_determine_pdf_file_size_first_eof_fallback() {\n        // Has %%EOF but no valid PDF structure (no startxref, /Length, endobj, or trailer)\n        let buf = b\"%PDF-1.4\\nsome random content%%EOFmore\";\n        let eof_pos = buf.windows(5).position(|w| w == b\"%%EOF\").unwrap();\n        let expected = eof_pos + 5; // \"%%EOF\".len()\n        let size = determine_pdf_file_size(buf, buf.len());\n        assert_eq!(size, expected);\n    }\n\n    // ── validate_pdf_structure ───────────────────────────────────────────────\n\n    #[test]\n    fn test_validate_pdf_structure_with_startxref_and_xref() {\n        let mut buf = Vec::new();\n        buf.extend_from_slice(b\"%PDF-1.4\\n\"); // 9 bytes\n        buf.extend_from_slice(b\"xref\\n0 1\\n\");\n        buf.extend_from_slice(b\"0000000000 65535 f\\n\");\n        buf.extend_from_slice(b\"startxref\\n9\\n%%EOF\\n\");\n\n        assert!(validate_pdf_structure(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_pdf_structure_basic_markers_only() {\n        // No startxref, but has /Length and trailer → basic markers path\n        let buf = b\"/Length 100\\ntrailer\\n\u003c\u003c\u003e\u003e\\n\";\n        assert!(validate_pdf_structure(buf));\n    }\n\n    #[test]\n    fn test_validate_pdf_structure_no_markers() {\n        let buf = b\"hello world foobar\";\n        assert!(!validate_pdf_structure(buf));\n    }\n\n    // ── parse_pdf_number ─────────────────────────────────────────────────────\n\n    #[test]\n    fn test_parse_pdf_number_valid() {\n        assert_eq!(parse_pdf_number(b\"  12345\\n\"), Some(12345));\n    }\n\n    #[test]\n    fn test_parse_pdf_number_leading_whitespace() {\n        assert_eq!(parse_pdf_number(b\"\\t\\r\\n42\"), Some(42));\n    }\n\n    #[test]\n    fn test_parse_pdf_number_no_digits() {\n        assert_eq!(parse_pdf_number(b\"abc\"), None);\n    }\n\n    #[test]\n    fn test_parse_pdf_number_empty() {\n        assert_eq!(parse_pdf_number(b\"\"), None);\n    }\n\n    // ── validate_pdf_xref_table ──────────────────────────────────────────────\n\n    #[test]\n    fn test_validate_pdf_xref_table_xref_keyword() {\n        assert!(validate_pdf_xref_table(b\"xref\\n0 1\\n\"));\n    }\n\n    #[test]\n    fn test_validate_pdf_xref_table_trailer_keyword() {\n        assert!(validate_pdf_xref_table(b\"trailer\\n\"));\n    }\n\n    #[test]\n    fn test_validate_pdf_xref_table_xref_stream() {\n        let buf = b\"1 0 obj\\n\u003c\u003c\\n/Type/XRef\\n/Size 10\\n\u003e\u003e\\nstream\\n\";\n        assert!(validate_pdf_xref_table(buf));\n    }\n\n    #[test]\n    fn test_validate_pdf_xref_table_no_match() {\n        assert!(!validate_pdf_xref_table(b\"random data here\"));\n    }\n}\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":3}},{"line":19,"address":[],"length":0,"stats":{"Line":6}},{"line":21,"address":[],"length":0,"stats":{"Line":8}},{"line":22,"address":[],"length":0,"stats":{"Line  // IHDR chunk length (13 bytes)\n        buf[8..12].copy_from_slice(\u0026[0u8, 0u8, 0u8, 13u8]);\n        // IHDR chunk type\n        buf[12..16].copy_from_slice(b\"IHDR\");\n        // Width (big-endian u32)\n        buf[16..20].copy_from_slice(\u0026width.to_be_bytes());\n        // Height (big-endian u32)\n        buf[20..24].copy_from_slice(\u0026height.to_be_bytes());\n        buf\n    }\n\n    #[test]\n    fn test_validate_png_valid() {\n        let buf = build_png_header(100, 200);\n        assert!(validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_too_short() {\n        let buf = vec![0u8; 28];\n        assert!(!validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_bad_magic() {\n        let mut buf = build_png_header(100, 200);\n        buf[0] = 0x00; // Corrupt first byte of magic\n        assert!(!validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_bad_ihdr_length() {\n        let mut buf = build_png_header(100, 200);\n        buf[8..12].copy_from_slice(\u0026[0u8, 0u8, 0u8, 12u8]); // Wrong length (12 instead of 13)\n        assert!(!validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_bad_ihdr_type() {\n        let mut buf = build_png_header(100, 200);\n        buf[12..16].copy_from_slice(b\"IDAT\"); // Wrong chunk type\n        assert!(!validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_zero_width() {\n        let buf = build_png_header(0, 200); // Width = 0\n        assert!(!validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_zero_height() {\n        let buf = build_png_header(100, 0); // Height = 0\n        assert!(!validate_png_file(\u0026buf));\n    }\n\n    #[test]\n    fn test_validate_png_huge_dimensions() {\n        let mut buf = build_png_header(100_000, 200);\n        assert!(!validate_png_file(\u0026buf));\n        // also test huge height\n        buf = build_png_header(100, 100_000);\n        assert!(!validate_png_file(\u0026buf));\n    }\n}\n","traces":[{"line":5,"address":[],"length":0,"stats":{"Line":0}},{"line":7,"address":[],"length":0,"stats":{"Line":0}},{"line":8,"address":[],"length":0,"stats":{"Line":0}},{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":14},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","engine","zip.rs"],"content":"use std::cmp;\n\nuse crate::types::{CONSERVATIVE_FALLBACK_SIZE, Endianness, bytes_to_u16, bytes_to_u32};\n\n/// Determine the actual size of a ZIP file by parsing its structure\npub fn determine_zip_file_size(buf: \u0026[u8], max_len: usize) -\u003e usize {\n    // ZIP file structure:\n    // - Local file headers (PK\\x03\\x04) with file data\n    // - Central directory entries (PK\\x01\\x02)\n    // - End of central directory record (PK\\x05\\x06)\n\n    // Look for the End of Central Directory (EOCD) record\n    // The EOCD signature is 0x50, 0x4B, 0x05, 0x06 (PK\\x05\\x06)\n    let eocd_signature = [0x50, 0x4B, 0x05, 0x06];\n\n    // Search FORWARD from the beginning for the first EOCD record\n    // This ensures we find the EOCD that belongs to THIS ZIP file,\n    // not a later ZIP file that might also be in the buffer\n    for i in 0..buf.len().saturating_sub(21) {\n        if buf[i..i + 4] == eocd_signature {\n            // Found EOCD record, parse it to get the actual ZIP file size\n            return parse_zip_eocd_record(\u0026buf[i..], i, max_len);\n        }\n    }\n\n    // If no EOCD found, fall back to scanning for local file headers\n    // and estimating based on the last one found\n    find_zip_end_by_local_headers(buf, max_len)\n}\n\n/// Parse the End of Central Directory record to determine ZIP file size\npub fn parse_zip_eocd_record(eocd_data: \u0026[u8], eocd_offset: usize, max_len: usize) -\u003e usize {\n    if eocd_data.len() \u003c 22 {\n        return cmp::min(max_len, eocd_offset + 22);\n    }\n\n    // EOCD structure (all little-endian):\n    // 0-3:   End of central dir signature (0x06054b50)\n    // 4-5:   Number of this disk\n    // 6-7:   Disk where central directory starts\n    // 8-9:   Number of central directory records on this disk\n    // 10-11: Total number of central directory records\n    // 12-15: Size of central directory\n    // 16-19: Offset of start of central directory\n    // 20-21: ZIP file comment length\n    // 22+:   ZIP file comment\n\n    let comment_length = bytes_to_u16(\u0026eocd_data[20..22], Endianness::Little) as usize;\n\n    // The actual ZIP file ends after the EOCD record + comment\n    let zip_end = eocd_offset + 22 + comment_length;\n\n    cmp::min(zip_end, max_len)\n}\n\n/// Parse a ZIP local file header to determine where this file entry ends\nfn parse_zip_local_header(header_data: \u0026[u8], header_offset: usize) -\u003e Option\u003cusize\u003e {\n    if header_data.len() \u003c 30 {\n        return None;\n    }\n\n    // Local file header structure (all little-endian):\n    // 0-3:   Local file header signature (0x04034b50)\n    // 4-5:   Version needed to extract\n    // 6-7:   General purpose bit flag\n    // 8-9:   Compression method\n    // 10-11: Last mod file time\n    // 12-13: Last mod file date\n    // 14-17: CRC-32\n    // 18-21: Compressed size\n    // 22-25: Uncompressed size\n    // 26-27: File name length\n    // 28-29: Extra field length\n    // 30+:   File name + extra field + compressed data\n\n    let compressed_size = bytes_to_u32(\u0026header_data[18..22], Endianness::Little) as usize;\n    let filename_length = bytes_to_u16(\u0026header_data[26..28], Endianness::Little) as usize;\n    let extra_field_length = bytes_to_u16(\u0026header_data[28..30], Endianness::Little) as usize;\n\n    // Calculate the end of this file entry; use checked arithmetic to guard\n    // against overflow from untrusted field values.\n    let file_end = header_offset\n        .checked_add(30)?\n        .checked_add(filename_length)?\n        .checked_add(extra_field_length)?\n        .checked_add(compressed_size)?;\n\n    Some(file_end)\n}\n\n/// Fallback method: find ZIP end by scanning local file headers.\n///\n/// This is O(n) byte-by-byte when no EOCD is present (e.g. truncated or\n/// corrupted ZIPs). Acceptable for rare cases; normal ZIPs exit via EOCD.\nfn find_zip_end_by_local_headers(buf: \u0026[u8], max_len: usize) -\u003e usize {\n    let local_header_sig = [0x50, 0x4B, 0x03, 0x04]; // PK\\x03\\x04\n    let mut last_file_end = 0;\n    let mut pos = 0;\n\n    while pos \u003c buf.len().saturating_sub(29) {\n        if buf[pos..pos + 4] == local_header_sig {\n            // Found local file header, parse it to find the end of this file\n            if let Some(file_end) = parse_zip_local_header(\u0026buf[pos..], pos) {\n                last_file_end = cmp::max(last_file_end, file_end);\n                pos = file_end;\n            } else {\n                pos += 4;\n            }\n        } else {\n            pos += 1;\n        }\n    }\n\n    if last_file_end \u003e 0 {\n        cmp::min(last_file_end, max_len)\n    } else {\n        // No valid local headers found, use conservative estimate\n        cmp::min(CONSERVATIVE_FALLBACK_SIZE, cmp::min(max_len, buf.len()))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use crate::engine::determine_file_size_heuristic;\n    use crate::types::{FileType, SearchSpec, SearchType};\n\n    use super::*;\n\n    #[test]\n    fn test_determine_zip_file_size_with_eocd() {\n        // Create a minimal ZIP file structure with EOCD\n        let mut zip_data = Vec::new();\n\n        // Local file header (PK\\x03\\x04)\n        zip_data.extend_from_slice(\u0026[0x50, 0x4B, 0x03, 0x04]); // Signature\n        zip_data.extend_from_slice(\u0026[0x14, 0x00]); // Version needed\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // General purpose flag\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Compression method\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Last mod time\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Last mod date\n        zip_data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // CRC-32\n        zip_data.extend_from_slice(\u0026[0x05, 0x00, 0x00, 0x00]); // Compressed size (5 bytes)\n        zip_data.extend_from_slice(\u0026[0x05, 0x00, 0x00, 0x00]); // Uncompressed size (5 bytes)\n        zip_data.extend_from_slice(\u0026[0x08, 0x00]); // Filename length (8 bytes)\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Extra field length (0)\n        zip_data.extend_from_slice(b\"test.txt\"); // Filename\n        zip_data.extend_from_slice(b\"hello\"); // File data (5 bytes)\n\n        // Central directory entry (PK\\x01\\x02)\n        let central_dir_start = zip_data.len();\n        zip_data.extend_from_slice(\u0026[0x50, 0x4B, 0x01, 0x02]); // Signature\n        zip_data.extend_from_slice(\u0026[0x14, 0x00]); // Version made by\n        zip_data.extend_from_slice(\u0026[0x14, 0x00]); // Version needed\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // General purpose flag\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Compression method\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Last mod time\n        zip_data.extend_from_slice(\u0026[0x00, 0x00]); // Last mod date\n        zip_data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // CRC-32\n        zip_data.extend_from_slice
