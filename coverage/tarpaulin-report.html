s":[],"length":0,"stats":{"Line":0}},{"line":936,"address":[],"length":0,"stats":{"Line":0}},{"line":937,"address":[],"length":0,"stats":{"Line":0}},{"line":939,"address":[],"length":0,"stats":{"Line":0}},{"line":940,"address":[],"length":0,"stats":{"Line":0}},{"line":942,"address":[],"length":0,"stats":{"Line":0}},{"line":943,"address":[],"length":0,"stats":{"Line":0}},{"line":945,"address":[],"length":0,"stats":{"Line":0}},{"line":948,"address":[],"length":0,"stats":{"Line":0}},{"line":951,"address":[],"length":0,"stats":{"Line":0}}],"covered":13,"coverable":417},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","jpeg_huffman.rs"],"content":"//! JPEG Huffman validation for recovery candidate ranking.\n//!\n//! Provides two layers of JPEG scan data validation used by the fragment\n//! recovery engine to rank continuation candidates:\n//!\n//! - **Layer 1** ([`ff_byte_validity_score`]): Fast FF-byte pattern check.\n//!   In valid JPEG scan data every `0xFF` must be followed by `0x00`,\n//!   `0xD0–0xD7`, or `0xD9`.  Returns the fraction of FF bytes that comply.\n//!\n//! - **Layer 2** ([`parse_huffman_context`] + [`count_valid_mcus`]): Parse the\n//!   Huffman tables from the JPEG header fragment, then attempt to decode the\n//!   scan data and count successfully decoded MCUs.  Different images have\n//!   different Huffman tables, so a wrong continuation block fails almost\n//!   immediately.\n\n// ── Layer 1: FF-byte pattern validation ──────────────────────────────────────\n\n/// Score a byte slice by the fraction of `0xFF` bytes that are followed by a\n/// byte valid inside JPEG scan data: `0x00` (byte-stuffing), `0xD0–0xD7`\n/// (restart markers), or `0xD9` (EOI).\n///\n/// Returns `1.0` when the slice contains no `0xFF` bytes (can't be judged).\n/// Returns `0.0` when every `0xFF` is followed by an invalid byte.\npub fn ff_byte_validity_score(data: \u0026[u8]) -\u003e f64 {\n    if data.len() \u003c 2 {\n        return 1.0;\n    }\n    let mut ff_count = 0usize;\n    let mut valid_count = 0usize;\n    let mut i = 0;\n    while i \u003c data.len() - 1 {\n        if data[i] == 0xFF {\n            ff_count += 1;\n            match data[i + 1] {\n                0x00 | 0xD0..=0xD7 | 0xD9 =\u003e valid_count += 1,\n                _ =\u003e {}\n            }\n            i += 2;\n        } else {\n            i += 1;\n        }\n    }\n    if ff_count == 0 {\n        1.0\n    } else {\n        valid_count as f64 / ff_count as f64\n    }\n}\n\n// ── Layer 2: Huffman context + MCU decode ─────────────────────────────────────\n\n/// A single Huffman decode table built from a JPEG DHT segment.\nstruct HuffmanTable {\n    /// For each bit length 1..=16: min code value at that length.\n    min_code: [u16; 17],\n    /// For each bit length 1..=16: max code value at that length.  `-1`\n    /// means no codes of this length exist.\n    max_code: [i32; 17],\n    /// For each bit length 1..=16: index into `symbols` for the first code.\n    val_ptr: [i32; 17],\n    /// Symbols in canonical Huffman order.\n    symbols: Vec\u003cu8\u003e,\n}\n\nimpl HuffmanTable {\n    /// Construct from the raw DHT payload: 16 code-count bytes followed by\n    /// the symbol list.  Returns `None` for malformed payloads.\n    fn from_dht_payload(payload: \u0026[u8]) -\u003e Option\u003cSelf\u003e {\n        if payload.len() \u003c 16 {\n            return None;\n        }\n        // Counts: payload[0..16] gives number of codes of length 1..=16.\n        let counts = \u0026payload[..16];\n        let total_symbols: usize = counts.iter().map(|\u0026c| c as usize).sum();\n        if payload.len() \u003c 16 + total_symbols {\n            return None;\n        }\n        let symbols: Vec\u003cu8\u003e = payload[16..16 + total_symbols].to_vec();\n\n        let mut min_code = [0u16; 17];\n        let mut max_code = [-1i32; 17];\n        let mut val_ptr = [0i32; 17];\n\n        let mut code = 0u16;\n        let mut sym_idx = 0i32;\n        for len in 1usize..=16 {\n            let count = counts[len - 1] as usize;\n            if count \u003e 0 {\n                min_code[len] = code;\n                max_code[len] = (code as i32) + (count as i32) - 1;\n                val_ptr[len] = sym_idx - code as i32;\n            }\n            sym_idx += count as i32;\n            code = code.wrapping_add(count as u16).wrapping_shl(1);\n        }\n\n        Some(HuffmanTable {\n            min_code,\n            max_code,\n            val_ptr,\n            symbols,\n        })\n    }\n}\n\n/// Per-component scan information extracted from SOS.\n#[derive(Clone)]\nstruct ScanComponent {\n    dc_table_idx: usize,\n    ac_table_idx: usize,\n    /// Horizontal × vertical sampling factors (from SOF).\n    h_samp: u8,\n    v_samp: u8,\n}\n\n/// All Huffman tables and scan-component information parsed from a JPEG header.\npub struct JpegHuffmanContext {\n    /// Up to 4 tables indexed by `(class \u003c\u003c 1) | destination_id`.\n    /// Class 0 = DC, class 1 = AC.  Indices 0/1 = DC table 0/1, 2/3 = AC 0/1.\n    tables: [Option\u003cHuffmanTable\u003e; 4],\n    /// Ordered scan components as they appear in the SOS segment.\n    components: Vec\u003cScanComponent\u003e,\n}\n\n/// Attempt to parse Huffman tables (DHT segments) and scan-component\n/// assignments (SOS segment) from a JPEG header fragment.\n///\n/// Returns `None` when:\n/// - The header is too short or malformed to extract complete tables.\n/// - No DHT segments are present.\n/// - The JPEG uses progressive encoding (SOF2 marker `0xC2`) — graceful\n///   fallback, since progressive scan data uses a different decode path.\npub fn parse_huffman_context(header_fragment: \u0026[u8]) -\u003e Option\u003cJpegHuffmanContext\u003e {\n    let buf = header_fragment;\n    if buf.len() \u003c 10 {\n        return None;\n    }\n    // Must start with SOI FF D8.\n    if buf[0] != 0xFF || buf[1] != 0xD8 {\n        return None;\n    }\n\n    let mut tables: [Option\u003cHuffmanTable\u003e; 4] = [None, None, None, None];\n    // SOF component descriptors: component_id → (h_samp, v_samp).\n    let mut sof_components: std::collections::HashMap\u003cu8, (u8, u8)\u003e = Default::default();\n    let mut is_progressive = false;\n    let mut scan_components: Vec\u003cScanComponent\u003e = Vec::new();\n    let mut found_dht = false;\n    let mut found_sos = false;\n\n    let mut pos = 2usize;\n    loop {\n        if pos + 4 \u003e buf.len() {\n            break;\n        }\n        if buf[pos] != 0xFF {\n            break;\n        }\n        // Skip padding FF bytes.\n        while pos + 1 \u003c buf.len() \u0026\u0026 buf[pos + 1] == 0xFF {\n            pos += 1;\n        }\n        if pos + 2 \u003e buf.len() {\n            break;\n        }\n        let marker = buf[pos + 1];\n        pos += 2;\n\n        match marker {\n            0xD8 =\u003e continue, // SOI (nested) — skip\n            0xD9 =\u003e break,    // EOI — stop\n\n            0xDA =\u003e {\n                // SOS — parse component-table assignments, then stop.\n                if pos + 2 \u003e buf.len() {\n                    break;\n                }\n                let seg_len = u16::from_be_bytes([buf[pos], buf[pos + 1]]) as usize;\n                if seg_len \u003c 3 || pos + seg_len \u003e buf.len() {\n                    break;\n                }\n                let ns = buf[pos + 2] as usize; // number of scan components\n                if seg_len \u003c 2 + 1 + ns * 2 {\n                    break;\n                }\n                for i in 0..ns {\n                    let comp_id = buf[pos + 3 + i * 2];\n                    let table_byte = buf[pos + 4 + i * 2];\n                    let dc_tbl = (table_byte \u003e\u003e 4) as usize;\n                    let ac_tbl = (table_byte \u0026 0x0F) as usize;\n                    if dc_tbl \u003e 1 || ac_tbl \u003e 1 {\n                        // Only two DC and two AC tables defined in baseline.\n                        break;\n                    }\n                    let (h_samp, v_samp) = sof_components.get(\u0026comp_id).copied().unwrap_or((1, 1));\n                    scan_components.push(ScanComponent {\n                        dc_table_idx: dc_tbl,\n                        ac_table_idx: ac_tbl + 2, // AC tables occupy slots 2 and 3\n                        h_samp,\n                        v_samp,\n                    });\n                }\n                found_sos = true;\n                break;\n            }\n\n            _ =\u003e {\n                // All other segments have a big-endian length field.\n                if pos + 2 \u003e buf.len() {\n                    break;\n                }\n                let seg_len = u16::from_be_bytes([buf[pos], buf[pos + 1]]) as usize;\n                if seg_len \u003c 2 || pos + seg_len \u003e buf.len() {\n                    break;\n                }\n\n                match marker {\n                    0xC2 =\u003e {\n                        // SOF2 = progressive — bail out.\n                        is_progressive = true;\n                    }\n                    0xC0 | 0xC1 =\u003e {\n                        // SOF0 / SOF1 (baseline / extended sequential)\n                        // Layout after FF Cx [len_hi len_lo]:\n                        //   precision(1) height(2) width(2) ncomponents(1)\n                        //   [comp_id(1) samp_factors(1) qtable(1)] × ncomponents\n                        if pos + 8 \u003c= buf.len() {\n                            let ncomp = buf[pos + 5] as usize;\n                            if pos + 6 + ncomp * 3 \u003c= buf.len() {\n                                for i in 0..ncomp {\n                                    let cid = buf[pos + 6 + i * 3];\n                                    let sf = buf[pos + 7 + i * 3];\n                                    let h = (sf \u003e\u003e 4).max(1);\n                                    let v = (sf \u0026 0x0F).max(1);\n                                    sof_components.insert(cid, (h, v));\n                                }\n                            }\n                        }\n                    }\n                    0xC4 =\u003e {\n                        // DHT — may contain multiple tables packed together.\n                        let payload = \u0026buf[pos + 2..pos + seg_len];\n                        if parse_dht_segment(payload, \u0026mut tables) {\n                            found_dht = true;\n                        }\n                    }\n                    _ =\u003e {}\n                }\n\n                pos += seg_len;\n            }\n        }\n    }\n\n    if is_progressive || !found_dht || !found_sos || scan_components.is_empty() {\n        return None;\n    }\n\n    Some(JpegHuffmanContext {\n        tables,\n        components: scan_components,\n    })\n}\n\n/// Parse one DHT segment payload (everything after the 2-byte length field).\n/// A single DHT segment can contain multiple tables packed end-to-end.\n/// Returns `true` if at least one table was successfully parsed.\nfn parse_dht_segment(payload: \u0026[u8], tables: \u0026mut [Option\u003cHuffmanTable\u003e; 4]) -\u003e bool {\n    let mut pos = 0;\n    let mut any_ok = false;\n    while pos \u003c payload.len() {\n        if pos + 17 \u003e payload.len() {\n            break;\n        }\n        let tc = (payload[pos] \u003e\u003e 4) as usize; // table class: 0=DC, 1=AC\n        let th = (payload[pos] \u0026 0x0F) as usize; // table destination id\n        pos += 1;\n\n        if tc \u003e 1 || th \u003e 1 {\n            break; // invalid table specification for baseline JPEG\n        }\n\n        let counts = \u0026payload[pos..pos + 16];\n        let total_syms: usize = counts.iter().map(|\u0026c| c as usize).sum();\n        pos += 16;\n\n        if pos + total_syms \u003e payload.len() {\n            break;\n        }\n\n        let dht_payload_slice = \u0026payload[pos - 16..pos + total_syms]; // counts + symbols\n        if let Some(tbl) = HuffmanTable::from_dht_payload(dht_payload_slice) {\n            let slot = (tc \u003c\u003c 1) | th;\n            tables[slot] = Some(tbl);\n            any_ok = true;\n        }\n\n        pos += total_syms;\n    }\n    any_ok\n}\n\n/// Decode JPEG scan data and return the number of MCUs that decoded\n/// successfully using the provided Huffman context.\n///\n/// Decoding stops at the first MCU that fails, at EOI, or at EOF.\n/// Returns `0` if decoding fails immediately (wrong tables, corrupt data).\npub fn count_valid_mcus(ctx: \u0026JpegHuffmanContext, scan_data: \u0026[u8]) -\u003e usize {\n    let mut reader = BitstreamReader::new(scan_data);\n    let mut mcu_count = 0usize;\n    // DC prediction state: one value per scan component.\n    let mut prev_dc: Vec\u003ci32\u003e = vec![0; ctx.components.len()];\n\n    loop {\n        if reader.at_end() {\n            break;\n        }\n        // Check for restart marker — RST0-RST7 sit between MCUs.\n        if let Some(marker) = reader.peek_marker() {\n            if (0xD0..=0xD7).contains(\u0026marker) {\n                reader.skip_marker();\n                prev_dc.fill(0);\n                continue;\n            } else if marker == 0xD9 {\n                break; // EOI\n            }\n            // Unexpected marker inside scan data — treat as end.\n            break;\n        }\n\n        if decode_mcu(\u0026mut reader, ctx, \u0026mut prev_dc).is_none() {\n            break;\n        }\n        mcu_count += 1;\n    }\n\n    mcu_count\n}\n\n// ── Bitstream reader ──────────────────────────────────────────────────────────\n\n/// A bit-level reader over JPEG scan data with transparent FF00 byte-stuffing.\nstruct BitstreamReader\u003c'a\u003e {\n    data: \u0026'a [u8],\n    pos: usize,\n    /// Bit buffer (up to 32 bits pending).\n    bit_buf: u32,\n    /// Number of valid bits in `bit_buf`.\n    bits_left: u8,\n    /// Whether we have hit EOF or a marker.\n    exhausted: bool,\n}\n\nimpl\u003c'a\u003e BitstreamReader\u003c'a\u003e {\n    fn new(data: \u0026'a [u8]) -\u003e Self {\n        BitstreamReader {\n            data,\n            pos: 0,\n            bit_buf: 0,\n            bits_left: 0,\n            exhausted: false,\n        }\n    }\n\n    fn at_end(\u0026self) -\u003e bool {\n        self.exhausted \u0026\u0026 self.bits_left == 0\n    }\n\n    /// If the next byte in the raw stream is `0xFF` followed by a non-`0x00`\n    /// byte, return the second byte (the marker type) without consuming anything.\n    fn peek_marker(\u0026self) -\u003e Option\u003cu8\u003e {\n        if self.bits_left \u003e 0 {\n            return None; // bits still buffered — not at a raw boundary\n        }\n        let pos = self.pos;\n        if pos + 1 \u003c self.data.len() \u0026\u0026 self.data[pos] == 0xFF \u0026\u0026 self.data[pos + 1] != 0x00 {\n            Some(self.data[pos + 1])\n        } else {\n            None\n        }\n    }\n\n    /// Skip past a `0xFF Mx` marker (2 bytes raw).\n    fn skip_marker(\u0026mut self) {\n        if self.pos + 1 \u003c self.data.len() {\n            self.pos += 2;\n        }\n        self.exhausted = false;\n    }\n\n    /// Fill the bit buffer by reading raw bytes, handling FF00 stuffing.\n    fn fill_bits(\u0026mut self) {\n        while self.bits_left \u003c= 24 \u0026\u0026 !self.exhausted {\n            if self.pos \u003e= self.data.len() {\n                self.exhausted = true;\n                break;\n            }\n            let byte = self.data[self.pos];\n            if byte == 0xFF {\n                if self.pos + 1 \u003e= self.data.len() {\n                    self.exhausted = true;\n                    break;\n                }\n                let next = self.data[self.pos + 1];\n                if next == 0x00 {\n                    // Stuffed FF — emit 0xFF into the bitstream.\n                    self.pos += 2;\n                    self.bit_buf = (self.bit_buf \u003c\u003c 8) | 0xFF;\n                    self.bits_left += 8;\n                } else {\n                    // Any other FF Xx is a marker — stop filling.\n                    self.exhausted = true;\n                    break;\n                }\n            } else {\n                self.pos += 1;\n                self.bit_buf = (self.bit_buf \u003c\u003c 8) | (byte as u32);\n                self.bits_left += 8;\n            }\n        }\n    }\n\n    /// Read exactly `n` bits (1 ≤ n ≤ 16).  Returns `None` on EOF.\n    fn read_bits(\u0026mut self, n: u8) -\u003e Option\u003cu16\u003e {\n        debug_assert!((1..=16).contains(\u0026n));\n        if self.bits_left \u003c n {\n            self.fill_bits();\n        }\n        if self.bits_left \u003c n {\n            return None;\n        }\n        self.bits_left -= n;\n        let val = (self.bit_buf \u003e\u003e self.bits_left) \u0026 ((1 \u003c\u003c n) - 1);\n        self.bit_buf \u0026= (1 \u003c\u003c self.bits_left) - 1;\n        Some(val as u16)\n    }\n}\n\n// ── Huffman decode helpers ────────────────────────────────────────────────────\n\n/// Decode one Huffman symbol from the bitstream using the given table.\nfn decode_huffman(reader: \u0026mut BitstreamReader, table: \u0026HuffmanTable) -\u003e Option\u003cu8\u003e {\n    let mut code = 0u16;\n    for len in 1u8..=16u8 {\n        let bit = reader.read_bits(1)?;\n        code = (code \u003c\u003c 1) | bit;\n        let l = len as usize;\n        if table.max_code[l] \u003e= 0 \u0026\u0026 code \u003e= table.min_code[l] \u0026\u0026 code as i32 \u003c= table.max_code[l] {\n            let sym_idx = (table.val_ptr[l] + code as i32) as usize;\n            if sym_idx \u003c table.symbols.len() {\n                return Some(table.symbols[sym_idx]);\n            }\n            return None;\n        }\n    }\n    None // no valid code found within 16 bits\n}\n\n/// Receive (decode additional magnitude bits) for a JPEG coefficient category.\n/// Returns the signed coefficient value.\nfn receive_and_extend(reader: \u0026mut BitstreamReader, category: u8) -\u003e Option\u003ci32\u003e {\n    if category == 0 {\n        return Some(0);\n    }\n    let bits = reader.read_bits(category)? as i32;\n    // Sign extend: if the leading bit is 0, value is negative.\n    let vt = 1 \u003c\u003c (category - 1);\n    if bits \u003c vt {\n        Some(bits - (2 * vt - 1))\n    } else {\n        Some(bits)\n    }\n}\n\n/// Decode one full MCU.  Returns `Some(())` on success, `None` on failure.\nfn decode_mcu(\n    reader: \u0026mut BitstreamReader,\n    ctx: \u0026JpegHuffmanContext,\n    prev_dc: \u0026mut [i32],\n) -\u003e Option\u003c()\u003e {\n    for (comp_idx, comp) in ctx.components.iter().enumerate() {\n        // Each component contributes h_samp × v_samp 8×8 blocks per MCU.\n        let blocks = (comp.h_samp as usize) * (comp.v_samp as usize);\n\n        for _block_idx in 0..blocks {\n            // ── DC coefficient ────────────────────────────────────────────\n            let dc_tbl = ctx.tables[comp.dc_table_idx].as_ref()?;\n            let dc_category = decode_huffman(reader, dc_tbl)?;\n            if dc_category \u003e 11 {\n                return None; // impossible category for DC\n            }\n            let dc_diff = receive_and_extend(reader, dc_category)?;\n            prev_dc[comp_idx] += dc_diff;\n\n            // ── AC coefficients (63 total) ────────────────────────────────\n            let ac_tbl = ctx.tables[comp.ac_table_idx].as_ref()?;\n            let mut ac_count = 0usize;\n            while ac_count \u003c 63 {\n                let rs = decode_huffman(reader, ac_tbl)?;\n                if rs == 0x00 {\n                    // EOB — end-of-block, remaining coefficients are zero.\n                    break;\n                }\n                if rs == 0xF0 {\n                    // ZRL — 16 zero AC coefficients.\n                    ac_count += 16;\n                    continue;\n                }\n                let run = (rs \u003e\u003e 4) as usize;\n                let size = rs \u0026 0x0F;\n                if size == 0 || size \u003e 10 {\n                    return None; // invalid AC category\n                }\n                receive_and_extend(reader, size)?;\n                ac_count += run + 1;\n            }\n        }\n    }\n    Some(())\n}\n\n// ── Tests ─────────────────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // ── FF-byte validity tests ────────────────────────────────────────────────\n\n    #[test]\n    fn test_ff_validity_no_ff() {\n        let data = [0x12, 0x34, 0x56, 0x78];\n        assert!((ff_byte_validity_score(\u0026data) - 1.0).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn test_ff_validity_all_valid_stuffed() {\n        // FF 00 FF 00 — both FFs are stuffed, score = 1.0\n        let data = [0xFF, 0x00, 0xFF, 0x00];\n        assert!((ff_byte_validity_score(\u0026data) - 1.0).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn test_ff_validity_all_valid_restart() {\n        let data = [0xFF, 0xD0, 0xFF, 0xD5, 0xFF, 0xD9];\n        assert!((ff_byte_validity_score(\u0026data) - 1.0).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn test_ff_validity_all_invalid() {\n        // FF E0 — JFIF APP0 marker inside scan data = invalid\n        let data = [0xFF, 0xE0, 0xFF, 0xFE];\n        assert!(ff_byte_validity_score(\u0026data) \u003c 1e-9);\n    }\n\n    #[test]\n    fn test_ff_validity_mixed() {\n        // 2 FFs: one valid (FF 00), one invalid (FF E0) → 0.5\n        let data = [0xFF, 0x00, 0xFF, 0xE0];\n        let score = ff_byte_validity_score(\u0026data);\n        assert!((score - 0.5).abs() \u003c 1e-9);\n    }\n\n    #[test]\n    fn test_ff_validity_empty() {\n        assert!((ff_byte_validity_score(\u0026[]) - 1.0).abs() \u003c 1e-9);\n    }\n\n    // ── DHT segment parsing tests ─────────────────────────────────────────────\n\n    /// Construct a minimal DHT payload for a DC table with a handful of codes.\n    fn minimal_dc_dht_payload() -\u003e Vec\u003cu8\u003e {\n        // Table class=0 (DC), destination=0\n        let mut payload = vec![0x00u8]; // Tc|Th\n        // 16 code-count bytes: 1 code of length 2, 1 of length 3, rest zero.\n        let mut counts = [0u8; 16];\n        counts[1] = 1; // 1 code of length 2\n        counts[2] = 2; // 2 codes of length 3\n        payload.extend_from_slice(\u0026counts);\n        // Symbols: category 0, 1, 2\n        payload.extend_from_slice(\u0026[0x00, 0x01, 0x02]);\n        payload\n    }\n\n    #[test]\n    fn test_parse_dht_segment_basic() {\n        let payload = minimal_dc_dht_payload();\n        let mut tables: [Option\u003cHuffmanTable\u003e; 4] = [None, None, None, None];\n        let ok = parse_dht_segment(\u0026payload, \u0026mut tables);\n        assert!(ok, \"should parse at least one table\");\n        assert!(tables[0].is_some(), \"DC table 0 should be populated\");\n    }\n\n    #[test]\n    fn test_parse_dht_segment_too_short() {\n        let payload = [0x00u8; 3]; // too short for counts\n        let mut tables: [Option\u003cHuffmanTable\u003e; 4] = [None, None, None, None];\n        let ok = parse_dht_segment(\u0026payload, \u0026mut tables);\n        assert!(!ok);\n    }\n\n    // ── parse_huffman_context tests ───────────────────────────────────────────\n\n    /// Build the minimal JFIF + DHT + SOF + SOS header needed for context parsing.\n    fn build_minimal_header() -\u003e Vec\u003cu8\u003e {\n        let mut buf = Vec::new();\n        // SOI\n        buf.extend_from_slice(\u0026[0xFF, 0xD8]);\n        // APP0 (JFIF)\n        buf.extend_from_slice(\u0026[0xFF, 0xE0]);\n        let app0_body: \u0026[u8] = \u0026[\n            b'J', b'F', b'I', b'F', 0x00, 0x01, 0x01, 0x00, 0x00, 0x48, 0x00, 0x48, 0x00, 0x00,\n        ];\n        let app0_len = (app0_body.len() + 2) as u16;\n        buf.extend_from_slice(\u0026app0_len.to_be_bytes());\n        buf.extend_from_slice(app0_body);\n\n        // DHT for DC table 0\n        {\n            let mut dht_body: Vec\u003cu8\u003e = vec![0x00]; // Tc=0 Th=0\n            let mut counts = [0u8; 16];\n            counts[1] = 1;\n            counts[2] = 2;\n            dht_body.extend_from_slice(\u0026counts);\n            dht_body.extend_from_slice(\u0026[0x00, 0x01, 0x02]);\n            let dht_len = (dht_body.len() + 2) as u16;\n            buf.extend_from_slice(\u0026[0xFF, 0xC4]);\n            buf.extend_from_slice(\u0026dht_len.to_be_bytes());\n            buf.extend_from_slice(\u0026dht_body);\n        }\n        // DHT for AC table 0\n        {\n            let mut dht_body: Vec\u003cu8\u003e = vec![0x10]; // Tc=1 Th=0\n            let mut counts = [0u8; 16];\n            counts[1] = 1; // just EOB (0x00) at length 2\n            counts[2] = 1;\n            dht_body.extend_from_slice(\u0026counts);\n            dht_body.extend_from_slice(\u0026[0x00, 0x11]); // EOB + one non-zero code\n            let dht_len = (dht_body.len() + 2) as u16;\n            buf.extend_from_slice(\u0026[0xFF, 0xC4]);\n            buf.extend_from_slice(\u0026dht_len.to_be_bytes());\n            buf.extend_from_slice(\u0026dht_body);\n        }\n        // SOF0 (baseline): precision=8, height=8, width=8, 1 component\n        {\n            let sof_body: \u0026[u8] = \u0026[\n                0x08, // precision\n                0x00, 0x08, // height = 8\n                0x00, 0x08, // width = 8\n                0x01, // ncomponents = 1\n                0x01, // component id = 1\n                0x11, // h_samp=1, v_samp=1\n                0x00, // qtable = 0\n            ];\n            let sof_len = (sof_body.len() + 2) as u16;\n            buf.extend_from_slice(\u0026[0xFF, 0xC0]);\n            buf.extend_from_slice(\u0026sof_len.to_be_bytes());\n            buf.extend_from_slice(sof_body);\n        }\n        // SOS: 1 component using DC table 0 + AC table 0\n        {\n            let sos_body: \u0026[u8] = \u0026[\n                0x01, // Ns = 1 component\n                0x01, 0x00, // comp_id=1, Td=0, Ta=0\n                0x00, 0x3F, 0x00, // Ss, Se, Ah/Al\n            ];\n            let sos_len = (sos_body.len() + 2) as u16;\n            buf.extend_from_slice(\u0026[0xFF, 0xDA]);\n            buf.extend_from_slice(\u0026sos_len.to_be_bytes());\n            buf.extend_from_slice(sos_body);\n        }\n        buf\n    }\n\n    #[test]\n    fn test_parse_huffman_context_valid() {\n        let header = build_minimal_header();\n        let ctx = parse_huffman_context(\u0026header);\n        assert!(ctx.is_some(), \"should parse a valid context\");\n        let ctx = ctx.expect(\"build_minimal_header produces a parseable context\");\n        assert_eq!(ctx.components.len(), 1);\n        assert!(ctx.tables[0].is_some(), \"DC table 0 should be present\");\n        assert!(ctx.tables[2].is_some(), \"AC table 0 should be present\");\n    }\n\n    #[test]\n    fn test_parse_huffman_context_no_dht() {\n        // Build a header with SOI + APP0 + SOS but no DHT.\n        let mut buf = Vec::new();\n        buf.extend_from_slice(\u0026[0xFF, 0xD8, 0xFF, 0xE0]);\n        let app0: \u0026[u8] = \u0026[\n            b'J', b'F', b'I', b'F', 0x00, 0x01, 0x01, 0x00, 0x00, 0x48, 0x00, 0x48, 0x00, 0x00,\n        ];\n        let len = (app0.len() + 2) as u16;\n        buf.extend_from_slice(\u0026len.to_be_bytes());\n        buf.extend_from_slice(app0);\n        // SOS\n        let sos: \u0026[u8] = \u0026[0xFF, 0xDA, 0x00, 0x08, 0x01, 0x01, 0x00, 0x00, 0x3F, 0x00];\n        buf.extend_from_slice(sos);\n\n        let ctx = parse_huffman_context(\u0026buf);\n        assert!(ctx.is_none(), \"no DHT should return None\");\n    }\n\n    #[test]\n    fn test_parse_huffman_context_progressive() {\n        // Replace SOF0 with SOF2.\n        let mut header = build_minimal_header();\n        // Find the SOF0 marker (FF C0) and change it to SOF2 (FF C2).\n        for i in 0..header.len() - 1 {\n            if header[i] == 0xFF \u0026\u0026 header[i + 1] == 0xC0 {\n                header[i + 1] = 0xC2;\n                break;\n            }\n        }\n        let ctx = parse_huffman_context(\u0026header);\n        assert!(ctx.is_none(), \"progressive JPEG should return None\");\n    }\n\n    // ── BitstreamReader tests ─────────────────────────────────────────────────\n\n    #[test]\n    fn test_bitstream_reader_basic() {\n        // 0xA0 = 1010_0000\n        let data = [0xA0u8];\n        let mut r = BitstreamReader::new(\u0026data);\n        assert_eq!(r.read_bits(1), Some(1));\n        assert_eq!(r.read_bits(1), Some(0));\n        assert_eq!(r.read_bits(1), Some(1));\n        assert_eq!(r.read_bits(1), Some(0));\n    }\n\n    #[test]\n    fn test_bitstream_reader_ff00_stuffing() {\n        // FF 00 should yield the byte FF (1111_1111) in the bitstream.\n        let data = [0xFF, 0x00, 0x80];\n        let mut r = BitstreamReader::new(\u0026data);\n        // Read the stuffed FF byte (8 bits), should be 0xFF = 255.\n        let val = r\n            .read_bits(8)\n            .expect(\"FF 00 stuffing yields 8 readable bits\");\n        assert_eq!(val, 0xFF);\n        // Then read the 0x80 byte.\n        let val2 = r.read_bits(8).expect(\"0x80 byte yields 8 readable bits\");\n        assert_eq!(val2, 0x80);\n    }\n\n    #[test]\n    fn test_bitstream_reader_marker_stop() {\n        // FF D9 (EOI marker) — reader should stop filling and return None.\n        let data = [0xFF, 0xD9, 0x00];\n        let mut r = BitstreamReader::new(\u0026data);\n        // No valid bits before the marker.\n        let val = r.read_bits(8);\n        assert!(val.is_none(), \"should not read bits across a marker\");\n    }\n\n    // ── count_valid_mcus integration test ────────────────────────────────────\n\n    #[test]\n    fn test_count_valid_mcus_empty() {\n        let header = build_minimal_header();\n        if let Some(ctx) = parse_huffman_context(\u0026header) {\n            let cou ts":{"Line":0}},{"line":519,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":250},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","jpeg_recover.rs"],"content":"//! JPEG fragment recovery engine.\n//!\n//! This module provides a second-pass recovery process for incomplete JPEG\n//! files identified by a prior [`crate::engine`] carve run.  It reads the\n//! `carve_report.json` produced by that run, locates every JPEG whose\n//! [`crate::types::JpegScanStatus`] is not `Complete`, then attempts to find\n//! and stitch together a continuation fragment from elsewhere in the source\n//! image using byte-entropy scoring.\n//!\n//! # Algorithm overview\n//!\n//! 1. Load the carve report and filter for incomplete JPEGs.\n//! 2. For each incomplete JPEG:\n//!    a. Determine the truncation point (end of the carved fragment).\n//!    b. Enumerate sector-aligned candidate blocks within a configurable search window.\n//!    c. Score each block by Shannon byte entropy (high entropy ≈ compressed scan data).\n//!    d. For the top-`max_candidates` blocks, splice with the header and search for EOI.\n//!    e. Write each valid reassembly as `{original_stem}_recovered_{n}.jpg`.\n//!\n//! 3. Emit a `recover_report.json` summarising what was recovered.\n\nuse std::{\n    borrow::Cow,\n    cmp,\n    fs::{self, File},\n    io::{Read, Seek, SeekFrom, Write},\n    path::Path,\n};\n\nuse anyhow::{Context, Result};\nuse serde::{Deserialize, Serialize};\n\nuse crate::jpeg_huffman;\nuse crate::types::{CarveReport, JpegScanStatus};\n\n// ── Constants ─────────────────────────────────────────────────────────────────\n\n/// Default search window (bytes) used when scanning for continuation blocks.\n/// Matches the default in [`RecoveryConfig::search_window`].\npub const DEFAULT_SEARCH_WINDOW_BYTES: usize = 50 * 1024 * 1024;\n\n/// Minimum number of bytes that must be successfully read from a candidate block\n/// before entropy scoring or FF-validity scoring is attempted.\nconst MIN_CANDIDATE_READ_BYTES: usize = 16;\n\n/// Multiplier applied to `max_candidates` to form the initial entropy pool that\n/// feeds into Layer 1 filtering.  A wider pool gives Layer 1 more candidates to\n/// evaluate before truncating to the final `max_candidates`.\nconst CANDIDATE_POOL_FACTOR: usize = 3;\n\n// ── Configuration ────────────────────────────────────────────────────────────\n\n/// Tuning knobs for the recovery pass.\n#[derive(Debug, Clone)]\npub struct RecoveryConfig {\n    /// Sector / block alignment used when enumerating candidate continuation\n    /// blocks (bytes, default 512).\n    pub block_size: usize,\n    /// How far from the truncation point to search for candidate blocks\n    /// (bytes, default 50 MB).\n    pub search_window: usize,\n    /// Maximum number of candidate reassemblies to evaluate per incomplete JPEG\n    /// (default 3).  With Huffman validation enabled only the single best\n    /// candidate is written; this controls how many survivors make it through\n    /// the entropy filter before Huffman ranking.\n    pub max_candidates: usize,\n    /// Minimum Shannon entropy (bits/byte, 0.0 – 8.0) for a block to be\n    /// considered a plausible continuation (default 7.0).\n    pub min_entropy_score: f64,\n    /// Minimum fraction (0.0 – 1.0) of `0xFF` bytes that must be followed by a\n    /// byte valid in JPEG scan data (`0x00`, `0xD0-0xD7`, `0xD9`) for a\n    /// candidate to survive the Layer 1 filter (default 0.9).\n    pub min_ff_validity_score: f64,\n    /// Whether to perform Huffman MCU decode validation (Layer 2).  When\n    /// `true` (default), the single best-decoded candidate is written; when\n    /// `false`, the top entropy-scored candidate that contains an EOI is\n    /// written, mirroring the old behaviour.\n    pub huffman_validation: bool,\n}\n\nimpl Default for RecoveryConfig {\n    fn default() -\u003e Self {\n        Self {\n            block_size: 512,\n            search_window: DEFAULT_SEARCH_WINDOW_BYTES,\n            max_candidates: 3,\n            min_entropy_score: 7.0,\n            min_ff_validity_score: 0.9,\n            huffman_validation: true,\n        }\n    }\n}\n\n// ── Output types ─────────────────────────────────────────────────────────────\n\n/// How a particular JPEG was reassembled.\n#[derive(Debug, Clone, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum RecoveryMethod {\n    /// The continuation was found immediately after the carved file's end\n    /// offset (contiguous on-disk, just past the max_len cutoff).\n    DirectContinuation,\n    /// The continuation was found at a non-contiguous location via entropy\n    /// scan, suggesting true filesystem fragmentation.\n    FragmentReassembly,\n}\n\n/// A single successfully recovered JPEG.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct RecoveredFile {\n    /// Filename of the original (incomplete) carved JPEG.\n    pub original_filename: String,\n    /// Filename written to the output directory.\n    pub recovered_filename: String,\n    /// Method used to locate the continuation.\n    pub recovery_method: RecoveryMethod,\n    /// Entropy score of the winning continuation block (0.0 – 8.0).\n    pub entropy_score: f64,\n    /// Absolute offset in the source image where the JPEG header begins.\n    pub header_img_offset: u64,\n    /// Absolute offset in the source image where the continuation block begins.\n    pub continuation_img_offset: u64,\n    /// Total size of the recovered file in bytes.\n    pub recovered_size: usize,\n    /// Fraction of `0xFF` bytes in the continuation block that were followed\n    /// by a byte valid in JPEG scan data.  Present when Layer 1 ran.\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub ff_validity_score: Option\u003cf64\u003e,\n    /// Number of MCUs that decoded successfully via Huffman validation.\n    /// Present when Layer 2 ran; `0` means tables were unavailable or\n    /// decoding failed immediately.\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub huffman_mcu_count: Option\u003cusize\u003e,\n}\n\n/// Top-level summary written as `recover_report.json`.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct RecoveryReport {\n    /// Path to the source disk image that was searched.\n    pub source_image: String,\n    /// Path to the `carve_report.json` that was consumed.\n    pub source_report: String,\n    /// Number of incomplete JPEGs found in the report.\n    pub incomplete_jpegs: usize,\n    /// Successfully recovered files.\n    pub recovered: Vec\u003cRecoveredFile\u003e,\n}\n\n// ── Public entry point ───────────────────────────────────────────────────────\n\n/// Attempt recovery of fragmented / truncated JPEGs identified by a prior\n/// carve run.\n///\n/// # Arguments\n///\n/// * `image_path`  – path to the original source disk image\n/// * `report_path` – path to the `carve_report.json` from the carve run\n/// * `output_dir`  – directory where recovered files and the recovery report\n///   will be written (created if absent)\n/// * `config`      – tuning parameters; use [`RecoveryConfig::default`] for\n///   sensible defaults\npub fn recover_fragmented_jpegs(\n    image_path: \u0026str,\n    report_path: \u0026str,\n    output_dir: \u0026str,\n    config: \u0026RecoveryConfig,\n) -\u003e Result\u003cRecoveryReport\u003e {\n    fs::create_dir_all(output_dir)\n        .with_context(|| format!(\"Failed to create output directory: {output_dir}\"))?;\n\n    // ── Load carve report ────────────────────────────────────────────────────\n    let report_json = fs::read_to_string(report_path)\n        .with_context(|| format!(\"Failed to read report: {report_path}\"))?;\n    let report: CarveReport = serde_json::from_str(\u0026report_json)\n        .with_context(|| format!(\"Failed to parse report: {report_path}\"))?;\n\n    // ── Collect incomplete JPEG file objects ─────────────────────────────────\n    let incomplete: Vec\u003c_\u003e = report\n        .fileobjects\n        .iter()\n        .filter(|fo| {\n            fo.file_type == \"jpeg\"\n                \u0026\u0026 fo\n                    .jpeg_scan\n                    .as_ref()\n                    .map(|js| js.status != JpegScanStatus::Complete)\n                    .unwrap_or(false)\n        })\n        .collect();\n\n    let incomplete_count = incomplete.len();\n\n    // ── Open source image ────────────────────────────────────────────────────\n    let mut image = File::open(image_path)\n        .with_context(|| format!(\"Failed to open source image: {image_path}\"))?;\n    let image_size = image\n        .metadata()\n        .with_context(|| \"Failed to read image metadata\")?\n        .len();\n\n    let mut recovered_files: Vec\u003cRecoveredFile\u003e = Vec::new();\n\n    for fo in \u0026incomplete {\n        // The first byte_run holds the absolute image offset and fragment size.\n        let Some(run) = fo.byte_runs.first() else {\n            continue;\n        };\n        let header_img_offset = run.img_offset;\n        let fragment_size = run.len as usize;\n\n        // ── Read the header fragment ─────────────────────────────────────────\n        image\n            .seek(SeekFrom::Start(header_img_offset))\n            .with_context(|| \"Failed to seek in image\")?;\n        let mut header_fragment = vec![0u8; fragment_size];\n        let n = image\n            .read(\u0026mut header_fragment)\n            .with_context(|| \"Failed to read header fragment\")?;\n        header_fragment.truncate(n);\n\n        if header_fragment.len() \u003c 4 {\n            continue; // too short to be a useful JPEG fragment\n        }\n\n        // Determine where we should start searching for continuations.\n        // For fragmented files, prefer starting from the detected fragmentation\n        // point; for truncated files, start from the end of the carved fragment.\n        let scan_info = fo\n            .jpeg_scan\n            .as_ref()\n            .expect(\"jpeg_scan is Some — guaranteed by the filter that built `incomplete`\");\n        let search_start_offset: u64 =\n            scan_info.fragmentation_point_img_offset.unwrap_or_else(|| {\n                // Truncated: continue from end of fragment\n                header_img_offset + fragment_size as u64\n            });\n\n        // ── Score candidate continuation blocks ──────────────────────────────\n        let block_size = config.block_size as u64;\n        // Align search_start to block boundary\n        let aligned_start = (search_start_offset / block_size) * block_size;\n\n        // Collect (entropy, absolute_offset) pairs for all candidate blocks.\n        let mut candidates: Vec\u003c(f64, u64)\u003e = Vec::new();\n\n        let window_end = cmp::min(\n            aligned_start + config.search_window as u64,\n            image_size.saturating_sub(block_size),\n        );\n\n        let mut block_offset = aligned_start;\n        let mut block_buf = vec![0u8; config.block_size];\n\n        while block_offset \u003c window_end {\n            // Skip the block that contains the original fragment to avoid\n            // re-splicing the same data.\n            let in_original = block_offset \u003e= header_img_offset\n                \u0026\u0026 block_offset \u003c header_img_offset + fragment_size as u64;\n\n            if !in_original \u0026\u0026 image.seek(SeekFrom::Start(block_offset)).is_ok() {\n                // Skip blocks that fail to read (e.g. corrupted image regions).\n                let Ok(read_n) = image.read(\u0026mut block_buf) else {\n                    block_offset += block_size;\n                    continue;\n                };\n                if read_n \u003e= MIN_CANDIDATE_READ_BYTES {\n                    let entropy = byte_entropy(\u0026block_buf[..read_n]);\n                    if entropy \u003e= config.min_entropy_score {\n                        candidates.push((entropy, block_offset));\n                    }\n                }\n            }\n\n            block_offset += block_size;\n        }\n\n        // Sort descending by entropy; keep a wider pool for Layer 1 to filter.\n        candidates.sort_by(|a, b| b.0.total_cmp(\u0026a.0));\n        candidates.truncate(config.max_candidates * CANDIDATE_POOL_FACTOR);\n\n        // Always include the direct continuation block (just past the fragment).\n        // The .any() scan is O(n) but `candidates` is bounded by max_candidates *\n        // CANDIDATE_POOL_FACTOR (typically ≤ 9), so linear search is acceptable.\n        let direct_offset = header_img_offset + fragment_size as u64;\n        if direct_offset \u003c image_size \u0026\u0026 !candidates.iter().any(|\u0026(_, o)| o == direct_offset) {\n            candidates.insert(0, (0.0_f64, direct_offset));\n        }\n\n        // ── Parse Huffman context from the header fragment (once per JPEG) ───\n        let huffman_ctx = if config.huffman_validation {\n            jpeg_huffman::parse_huffman_context(\u0026header_fragment)\n        } else {\n            None\n        };\n\n        // ── Layer 1: FF-byte validity filter ─────────────────────────────────\n        // Score each entropy candidate by the fraction of its FF bytes that\n        // are followed by a byte valid in JPEG scan data.\n        struct ScoredCandidate {\n            entropy: f64,\n            offset: u64,\n            ff_validity: f64,\n        }\n\n        let mut check_buf = vec![0u8; config.block_size];\n        let mut scored: Vec\u003cScoredCandidate\u003e = Vec::new();\n        for (entropy, offset) in \u0026candidates {\n            image\n                .seek(SeekFrom::Start(*offset))\n                .with_context(|| \"Failed to seek for FF-byte check\")?;\n            // Skip blocks that can't be read (e.g. corrupted image regions).\n            let Ok(n) = image.read(\u0026mut check_buf) else {\n                continue;\n            };\n            if n \u003c MIN_CANDIDATE_READ_BYTES {\n                continue;\n            }\n            let ff_score = jpeg_huffman::ff_byte_validity_score(\u0026check_buf[..n]);\n            // Always pass the direct continuation through regardless of ff score.\n            if ff_score \u003c config.min_ff_validity_score \u0026\u0026 *offset != direct_offset {\n                continue;\n            }\n            scored.push(ScoredCandidate {\n                entropy: *entropy,\n                offset: *offset,\n                ff_validity: ff_score,\n            });\n        }\n\n        // Sort by ff_validity desc, entropy as tiebreaker; keep top N.\n        scored.sort_by(|a, b| {\n            b.ff_validity\n                .partial_cmp(\u0026a.ff_validity)\n                .unwrap_or(std::cmp::Ordering::Equal)\n                .then(\n                    b.entropy\n                        .partial_cmp(\u0026a.entropy)\n                        .unwrap_or(std::cmp::Ordering::Equal),\n                )\n        });\n        scored.truncate(config.max_candidates);\n\n        // ── Layer 2: Huffman MCU decode validation ────────────────────────────\n        // Read each surviving candidate's continuation data, count valid MCUs,\n        // then re-rank by MCU count.  The continuation buffer is retained for\n        // later reassembly to avoid a second large read.\n        struct RankedCandidate {\n            entropy: f64,\n            offset: u64,\n            ff_validity: f64,\n            mcu_count: Option\u003cusize\u003e,\n            cont_buf: Vec\u003cu8\u003e,\n        }\n\n        // Pre-allocate a single scratch buffer; per-candidate data is copied out after reading.\n        let mut cont_scratch = vec![0u8; config.search_window];\n        let mut ranked: Vec\u003cRankedCandidate\u003e = Vec::new();\n        for sc in scored {\n            image\n                .seek(SeekFrom::Start(sc.offset))\n                .with_context(|| \"Failed to seek to continuation block\")?;\n            let read_size = cmp::min(\n                config.search_window,\n                image_size.saturating_sub(sc.offset) as usize,\n            );\n            let cont_n = image\n                .read(\u0026mut cont_scratch[..read_size])\n                .with_context(|| \"Failed to read continuation\")?;\n            if cont_n == 0 {\n                continue;\n            }\n            let cont_buf = cont_scratch[..cont_n].to_vec();\n\n            let mcu_count = huffman_ctx\n                .as_ref()\n                .map(|ctx| jpeg_huffman::count_valid_mcus(ctx, \u0026cont_buf));\n\n            ranked.push(RankedCandidate {\n                entropy: sc.entropy,\n                offset: sc.offset,\n                ff_validity: sc.ff_validity,\n                mcu_count,\n                cont_buf,\n            });\n        }\n\n        if config.huffman_validation \u0026\u0026 huffman_ctx.is_some() {\n            // Best Huffman match first; ff_validity and entropy break ties.\n            ranked.sort_by(|a, b| {\n                b.mcu_count\n                    .unwrap_or(0)\n                    .cmp(\u0026a.mcu_count.unwrap_or(0))\n                    .then(\n                        b.ff_validity\n                            .partial_cmp(\u0026a.ff_validity)\n                            .unwrap_or(std::cmp::Ordering::Equal),\n                    )\n                    .then(\n                        b.entropy\n                            .partial_cmp(\u0026a.entropy)\n                            .unwrap_or(std::cmp::Ordering::Equal),\n                    )\n            });\n        }\n\n        // ── Reassembly: write the single best candidate that contains EOI ─────\n        let original_stem: Cow\u003cstr\u003e = Path::new(\u0026fo.filename)\n            .file_stem()\n            .map(|s| s.to_string_lossy())\n            .unwrap_or_else(|| Cow::Borrowed(fo.filename.as_str()));\n\n        for rc in ranked {\n            // Reassemble: header_fragment + continuation, then look for EOI.\n            let mut reassembled = Vec::with_capacity(header_fragment.len() + rc.cont_buf.len());\n            reassembled.extend_from_slice(\u0026header_fragment);\n            reassembled.extend_from_slice(\u0026rc.cont_buf);\n\n            if let Some(eoi_pos) = find_eoi(\u0026reassembled) {\n                let valid_data = \u0026reassembled[..eoi_pos + 2]; // include FF D9\n\n                let recovered_filename = format!(\"{original_stem}_recovered.jpg\");\n                let out_path = format!(\"{output_dir}/{recovered_filename}\");\n\n                let mut out_file = File::create(\u0026out_path)\n                    .with_context(|| format!(\"Failed to create output file: {out_path}\"))?;\n                out_file\n                    .write_all(valid_data)\n                    .with_context(|| format!(\"Failed to write recovered file: {out_path}\"))?;\n                out_file.flush()?;\n\n                let method = if rc.offset == direct_offset {\n                    RecoveryMethod::DirectContinuation\n                } else {\n                    RecoveryMethod::FragmentReassembly\n                };\n\n                recovered_files.push(RecoveredFile {\n                    original_filename: fo.filename.clone(),\n                    recovered_filename,\n                    recovery_method: method,\n                    entropy_score: rc.entropy,\n                    header_img_offset,\n                    continuation_img_offset: rc.offset,\n                    recovered_size: valid_data.len(),\n                    ff_validity_score: Some(rc.ff_validity),\n                    huffman_mcu_count: rc.mcu_count,\n                });\n                break; // write only the best candidate\n            }\n        }\n    }\n\n    // ── Write recovery report ────────────────────────────────────────────────\n    let recovery_report = RecoveryReport {\n        source_image: image_path.to_string(),\n        source_report: report_path.to_string(),\n        incomplete_jpegs: incomplete_count,\n        recovered: recovered_files,\n    };\n\n    let report_out = format!(\"{output_dir}/recover_report.json\");\n    let json = serde_json::to_string_pretty(\u0026recovery_report)?;\n    let mut f = File::create(\u0026report_out)\n        .with_context(|| format!(\"Failed to create recover_report.json at {report_out}\"))?;\n    f.write_all(json.as_bytes())?;\n    f.flush()?;\n\n    Ok(recovery_report)\n}\n\n// ── Internal helpers ──────────────────────────────────────────────────────────\n\n/// Calculate the Shannon entropy of a byte slice in bits per byte (0.0 – 8.0).\n///\n/// Higher values (approaching 8.0) indicate compressed or encrypted data;\n/// JPEG compressed scan data typically scores above 7.5.\npub fn byte_entropy(data: \u0026[u8]) -\u003e f64 {\n    if data.is_empty() {\n        return 0.0;\n    }\n    let mut counts = [0u32; 256];\n    for \u0026b in data {\n        counts[b as usize] += 1;\n    }\n    let n = data.len() as f64;\n    counts\n        .iter()\n        .filter(|\u0026\u0026c| c \u003e 0)\n        .map(|\u0026c| {\n            let p = c as f64 / n;\n            -p * p.log2()\n        })\n        .sum()\n}\n\n/// Find the offset of the first FFD9 (EOI) byte pair in `data`.\nfn find_eoi(data: \u0026[u8]) -\u003e Option\u003cusize\u003e {\n    if data.len() \u003c 2 {\n        return None;\n    }\n    (0..=data.len() - 2).find(|\u0026i| data[i] == 0xFF \u0026\u0026 data[i + 1] == 0xD9)\n}\n\n// ── Tests ─────────────────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_byte_entropy_uniform() {\n        // All bytes equal → entropy = 0\n        let data = vec![0x42u8; 256];\n        assert!(byte_entropy(\u0026data) \u003c 0.001);\n    }\n\n    #[test]\n    fn test_byte_entropy_max() {\n        // One of each byte value → maximum entropy ≈ 8.0\n        let data: Vec\u003cu8\u003e = (0..=255u8).collect();\n        let e = byte_entropy(\u0026data);\n        assert!((e - 8.0_f64).abs() \u003c 0.001);\n    }\n\n    #[test]\n    fn test_byte_entropy_empty() {\n        assert_eq!(byte_entropy(\u0026[]), 0.0);\n    }\n\n    #[test]\n    fn test_find_eoi_present() {\n        let data = [0x12, 0x34, 0xFF, 0xD9, 0x56];\n        assert_eq!(find_eoi(\u0026data), Some(2));\n    }\n\n    #[test]\n    fn test_find_eoi_absent() {\n        let data = [0x12, 0x34, 0x56, 0x78];\n        assert_eq!(find_eoi(\u0026data), None);\n    }\n\n    #[test]\n    fn test_find_eoi_at_start() {\n        let data = [0xFF, 0xD9, 0x00];\n        assert_eq!(find_eoi(\u0026data), Some(0));\n    }\n}\n","traces":[{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":162,"address":[],"length":0,"stats":{"Line":0}},{"line":168,"address":[],"length":0,"stats":{"Line":0}},{"line":169,"address":[],"length":0,"stats":{"Line":0}},{"line":172,"address":[],"length":0,"stats":{"Line":0}},{"line":173,"address":[],"length":0,"stats":{"Line":0}},{"line":174,"address":[],"length":0,"stats":{"Line":0}},{"line":175,"address":[],"length":0,"stats":{"Line":0}},{"line":178,"address":[],"length":0,"stats":{"Line":0}},{"line":179,"address":[],"length":0,"stats":{"Line":0}},{"line":181,"address":[],"length":0,"stats":{"Line":0}},{"line":182,"address":[],"length":0,"stats":{"Line":0}},{"line":183,"address":[],"length":0,"stats":{"Line":0}},{"line":184,"address":[],"length":0,"stats":{"Line":0}},{"line":185,"address":[],"length":0,"stats":{"Line":0}},{"line":186,"address":[],"length":0,"stats":{"Line":0}},{"line":187,"address":[],"length":0,"stats":{"Line":0}},{"line":191,"address":[],"length":0,"stats":{"Line":0}},{"line":194,"address":[],"length":0,"stats":{"Line":0}},{"line":195,"address":[],"length":0,"stats":{"Line":0}},{"line":196,"address":[],"length":0,"stats":{"Line":0}},{"line":198,"address":[],"length":0,"stats":{"Line":0}},{"line":201,"address":[],"length":0,"stats":{"Line":0}},{"line":203,"add tate::new(\u0026args).await?;\n//! ```\n\npub mod engine;\npub mod jpeg_huffman;\npub mod jpeg_recover;\npub mod reporting;\npub mod search;\npub mod search_specs;\npub mod types;\n\n// Re-export commonly used types\npub use engine::{search_buffer, search_stream_with_progress};\npub use jpeg_recover::{RecoveryConfig, RecoveryReport, recover_fragmented_jpegs};\npub use reporting::{\n    JsonReporter, Reporter, StateReporting, ThreadSafeReporter, create_file_object,\n};\npub use search_specs::{get_combined_search_specs, init_all_search_specs, save_specs_to_toml};\npub use types::{\n    ByteRun, CarveReport, ExecutionEnvironment, FileInfo, FileObject, FileType, JpegScanInfo,\n    JpegScanStatus, Mode, SearchSpec, SearchType, State,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","reporting.rs"],"content":"//! Reporting module for file carving results\n//!\n//! This module provides a trait-based system for generating reports about\n//! carved files. Different report formats can be implemented by creating\n//! types that implement the `Reporter` trait.\n\nuse anyhow::{Result, anyhow};\nuse serde_json;\nuse std::fs::File;\nuse std::io::Write;\nuse std::sync::{Arc, Mutex};\nuse tracing::info;\n\nuse crate::types::{ByteRun, CarveReport, FileObject, FileType, JpegScanInfo};\n\n/// Trait for different reporting implementations\npub trait Reporter {\n    /// Initialize the reporter with source file information\n    fn initialize(\u0026mut self, source_filename: \u0026str, source_size: u64) -\u003e Result\u003c()\u003e;\n\n    /// Add a carved file to the report\n    fn add_file(\u0026mut self, file_object: FileObject) -\u003e Result\u003c()\u003e;\n\n    /// Finalize and write the report\n    fn finalize(\u0026mut self) -\u003e Result\u003c()\u003e;\n}\n\n/// JSON reporter that outputs a structured JSON report similar to PhotoRec's XML format\npub struct JsonReporter {\n    report: Option\u003cCarveReport\u003e,\n    output_path: String,\n}\n\nimpl JsonReporter {\n    /// Create a new JSON reporter with a default report\n    pub fn new(output_directory: \u0026str) -\u003e Self {\n        let output_path = format!(\"{}/carve_report.json\", output_directory);\n        Self {\n            report: None,\n            output_path,\n        }\n    }\n\n    /// Create a new JSON reporter with a pre-configured CarveReport\n    pub fn new_with_report(output_directory: \u0026str, report: CarveReport) -\u003e Self {\n        let output_path = format!(\"{}/carve_report.json\", output_directory);\n        Self {\n            report: Some(report),\n            output_path,\n        }\n    }\n}\n\nimpl Reporter for JsonReporter {\n    fn initialize(\u0026mut self, source_filename: \u0026str, source_size: u64) -\u003e Result\u003c()\u003e {\n        if self.report.is_none() {\n            self.report = Some(CarveReport::new(source_filename, source_size));\n        } else {\n            // If we already have a report, just update the source info\n            if let Some(ref mut report) = self.report {\n                report.source.image_filename = source_filename.to_string();\n                report.source.image_size = source_size;\n                report.source.volume.byte_runs = vec![ByteRun {\n                    offset: 0,\n                    img_offset: 0,\n                    len: source_size,\n                }];\n            }\n        }\n        Ok(())\n    }\n\n    fn add_file(\u0026mut self, file_object: FileObject) -\u003e Result\u003c()\u003e {\n        if let Some(ref mut report) = self.report {\n            report.add_file_object(file_object);\n        }\n        Ok(())\n    }\n\n    fn finalize(\u0026mut self) -\u003e Result\u003c()\u003e {\n        if let Some(ref report) = self.report {\n            let json_output = serde_json::to_string_pretty(report)?;\n            let mut file = File::create(\u0026self.output_path)?;\n            file.write_all(json_output.as_bytes())?;\n            file.flush()?;\n\n            info!(\"Report written to: {}\", self.output_path);\n        }\n        Ok(())\n    }\n}\n\n/// Thread-safe wrapper for a Reporter\npub struct ThreadSafeReporter {\n    inner: Arc\u003cMutex\u003cBox\u003cdyn Reporter + Send\u003e\u003e\u003e,\n}\n\nimpl ThreadSafeReporter {\n    /// Create a new thread-safe reporter\n    pub fn new(reporter: Box\u003cdyn Reporter + Send\u003e) -\u003e Self {\n        Self {\n            inner: Arc::new(Mutex::new(reporter)),\n        }\n    }\n\n    /// Initialize the reporter\n    pub fn initialize(\u0026self, source_filename: \u0026str, source_size: u64) -\u003e Result\u003c()\u003e {\n        let mut reporter = self\n            .inner\n            .lock()\n            .map_err(|_| anyhow!(\"Failed to acquire reporter lock\"))?;\n        reporter.initialize(source_filename, source_size)\n    }\n\n    /// Add a file to the report\n    pub fn add_file(\u0026self, file_object: FileObject) -\u003e Result\u003c()\u003e {\n        let mut reporter = self\n            .inner\n            .lock()\n            .map_err(|_| anyhow!(\"Failed to acquire reporter lock\"))?;\n        reporter.add_file(file_object)\n    }\n\n    /// Finalize the report\n    pub fn finalize(\u0026self) -\u003e Result\u003c()\u003e {\n        let mut reporter = self\n            .inner\n            .lock()\n            .map_err(|_| anyhow!(\"Failed to acquire reporter lock\"))?;\n        reporter.finalize()\n    }\n}\n\nimpl Clone for ThreadSafeReporter {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            inner: Arc::clone(\u0026self.inner),\n        }\n    }\n}\n\n/// Helper function to create a FileObject from carving parameters.\n///\n/// `jpeg_scan` is `Some` only for JPEG file objects; it carries structural\n/// metadata about the carved scan data (dimensions, completeness status, …).\npub fn create_file_object(\n    filename: \u0026str,\n    file_type: FileType,\n    file_size: u64,\n    img_offset: u64,\n    jpeg_scan: Option\u003cJpegScanInfo\u003e,\n) -\u003e FileObject {\n    FileObject {\n        filename: filename.to_string(),\n        filesize: file_size,\n        file_type: format!(\"{:?}\", file_type).to_lowercase(),\n        byte_runs: vec![ByteRun {\n            offset: 0,\n            img_offset,\n            len: file_size,\n        }],\n        jpeg_scan,\n    }\n}\n\n/// Extension trait to add reporting capabilities to State\npub trait StateReporting {\n    /// Get the reporter if reporting is enabled\n    fn get_reporter(\u0026self) -\u003e Option\u003c\u0026ThreadSafeReporter\u003e;\n\n    /// Add a carved file to the report (if reporting is enabled).\n    ///\n    /// `jpeg_scan` carries JPEG-specific structural metadata and should be\n    /// `Some` only for JPEG file objects.\n    fn report_file(\n        \u0026self,\n        filename: \u0026str,\n        file_type: FileType,\n        file_size: u64,\n        img_offset: u64,\n        jpeg_scan: Option\u003cJpegScanInfo\u003e,\n    ) -\u003e Result\u003c()\u003e;\n}\n\n// We'll implement this when we extend the State struct\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_json_reporter() {\n        let temp_dir = TempDir::new().expect(\"Failed to create temp directory\");\n        let mut reporter = JsonReporter::new(temp_dir.path().to_str().unwrap());\n\n        // Initialize reporter\n        reporter.initialize(\"test.img\", 1024 * 1024).unwrap();\n\n        // Add some test files\n        let file1 = FileObject {\n            filename: \"test1.jpg\".to_string(),\n            filesize: 2048,\n            file_type: \"jpeg\".to_string(),\n            byte_runs: vec![ByteRun {\n                offset: 0,\n                img_offset: 512,\n                len: 2048,\n            }],\n            jpeg_scan: None,\n        };\n\n        let file2 = FileObject {\n            filename: \"test2.pdf\".to_string(),\n            filesize: 4096,\n            file_type: \"pdf\".to_string(),\n            byte_runs: vec![ByteRun {\n                offset: 0,\n                img_offset: 8192,\n                len: 4096,\n            }],\n            jpeg_scan: None,\n        };\n\n        reporter.add_file(file1).unwrap();\n        reporter.add_file(file2).unwrap();\n\n        // Finalize and check output\n        reporter.finalize().unwrap();\n\n        let report_path = temp_dir.path().join(\"carve_report.json\");\n        assert!(report_path.exists());\n\n        // Verify the JSON content\n        let content = fs::read_to_string(\u0026report_path).unwrap();\n        let parsed: serde_json::Value = serde_json::from_str(\u0026content).unwrap();\n\n        assert_eq!(parsed[\"metadata\"][\"dc_type\"], \"Carve Report\");\n        assert_eq!(parsed[\"creator\"][\"package\"], \"Utmost\");\n        assert_eq!(parsed[\"source\"][\"image_filename\"], \"test.img\");\n        assert_eq!(parsed[\"source\"][\"image_size\"], 1024 * 1024);\n        assert_eq!(parsed[\"fileobjects\"].as_array().unwrap().len(), 2);\n    }\n\n    #[test]\n    fn test_create_file_object() {\n        let file_obj = create_file_object(\"test.jpg\", FileType::Jpeg, 1024, 512, None);\n\n        assert_eq!(file_obj.filename, \"test.jpg\");\n        assert_eq!(file_obj.filesize, 1024);\n        assert_eq!(file_obj.file_type, \"jpeg\");\n        assert_eq!(file_obj.byte_runs.len(), 1);\n        assert_eq!(file_obj.byte_runs[0].offset, 0);\n        assert_eq!(file_obj.byte_runs[0].img_offset, 512);\n        assert_eq!(file_obj.byte_runs[0].len, 1024);\n    }\n\n    #[test]\n    fn test_thread_safe_reporter() {\n        let temp_dir = TempDir::new().expect(\"Failed to create temp directory\");\n        let json_reporter = JsonReporter::new(temp_dir.path().to_str().unwrap());\n        let reporter = ThreadSafeReporter::new(Box::new(json_reporter));\n\n        // Test initialization\n        reporter.initialize(\"test.img\", 1024).unwrap();\n\n        // Test adding a file\n        let file_obj = create_file_object(\"test.jpg\", FileType::Jpeg, 512, 256, None);\n        reporter.add_file(file_obj).unwrap();\n\n        // Test finalization\n        reporter.finalize().unwrap();\n\n        let report_path = temp_dir.path().join(\"carve_report.json\");\n        assert!(report_path.exists());\n    }\n}\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":0}},{"lin             pattern_len: pattern.len(),\n            case_sensitive,\n            search_type,\n        };\n\n        bm.build_bad_char_table();\n        bm\n    }\n\n    /// Build the bad character table for Boyer-Moore\n    fn build_bad_char_table(\u0026mut self) {\n        // Initialize all entries to pattern length\n        for i in 0..256 {\n            self.bad_char_table[i] = self.pattern_len;\n        }\n\n        // Fill the table based on search type\n        for (i, \u0026byte) in self.pattern.iter().enumerate() {\n            let current_index = match self.search_type {\n                SearchType::Reverse =\u003e i,\n                _ =\u003e self.pattern_len - i - 1,\n            };\n\n            // Handle wildcard\n            if byte == WILDCARD {\n                for j in 0..256 {\n                    self.bad_char_table[j] = current_index;\n                }\n            }\n\n            self.bad_char_table[byte as usize] = current_index;\n\n            // Handle case insensitive matching\n            if !self.case_sensitive {\n                let lower = byte.to_ascii_lowercase();\n                let upper = byte.to_ascii_uppercase();\n                self.bad_char_table[lower as usize] = current_index;\n                self.bad_char_table[upper as usize] = current_index;\n            }\n        }\n    }\n\n    /// Search for the pattern in the haystack\n    pub fn search(\u0026self, haystack: \u0026[u8]) -\u003e Option\u003cusize\u003e {\n        self.search_from(haystack, 0)\n    }\n\n    /// Search for the pattern starting from a specific position\n    pub fn search_from(\u0026self, haystack: \u0026[u8], start_pos: usize) -\u003e Option\u003cusize\u003e {\n        if self.pattern_len == 0 {\n            return Some(0);\n        }\n\n        if haystack.len() \u003c self.pattern_len || start_pos \u003e= haystack.len() {\n            return None;\n        }\n\n        match self.search_type {\n            SearchType::Forward | SearchType::ForwardNext =\u003e {\n                self.search_forward(haystack, start_pos)\n            }\n            SearchType::Reverse =\u003e self.search_reverse(haystack, start_pos),\n            SearchType::Ascii =\u003e self.search_ascii(haystack, start_pos),\n        }\n    }\n\n    /// Forward search implementation\n    pub fn search_forward(\u0026self, haystack: \u0026[u8], start_pos: usize) -\u003e Option\u003cusize\u003e {\n        if self.pattern_len \u003e haystack.len() {\n            return None;\n        }\n\n        let mut pos = start_pos + self.pattern_len.saturating_sub(1);\n\n        while pos \u003c haystack.len() {\n            // short-circuit if we can't have a match here\n            if pos + 1 \u003c self.pattern_len {\n                break;\n            }\n\n            let shift = self.bad_char_table[haystack[pos] as usize];\n\n            if shift == 0 {\n                // potential match - check full pattern\n                if pos + 1 \u003e= self.pattern_len {\n                    let match_start = pos + 1 - self.pattern_len;\n                    if self.matches_at_position(haystack, match_start) {\n                        return Some(match_start);\n                    }\n                }\n                pos += 1;\n            } else {\n                pos += shift;\n            }\n        }\n\n        None\n    }\n\n    /// Reverse search implementation\n    fn search_reverse(\u0026self, haystack: \u0026[u8], start_pos: usize) -\u003e Option\u003cusize\u003e {\n        let mut pos = start_pos;\n\n        while pos \u003c haystack.len() {\n            let char_index = haystack[haystack.len() - pos - 1] as usize;\n            let shift = self.bad_char_table[char_index];\n\n            if shift == 0 {\n                let match_start = haystack.len() - pos - 1;\n                if match_start + self.pattern_len \u003c= haystack.len()\n                    \u0026\u0026 self.matches_at_position(haystack, match_start)\n                {\n                    return Some(match_start);\n                }\n                pos += 1;\n            } else {\n                pos += shift;\n            }\n        }\n\n        None\n    }\n\n    /// ASCII search implementation for text files\n    fn search_ascii(\u0026self, haystack: \u0026[u8], start_pos: usize) -\u003e Option\u003cusize\u003e {\n        // For ASCII search, we look for printable text regions\n        let mut start = start_pos;\n\n        // Find start of printable region going backward\n        while start \u003e 0 \u0026\u0026 is_printable_or_whitespace(haystack[start - 1]) {\n            start -= 1;\n        }\n\n        // Find end of printable region going forward\n        let mut end = start_pos;\n        while end \u003c haystack.len() \u0026\u0026 is_printable_or_whitespace(haystack[end]) {\n            end += 1;\n        }\n\n        // Search within the printable region\n        if end \u003e start {\n            return self\n                .search_forward(\u0026haystack[start..end], 0)\n                .map(|pos| pos + start);\n        }\n\n        None\n    }\n\n    /// Check if pattern matches at a specific position in haystack\n    #[inline(always)]\n    fn matches_at_position(\u0026self, haystack: \u0026[u8], pos: usize) -\u003e bool {\n        if pos + self.pattern_len \u003e haystack.len() {\n            return false;\n        }\n\n        for i in 0..self.pattern_len {\n            if !self.chars_match(self.pattern[i], haystack[pos + i]) {\n                return false;\n            }\n        }\n\n        true\n    }\n\n    /// Check if two characters match (considering case sensitivity and wildcards)\n    fn chars_match(\u0026self, pattern_char: u8, text_char: u8) -\u003e bool {\n        if pattern_char == WILDCARD {\n            return true;\n        }\n\n        if self.case_sensitive {\n            pattern_char == text_char\n        } else {\n            pattern_char.eq_ignore_ascii_case(\u0026text_char)\n        }\n    }\n}\n\n/// Check if a byte represents a printable character or whitespace\nfn is_printable_or_whitespace(byte: u8) -\u003e bool {\n    byte.is_ascii_graphic() || byte == b' ' || byte == b'\\n' || byte == b'\\r' || byte == b'\\t'\n}\n\n/// Wildcard-aware memory comparison\npub fn memwildcardcmp(pattern: \u0026[u8], text: \u0026[u8], case_sensitive: bool) -\u003e bool {\n    if pattern.len() != text.len() {\n        return false;\n    }\n\n    for (i, \u0026pattern_byte) in pattern.iter().enumerate() {\n        if pattern_byte == WILDCARD {\n            continue;\n        }\n\n        let text_byte = text[i];\n        let matches = if case_sensitive {\n            pattern_byte == text_byte\n        } else {\n            pattern_byte.eq_ignore_ascii_case(\u0026text_byte)\n        };\n\n        if !matches {\n            return false;\n        }\n    }\n\n    true\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_boyer_moore_basic_search() {\n        let bm = BoyerMoore::new(b\"test\", true, SearchType::Forward);\n        let haystack = b\"this is a test string\";\n\n        assert_eq!(bm.search(haystack), Some(10));\n    }\n\n    #[test]\n    fn test_boyer_moore_case_insensitive() {\n        let bm = BoyerMoore::new(b\"TEST\", false, SearchType::Forward);\n        let haystack = b\"this is a test string\";\n\n        assert_eq!(bm.search(haystack), Some(10));\n    }\n\n    #[test]\n    fn test_boyer_moore_wildcard() {\n        let pattern = [b't', WILDCARD, b's', b't'];\n        let bm = BoyerMoore::new(\u0026pattern, true, SearchType::Forward);\n        let haystack = b\"this is a test string\";\n\n        assert_eq!(bm.search(haystack), Some(10));\n    }\n\n    #[test]\n    fn test_boyer_moore_not_found() {\n        let bm = BoyerMoore::new(b\"xyz\", true, SearchType::Forward);\n        let haystack = b\"this is a test string\";\n\n        assert_eq!(bm.search(haystack), None);\n    }\n\n    #[test]\n    fn test_boyer_moore_empty_pattern() {\n        let bm = BoyerMoore::new(b\"\", true, SearchType::Forward);\n        let haystack = b\"test\";\n\n        assert_eq!(bm.search(haystack), Some(0));\n    }\n\n    #[test]\n    fn test_boyer_moore_empty_haystack() {\n        let bm = BoyerMoore::new(b\"test\", true, SearchType::Forward);\n        let haystack = b\"\";\n\n        assert_eq!(bm.search(haystack), None);\n    }\n\n    #[test]\n    fn test_boyer_moore_pattern_longer_than_haystack() {\n        let bm = BoyerMoore::new(b\"very long pattern\", true, SearchType::Forward);\n        let haystack = b\"short\";\n\n        assert_eq!(bm.search(haystack), None);\n    }\n\n    #[test]\n    fn test_boyer_moore_search_from() {\n        let bm = BoyerMoore::new(b\"test\", true, SearchType::Forward);\n        let haystack = b\"test test test\";\n\n        assert_eq!(bm.search_from(haystack, 0), Some(0));\n        assert_eq!(bm.search_from(haystack, 1), Some(5));\n        assert_eq!(bm.search_from(haystack, 6), Some(10));\n        assert_eq!(bm.search_from(haystack, 11), None);\n    }\n\n    #[test]\n    fn test_boyer_moore_reverse_search() {\n        let bm = BoyerMoore::new(b\"test\", true, SearchType::Reverse);\n        let haystack = b\"this is a test string\";\n\n        // Note: Reverse search finds patterns from the end\n        if let Some(pos) = bm.search(haystack) {\n            assert_eq!(\u0026haystack[pos..pos + 4], b\"test\");\n        }\n    }\n\n    #[test]\n    fn test_boyer_moore_ascii_search() {\n        let bm = BoyerMoore::new(b\"hello\", true, SearchType::Ascii);\n        let haystack = b\"hello world this is text\";\n\n        assert_eq!(bm.search(haystack), Some(0));\n    }\n\n    #[test]\n    fn test_multiple_wildcards() {\n        let pattern = [WILDCARD, b'P', b'D', b'F', WILDCARD];\n        let bm = BoyerMoore::new(\u0026pattern, true, SearchType::Forward);\n        let haystack = b\"This is a %PDF-1.4 document\";\n\n        assert_eq!(bm.search(haystack), Some(10));\n    }\n\n    #[test]\n    fn test_case_insensitive_with_mixed_case() {\n        let bm = BoyerMoore::new(b\"TeSt\", false, SearchType::Forward);\n        let haystack = b\"this is a TEST string and another test here\";\n\n        assert_eq!(bm.search(haystack), Some(10));\n    }\n\n    #[test]\n    fn test_matches_at_position() {\n        let bm = BoyerMoore::new(b\"test\", true, SearchType::Forward);\n        let haystack = b\"test string\";\n\n        assert!(bm.matches_at_position(haystack, 0));\n        assert!(!bm.matches_at_position(haystack, 1));\n        assert!(!bm.matches_at_position(haystack, 5));\n    }\n\n    #[test]\n    fn test_chars_match() {\n        let bm = BoyerMoore::new(b\"\", true, SearchType::Forward);\n\n        // Case sensitive\n        assert!(bm.chars_match(b'a', b'a'));\n        assert!(!bm.chars_match(b'a', b'A'));\n        assert!(bm.chars_match(WILDCARD, b'x'));\n\n        let bm_case_insensitive = BoyerMoore::new(b\"\", false, SearchType::Forward);\n        assert!(bm_case_insensitive.chars_match(b'a', b'A'));\n        assert!(bm_case_insensitive.chars_match(b'Z', b'z'));\n    }\n\n    #[test]\n    fn test_is_printable_or_whitespace() {\n        assert!(is_printable_or_whitespace(b'a'));\n        assert!(is_printable_or_whitespace(b'Z'));\n        assert!(is_printable_or_whitespace(b'0'));\n        assert!(is_printable_or_whitespace(b' '));\n        assert!(is_printable_or_whitespace(b'\\n'));\n        assert!(is_printable_or_whitespace(b'\\r'));\n        assert!(is_printable_or_whitespace(b'\\t'));\n        assert!(!is_printable_or_whitespace(0x00));\n        assert!(!is_printable_or_whitespace(0xFF));\n    }\n\n    #[test]\n    fn test_memwildcardcmp() {\n        let pattern = [b't', WILDCARD, b's', b't'];\n        let text = b\"test\";\n\n        assert!(memwildcardcmp(\u0026pattern, text, true));\n\n        let text2 = b\"tast\";\n        assert!(memwildcardcmp(\u0026pattern, text2, true));\n\n        let text3 = b\"best\";\n        assert!(!memwildcardcmp(\u0026pattern, text3, true));\n    }\n\n    #[test]\n    fn test_memwildcardcmp_case_insensitive() {\n        let pattern = [b'T', WILDCARD, b'S', b'T'];\n        let text = b\"test\";\n\n        assert!(memwildcardcmp(\u0026pattern, text, false));\n        assert!(!memwildcardcmp(\u0026pattern, text, true));\n    }\n\n    #[test]\n    fn test_memwildcardcmp_length_mismatch() {\n        let pattern = [b't', b'e', b's', b't'];\n        let text = b\"te\";\n\n        assert!(!memwildcardcmp(\u0026pattern, text, true));\n\n        let text2 = b\"testing\";\n        assert!(!memwildcardcmp(\u0026pattern, text2, true));\n    }\n\n    #[test]\n    fn test_jpeg_signature() {\n        // Test JPEG file signature search\n        let jpeg_signature = [0xFF, 0xD8, 0xFF];\n        let bm = BoyerMoore::new(\u0026jpeg_signature, true, SearchType::Forward);\n\n        // Create a mock file with JPEG header\n        let mut data = vec![0x00; 100];\n        data[10] = 0xFF;\n        data[11] = 0xD8;\n        data[12] = 0xFF;\n        data[13] = 0xE0; // JFIF marker\n\n        assert_eq!(bm.search(\u0026data), Some(10));\n    }\n\n    #[test]\n    fn test_pdf_signature() {\n        // Test PDF file signature search\n        let pdf_signature = b\"%PDF-\";\n        let bm = BoyerMoore::new(pdf_signature, true, SearchType::Forward);\n\n        let data = b\"Some random data %PDF-1.4 rest of file\";\n        assert_eq!(bm.search(data), Some(17));\n    }\n}\n","traces":[{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],
