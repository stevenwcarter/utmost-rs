,"length":0,"stats":{"Line":0}},{"line":185,"address":[],"length":0,"stats":{"Line":0}},{"line":186,"address":[],"length":0,"stats":{"Line":0}},{"line":189,"address":[],"length":0,"stats":{"Line":0}},{"line":190,"address":[],"length":0,"stats":{"Line":0}},{"line":192,"address":[],"length":0,"stats":{"Line":0}},{"line":198,"address":[],"length":0,"stats":{"Line":0}},{"line":199,"address":[],"length":0,"stats":{"Line":0}},{"line":203,"address":[],"length":0,"stats":{"Line":0}},{"line":204,"address":[],"length":0,"stats":{"Line":0}},{"line":205,"address":[],"length":0,"stats":{"Line":0}},{"line":208,"address":[],"length":0,"stats":{"Line":0}},{"line":209,"address":[],"length":0,"stats":{"Line":0}},{"line":210,"address":[],"length":0,"stats":{"Line":0}},{"line":213,"address":[],"length":0,"stats":{"Line":0}},{"line":214,"address":[],"length":0,"stats":{"Line":0}},{"line":215,"address":[],"length":0,"stats":{"Line":0}},{"line":217,"address":[],"length":0,"stats":{"Line":0}},{"line":220,"address":[],"length":0,"stats":{"Line":0}},{"line":221,"address":[],"length":0,"stats":{"Line":0}},{"line":225,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":102},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","search_specs.rs"],"content":"use crate::types::{FileType, MEGABYTE, SearchSpec, SearchType};\nuse anyhow::{Context, Result};\nuse serde::{Deserialize, Serialize};\nuse std::collections::HashSet;\nuse std::{fs, path::Path};\n\n/// TOML-friendly wrapper for search specifications\n#[derive(Serialize, Deserialize)]\nstruct SearchSpecsConfig {\n    specs: Vec\u003cTomlSearchSpec\u003e,\n}\n\n/// TOML-friendly search specification\n#[derive(Serialize, Deserialize)]\nstruct TomlSearchSpec {\n    file_type: String,\n    suffix: String,\n    max_len: usize,\n    header: Vec\u003cu8\u003e,\n    footer: Option\u003cVec\u003cu8\u003e\u003e,\n    case_sensitive: bool,\n    search_type: String,\n    markers: Vec\u003cVec\u003cu8\u003e\u003e,\n    comment: String,\n}\n\nimpl From\u003cSearchSpec\u003e for TomlSearchSpec {\n    fn from(spec: SearchSpec) -\u003e Self {\n        Self {\n            file_type: format!(\"{:?}\", spec.file_type),\n            suffix: spec.suffix,\n            max_len: spec.max_len,\n            header: spec.header,\n            footer: spec.footer,\n            case_sensitive: spec.case_sensitive,\n            search_type: format!(\"{:?}\", spec.search_type),\n            markers: spec.markers.into_iter().map(|m| m.value).collect(),\n            comment: spec.comment,\n        }\n    }\n}\n\nimpl From\u003cTomlSearchSpec\u003e for SearchSpec {\n    fn from(toml_spec: TomlSearchSpec) -\u003e Self {\n        let file_type = match toml_spec.file_type.as_str() {\n            \"Jpeg\" =\u003e FileType::Jpeg,\n            \"Gif\" =\u003e FileType::Gif,\n            \"Bmp\" =\u003e FileType::Bmp,\n            \"Mpg\" =\u003e FileType::Mpg,\n            \"Pdf\" =\u003e FileType::Pdf,\n            \"Doc\" =\u003e FileType::Doc,\n            \"Avi\" =\u003e FileType::Avi,\n            \"Wmv\" =\u003e FileType::Wmv,\n            \"Htm\" =\u003e FileType::Htm,\n            \"Zip\" =\u003e FileType::Zip,\n            \"Mov\" =\u003e FileType::Mov,\n            \"Xls\" =\u003e FileType::Xls,\n            \"Ppt\" =\u003e FileType::Ppt,\n            \"Wpd\" =\u003e FileType::Wpd,\n            \"Cpp\" =\u003e FileType::Cpp,\n            \"Ole\" =\u003e FileType::Ole,\n            \"Gzip\" =\u003e FileType::Gzip,\n            \"Riff\" =\u003e FileType::Riff,\n            \"Wav\" =\u003e FileType::Wav,\n            \"VJpeg\" =\u003e FileType::VJpeg,\n            \"Sxw\" =\u003e FileType::Sxw,\n            \"Sxc\" =\u003e FileType::Sxc,\n            \"Sxi\" =\u003e FileType::Sxi,\n            \"Png\" =\u003e FileType::Png,\n            \"Rar\" =\u003e FileType::Rar,\n            \"Exe\" =\u003e FileType::Exe,\n            \"Elf\" =\u003e FileType::Elf,\n            \"Reg\" =\u003e FileType::Reg,\n            \"Docx\" =\u003e FileType::Docx,\n            \"Xlsx\" =\u003e FileType::Xlsx,\n            \"Pptx\" =\u003e FileType::Pptx,\n            \"Mp4\" =\u003e FileType::Mp4,\n            \"Config\" =\u003e FileType::Config,\n            _ =\u003e FileType::Config, // default fallback\n        };\n\n        let search_type = match toml_spec.search_type.as_str() {\n            \"Forward\" =\u003e SearchType::Forward,\n            \"Reverse\" =\u003e SearchType::Reverse,\n            \"ForwardNext\" =\u003e SearchType::ForwardNext,\n            \"Ascii\" =\u003e SearchType::Ascii,\n            _ =\u003e SearchType::Forward, // default fallback\n        };\n\n        let mut spec = SearchSpec::new(\n            file_type,\n            \u0026toml_spec.suffix,\n            \u0026toml_spec.header,\n            toml_spec.footer.as_deref(),\n            toml_spec.max_len,\n            toml_spec.case_sensitive,\n            search_type,\n        );\n\n        // Add markers\n        for marker_bytes in toml_spec.markers {\n            spec.add_marker(\u0026marker_bytes);\n        }\n\n        spec.comment = toml_spec.comment;\n        spec\n    }\n}\n\n/// Initialize all built-in search specifications\npub fn init_all_search_specs() -\u003e Vec\u003cSearchSpec\u003e {\n    let mut specs = Vec::new();\n\n    // JPEG files - use a more general signature that covers all JPEG variants\n    // JPEG files always start with FF D8 FF, followed by various possible markers\n    let jpeg = SearchSpec::new(\n        FileType::Jpeg,\n        \"jpg\",\n        \u0026[0xff, 0xd8, 0xff],\n        Some(\u0026[0xff, 0xd9]),\n        50 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(jpeg);\n\n    // GIF files\n    let mut gif = SearchSpec::new(\n        FileType::Gif,\n        \"gif\",\n        \u0026[0x47, 0x49, 0x46, 0x38], // \"GIF8\"\n        Some(\u0026[0x00, 0x3b]),\n        10 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    gif.add_marker(\u0026[0x00, 0x00, 0x3b]);\n    specs.push(gif);\n\n    // BMP files\n    let bmp = SearchSpec::new(\n        FileType::Bmp,\n        \"bmp\",\n        b\"BM\",\n        None,\n        2 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(bmp);\n\n    // PDF files\n    let mut pdf = SearchSpec::new(\n        FileType::Pdf,\n        \"pdf\",\n        b\"%PDF-1.\",\n        Some(b\"%%EOF\"),\n        40 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    pdf.add_marker(b\"/L \");\n    pdf.add_marker(b\"obj\");\n    pdf.add_marker(b\"/Linearized\");\n    pdf.add_marker(b\"/Length\");\n    specs.push(pdf);\n\n    // ZIP files\n    let zip = SearchSpec::new(\n        FileType::Zip,\n        \"zip\",\n        \u0026[0x50, 0x4B, 0x03, 0x04],\n        Some(\u0026[0x50, 0x4b, 0x05, 0x06]),\n        100 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(zip);\n\n    // PNG files - footer is the IEND chunk including its fixed CRC (12 bytes total)\n    let png = SearchSpec::new(\n        FileType::Png,\n        \"png\",\n        \u0026[0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A],\n        Some(\u0026[\n            0x00, 0x00, 0x00, 0x00, 0x49, 0x45, 0x4E, 0x44, 0xAE, 0x42, 0x60, 0x82,\n        ]),\n        10 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(png);\n\n    // MPEG files\n    let mut mpg = SearchSpec::new(\n        FileType::Mpg,\n        \"mpg\",\n        \u0026[0x00, 0x00, 0x01, 0xba],\n        Some(\u0026[0x00, 0x00, 0x01, 0xb9]),\n        50 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    mpg.add_marker(\u0026[0x00, 0x00, 0x01]);\n    specs.push(mpg);\n\n    // RAR files - no reliable distinct footer; use max_len fallback\n    let rar = SearchSpec::new(\n        FileType::Rar,\n        \"rar\",\n        \u0026[0x52, 0x61, 0x72, 0x21, 0x1A, 0x07, 0x00],\n        None,\n        100 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(rar);\n\n    // EXE files\n    let exe = SearchSpec::new(\n        FileType::Exe,\n        \"exe\",\n        b\"MZ\",\n        None,\n        10 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(exe);\n\n    // HTML files\n    let htm = SearchSpec::new(\n        FileType::Htm,\n        \"htm\",\n        b\"\u003chtml\",\n        Some(b\"\u003c/html\u003e\"),\n        MEGABYTE,\n        false,\n        SearchType::Forward,\n    );\n    specs.push(htm);\n\n    // OLE/Office files\n    let ole = SearchSpec::new(\n        FileType::Ole,\n        \"ole\",\n        \u0026[\n            0xd0, 0xcf, 0x11, 0xe0, 0xa1, 0xb1, 0x1a, 0xe1, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,\n            0x00, 0x00,\n        ],\n        None,\n        10 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(ole);\n\n    // WMV files\n    let wmv = SearchSpec::new(\n        FileType::Wmv,\n        \"wmv\",\n        \u0026[0x30, 0x26, 0xB2, 0x75, 0x8E, 0x66, 0xCF, 0x11],\n        Some(\u0026[0xA1, 0xDC, 0xAB, 0x8C, 0x47, 0xA9]),\n        40 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(wmv);\n\n    // MOV files\n    let mov = SearchSpec::new(\n        FileType::Mov,\n        \"mov\",\n        b\"moov\",\n        None,\n        40 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(mov);\n\n    // MP4 files\n    let mp4 = SearchSpec::new(\n        FileType::Mp4,\n        \"mp4\",\n        \u0026[0x00, 0x00, 0x00, 0x1c, 0x66, 0x74, 0x79, 0x70],\n        None,\n        600 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(mp4);\n\n    // RIFF files (AVI/WAV)\n    let riff = SearchSpec::new(\n        FileType::Riff,\n        \"rif\",\n        b\"RIFF\",\n        Some(b\"INFO\"),\n        50 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(riff);\n\n    // C++ source files\n    let mut cpp = SearchSpec::new(\n        FileType::Cpp,\n        \"cpp\",\n        b\"#include\",\n        Some(b\"char\"),\n        MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    cpp.add_marker(b\"int\");\n    specs.push(cpp);\n\n    // WordPerfect files\n    let wpd = SearchSpec::new(\n        FileType::Wpd,\n        \"wpd\",\n        \u0026[0xff, 0x57, 0x50, 0x43],\n        None,\n        MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(wpd);\n\n    // GZIP files\n    let gzip = SearchSpec::new(\n        FileType::Gzip,\n        \"gz\",\n        \u0026[0x1F, 0x8B, 0x08],\n        Some(\u0026[0x00, 0x00, 0x00, 0x00]),\n        100 * MEGABYTE,\n        true,\n        SearchType::Forward,\n    );\n    specs.push(gzip);\n\n    specs\n}\n\n/// Get search specifications for specific file types\npub fn get_search_specs_for_types(types: \u0026[String]) -\u003e Vec\u003cSearchSpec\u003e {\n    let all_specs = init_all_search_specs();\n\n    if types.is_empty() || types.iter().any(|t| t == \"all\") {\n        return all_specs;\n    }\n\n    // Normalise \"jpeg\" → \"jpg\" so the set lookup covers both aliases\n    let type_set: HashSet\u003c\u0026str\u003e = types\n        .iter()\n        .flat_map(|t| {\n            if t == \"jpeg\" || t == \"jpg\" {\n                vec![\"jpg\", \"jpeg\"]\n            } else {\n                vec![t.as_str()]\n            }\n        })\n        .collect();\n\n    all_specs\n        .into_iter()\n        .filter(|spec| type_set.contains(spec.suffix.as_str()))\n        .collect()\n}\n\n/// Parse file type string and return appropriate file types\npub fn parse_file_types(type_str: \u0026str) -\u003e Vec\u003cString\u003e {\n    if type_str == \"all\" {\n        return vec![\"all\".to_string()];\n    }\n\n    if type_str.trim().is_empty() {\n        return Vec::new();\n    }\n\n    type_str\n        .split(',')\n        .map(|s| s.trim().to_string())\n        .filter(|s| !s.is_empty())\n        .collect()\n}\n\n/// Save search specifications to a TOML file\npub fn save_specs_to_toml\u003cP: AsRef\u003cPath\u003e\u003e(specs: \u0026[SearchSpec], filename: P) -\u003e Result\u003c()\u003e {\n    let toml_specs: Vec\u003cTomlSearchSpec\u003e = specs.iter().map(|s| s.clone().into()).collect();\n    let config = SearchSpecsConfig { specs: toml_specs };\n\n    let toml_string =\n        toml::to_string_pretty(\u0026config).context(\"Failed to serialize search specs to TOML\")?;\n\n    fs::write(filename, toml_string).context(\"Failed to write TOML file\")?;\n\n    Ok(())\n}\n\n/// Load search specifications from a TOML file\npub fn load_specs_from_toml\u003cP: AsRef\u003cPath\u003e\u003e(filename: P) -\u003e Result\u003cVec\u003cSearchSpec\u003e\u003e {\n    let toml_content = fs::read_to_string(\u0026filename)\n        .with_context(|| format!(\"Failed to read TOML file: {}\", filename.as_ref().display()))?;\n\n    let config: SearchSpecsConfig =\n        toml::from_str(\u0026toml_content).context(\"Failed to parse TOML file\")?;\n\n    let specs: Vec\u003cSearchSpec\u003e = config.specs.into_iter().map(|ts| ts.into()).collect();\n\n    Ok(specs)\n}\n\n/// Combine built-in and loaded specs based on command line arguments\npub fn get_combined_search_specs(\n    types: \u0026[String],\n    disable_builtin: bool,\n    config_file: Option\u003c\u0026str\u003e,\n) -\u003e Result\u003cVec\u003cSearchSpec\u003e\u003e {\n    let mut all_specs = Vec::new();\n\n    // Add built-in specs if not disabled\n    if !disable_builtin {\n        if types.is_empty() || types.iter().any(|t| t == \"all\") {\n            all_specs.extend(init_all_search_specs());\n        } else {\n            all_specs.extend(get_search_specs_for_types(types));\n        }\n    }\n\n    // Add specs from config file if provided\n    if let Some(config_path) = config_file {\n        let loaded_specs = load_specs_from_toml(config_path)\n            .with_context(|| format!(\"Failed to load specs from config file: {}\", config_path))?;\n\n        // If specific types are requested, filter loaded specs too\n        if !types.is_empty() \u0026\u0026 !types.iter().any(|t| t == \"all\") {\n            for spec in loaded_specs {\n                for requested_type in types {\n                    if spec.suffix == *requested_type\n                        || (spec.suffix == \"jpg\" \u0026\u0026 *requested_type == \"jpeg\")\n                        || (spec.suffix == \"jpeg\" \u0026\u0026 *requested_type == \"jpg\")\n                    {\n                        all_specs.push(spec.clone());\n                        break;\n                    }\n                }\n            }\n        } else {\n            all_specs.extend(loaded_specs);\n        }\n    }\n\n    Ok(all_specs)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::io::Write;\n    use tempfile::NamedTempFile;\n\n    #[test]\n    fn test_init_all_search_specs() {\n        let specs = init_all_search_specs();\n        assert!(!specs.is_empty());\n\n        // Test that we have some common file types\n        let jpeg_spec = specs.iter().find(|s| s.file_type == FileType::Jpeg);\n        assert!(jpeg_spec.is_some());\n        let jpeg = jpeg_spec.expect(\"jpeg spec must exist in default specs\");\n        assert_eq!(jpeg.suffix, \"jpg\");\n        assert_eq!(jpeg.header, vec![0xFF, 0xD8, 0xFF]);\n\n        let pdf_spec = specs.iter().find(|s| s.file_type == FileType::Pdf);\n        assert!(pdf_spec.is_some());\n        let pdf = pdf_spec.expect(\"pdf spec must exist in default specs\");\n        assert_eq!(pdf.suffix, \"pdf\");\n        assert_eq!(pdf.header, b\"%PDF-1.\");\n    }\n\n    #[test]\n    fn test_get_search_specs_for_types() {\n        let types = vec![\"jpeg\".to_string(), \"pdf\".to_string()];\n        let specs = get_search_specs_for_types(\u0026types);\n\n        assert_eq!(specs.len(), 2);\n        assert!(specs.iter().any(|s| s.file_type == FileType::Jpeg));\n        assert!(specs.iter().any(|s| s.file_type == FileType::Pdf));\n    }\n\n    #[test]\n    fn test_get_search_specs_for_jpg_alias() {\n        // Test that \"jpg\" returns JPEG specs\n        let types = vec![\"jpg\".to_string()];\n        let specs = get_search_specs_for_types(\u0026types);\n\n        assert_eq!(specs.len(), 1);\n        assert_eq!(specs[0].file_type, FileType::Jpeg);\n    }\n\n    #[test]\n    fn test_get_search_specs_for_unknown_type() {\n        let types = vec![\"unknown_type\".to_string()];\n        let specs = get_search_specs_for_types(\u0026types);\n\n        assert!(specs.is_empty());\n    }\n\n    #[test]\n    fn test_parse_file_types() {\n        let types = parse_file_types(\"jpeg,pdf,zip\");\n        assert_eq!(types, vec![\"jpeg\", \"pdf\", \"zip\"]);\n\n        let types_with_spaces = parse_file_types(\"jpeg, pdf , zip \");\n        assert_eq!(types_with_spaces, vec![\"jpeg\", \"pdf\", \"zip\"]);\n\n        let single_type = parse_file_types(\"jpeg\");\n        assert_eq!(single_type, vec![\"jpeg\"]);\n\n        let empty_types = parse_file_types(\"\");\n        assert!(empty_types.is_empty());\n    }\n\n    #[test]\n    fn test_toml_search_spec_conversion() {\n        let original_spec = SearchSpec::new(\n            FileType::Jpeg,\n            \"jpg\",\n            \u0026[0xFF, 0xD8, 0xFF],\n            Some(\u0026[0xFF, 0xD9]),\n            1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let toml_spec = TomlSearchSpec::from(original_spec.clone());\n        assert_eq!(toml_spec.file_type, \"Jpeg\");\n        assert_eq!(toml_spec.suffix, \"jpg\");\n        assert_eq!(toml_spec.header, vec![0xFF, 0xD8, 0xFF]);\n        assert_eq!(toml_spec.footer, Some(vec![0xFF, 0xD9]));\n        assert_eq!(toml_spec.max_len, 1024 * 1024);\n        assert!(toml_spec.case_sensitive);\n        assert_eq!(toml_spec.search_type, \"Forward\");\n\n        let converted_back = SearchSpec::from(toml_spec);\n        assert_eq!(converted_back.file_type, original_spec.file_type);\n        assert_eq!(converted_back.suffix, original_spec.suffix);\n        assert_eq!(converted_back.header, original_spec.header);\n        assert_eq!(converted_back.footer, original_spec.footer);\n    }\n\n    #[test]\n    fn test_save_and_load_specs_toml() {\n        let original_specs = vec![\n            SearchSpec::new(\n                FileType::Jpeg,\n                \"jpg\",\n                \u0026[0xFF, 0xD8, 0xFF],\n                Some(\u0026[0xFF, 0xD9]),\n                1024 * 1024,\n                true,\n                SearchType::Forward,\n            ),\n            SearchSpec::new(\n                FileType::Pdf,\n                \"pdf\",\n                b\"%PDF-\",\n                None,\n                10 * 1024 * 1024,\n                true,\n                SearchType::Forward,\n            ),\n        ];\n\n        let temp_file = NamedTempFile::new().expect(\"failed to create temp file\");\n        let temp_path = temp_file.path();\n\n        // Save specs to TOML\n        save_specs_to_toml(\u0026original_specs, temp_path).expect(\"failed to save specs to toml\");\n\n        // Load specs from TOML\n        let loaded_specs = load_specs_from_toml(temp_path).expect(\"failed to load specs from toml\");\n\n        assert_eq!(loaded_specs.len(), 2);\n        assert_eq!(loaded_specs[0].file_type, FileType::Jpeg);\n        assert_eq!(loaded_specs[1].file_type, FileType::Pdf);\n        assert_eq!(loaded_specs[0].header, vec![0xFF, 0xD8, 0xFF]);\n        assert_eq!(loaded_specs[1].header, b\"%PDF-\");\n    }\n\n    #[test]\n    fn test_load_specs_from_invalid_toml() {\n        let mut temp_file = NamedTempFile::new().expect(\"failed to create temp file\");\n        writeln!(temp_file, \"invalid toml content [[[\").expect(\"failed to write to temp file\");\n\n        let result = load_specs_from_toml(temp_file.path());\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_load_specs_from_nonexistent_file() {\n        let result = load_specs_from_toml(\"/nonexistent/path/file.toml\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_get_combined_search_specs_builtin_only() {\n        let types = vec![\"jpeg\".to_string()];\n        let result = get_combined_search_specs(\u0026types, false, None);\n\n        assert!(result.is_ok());\n        let specs = result.expect(\"get_combined_search_specs should succeed\");\n        assert_eq!(specs.len(), 1);\n        assert_eq!(specs[0].file_type, FileType::Jpeg);\n    }\n\n    #[test]\n    fn test_get_combined_search_specs_disabled_builtin() {\n        let types = vec![\"jpeg\".to_string()];\n        let result = get_combined_search_specs(\u0026types, true, None);\n\n        assert!(result.is_ok());\n        let specs = result.expect(\"get_combined_search_specs should succeed\");\n        assert!(specs.is_empty()); // No config file provided, builtin disabled\n    }\n\n    #[test]\n    fn test_get_combined_search_specs_all_types() {\n        let types = vec![\"all\".to_string()];\n        let result = get_combined_search_specs(\u0026types, false, None);\n\n        assert!(result.is_ok());\n        let specs = result.expect(\"get_combined_search_specs should succeed\");\n        assert!(!specs.is_empty());\n        // Should include all built-in specs\n        assert!(specs.len() \u003e 10);\n    }\n\n    #[test]\n    fn test_get_combined_search_specs_empty_types() {\n        let types: Vec\u003cString\u003e = vec![];\n        let result = get_combined_search_specs(\u0026types, false, None);\n\n        assert!(result.is_ok());\n        let specs = result.expect(\"get_combined_search_specs should succeed\");\n        assert!(!specs.is_empty());\n        // Should include all built-in specs when no types specified\n    }\n\n    #[test]\n    fn test_get_combined_search_specs_with_config_file() {\n        // Create a temporary config file\n        let config_specs = vec![SearchSpec::new(\n            FileType::Zip,\n            \"zip\",\n            \u0026[0x50, 0x4B, 0x03, 0x04],\n            None,\n            100 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        )];\n\n        let temp_file = NamedTempFile::new().expect(\"failed to create temp file\");\n        let temp_path = temp_file.path();\n        save_specs_to_toml(\u0026config_specs, temp_path).expect(\"failed to save specs to toml\");\n\n        let types = vec![\"zip\".to_string()];\n        let result = get_combined_search_specs(\n            \u0026types,\n            true,\n            Some(temp_path.to_str().expect(\"temp path is valid UTF-8\")),\n        );\n\n        assert!(result.is_ok());\n        let specs = result.expect(\"get_combined_search_specs should succeed\");\n        assert_eq!(specs.len(), 1);\n        assert_eq!(specs[0].file_type, FileType::Zip);\n    }\n\n    #[test]\n    fn test_invalid_file_type_conversion_uses_default() {\n        let toml_spec = TomlSearchSpec {\n            file_type: \"InvalidType\".to_string(),\n            suffix: \"test\".to_string(),\n            max_len: 1024,\n            header: vec![0x00],\n            footer: None,\n            case_sensitive: true,\n            search_type: \"Forward\".to_string(),\n            markers: vec![],\n            comment: \"\".to_string(),\n        };\n\n        let result = SearchSpec::from(toml_spec);\n        // Should use default fallback (Config)\n        assert_eq!(result.file_type, FileType::Config);\n    }\n\n    #[test]\n    fn test_invalid_search_type_conversion_uses_default() {\n        let toml_spec = TomlSearchSpec {\n            file_type: \"Jpeg\".to_string(),\n            suffix: \"jpg\".to_string(),\n            max_len: 1024,\n            header: vec![0xFF, 0xD8, 0xFF],\n            footer: None,\n            case_sensitive: true,\n            search_type: \"InvalidSearchType\".to_string(),\n            markers: vec![],\n            comment: \"\".to_string(),\n        };\n\n        let result = SearchSpec::from(toml_spec);\n        // Should use default fallback (Forward)\n        assert_eq!(result.search_type, SearchType::Forward);\n    }\n\n    #[test]\n    fn test_all_builtin_file_types_are_valid() {\n        let specs = init_all_search_specs();\n\n        // Ensure all specs have valid file types and non-empty headers\n        for spec in \u0026specs {\n            assert!(!spec.suffix.is_empty());\n            assert!(!spec.header.is_empty());\n            assert!(spec.max_len \u003e 0);\n        }\n\n        // Test specific file type specs\n        let file_types_to_check = [\n            (FileType::Jpeg, \"jpg\"),\n            (FileType::Pdf, \"pdf\"),\n            (FileType::Zip, \"zip\"),\n            (FileType::Png, \"png\"),\n            (FileType::Gif, \"gif\"),\n            (FileType::Bmp, \"bmp\"),\n        ];\n\n        for (file_type, expected_suffix) in \u0026file_types_to_check {\n            let spec = specs.iter().find(|s| s.file_type == *file_type);\n            assert!(\n                spec.is_some(),\n                \"Missing spec for file type: {:?}\",\n                file_type\n            );\n            assert_eq!(\n                spec.expect(\"spec must exist for this file type\").suffix,\n                *expected_suffix\n            );\n        }\n    }\n}\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address" },{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","types.rs"],"content":"use anyhow::{Result, anyhow};\nuse chrono::DateTime;\nuse serde::{Deserialize, Serialize};\nuse serde_json::Value;\nuse std::{\n    env,\n    ffi::OsStr,\n    fs::{File, OpenOptions},\n    io::Write,\n    path::Path,\n    sync::{\n        Arc, Mutex,\n        atomic::{AtomicUsize, Ordering},\n    },\n    time::{Instant, SystemTime, UNIX_EPOCH},\n};\nuse tracing::debug;\n\nuse crate::{JsonReporter, StateReporting, ThreadSafeReporter, create_file_object};\n\n/// Represents a byte run in a file carving report - a contiguous section of data\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ByteRun {\n    /// Offset within the file object (usually 0 for carved files)\n    pub offset: u64,\n    /// Offset within the source image/file where the data was found\n    pub img_offset: u64,\n    /// Length of the data run in bytes\n    pub len: u64,\n}\n\n/// Status of a carved JPEG file's scan data completeness\n#[derive(Serialize, Deserialize, Default, Debug, Clone, PartialEq)]\n#[serde(rename_all = \"snake_case\")]\npub enum JpegScanStatus {\n    /// EOI marker was found; the file appears complete\n    #[default]\n    Complete,\n    /// EOI not found; the file was cut off at max_len or buffer boundary\n    Truncated,\n    /// An unexpected marker was encountered in scan data, suggesting fragmentation\n    Fragmented,\n}\n\n/// JPEG-specific scan metadata recorded during carving\n#[derive(Serialize, Deserialize, Debug, Clone)]\npub struct JpegScanInfo {\n    /// Image width from SOF marker, if parsed\n    pub width: Option\u003cu16\u003e,\n    /// Image height from SOF marker, if parsed\n    pub height: Option\u003cu16\u003e,\n    /// Absolute byte offset in the source image where fragmentation was detected\n    pub fragmentation_point_img_offset: Option\u003cu64\u003e,\n    /// Whether RST (restart) markers were observed in the scan data\n    pub has_restart_markers: bool,\n    /// Completeness status of the scan data\n    pub status: JpegScanStatus,\n}\n\n/// Represents a carved file object in the report\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct FileObject {\n    /// Name of the extracted file\n    pub filename: String,\n    /// Size of the extracted file in bytes\n    pub filesize: u64,\n    /// File type that was detected\n    pub file_type: String,\n    /// Array of byte runs (for future defragmentation support)\n    pub byte_runs: Vec\u003cByteRun\u003e,\n    /// JPEG-specific scan metadata; present only for JPEG file objects\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub jpeg_scan: Option\u003cJpegScanInfo\u003e,\n}\n\n/// Represents metadata about the carving tool\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Metadata {\n    /// Type of report\n    pub dc_type: String,\n}\n\n/// Represents the tool that created the report\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Creator {\n    /// Package name\n    pub package: String,\n    /// Version of the tool\n    pub version: String,\n    /// Execution environment details\n    pub execution_environment: ExecutionEnvironment,\n}\n\n/// Represents the execution environment\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ExecutionEnvironment {\n    /// Operating system name\n    pub os_sysname: String,\n    /// Operating system release\n    pub os_release: String,\n    /// Operating system version\n    pub os_version: String,\n    /// Host machine name\n    pub host: String,\n    /// Architecture\n    pub arch: String,\n    /// User ID\n    pub uid: u32,\n    /// Start time of the carving process\n    pub start_time: String,\n}\n\n/// Represents the source file or image being carved\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Source {\n    /// Name of the source file\n    pub image_filename: String,\n    /// Sector size (usually 512)\n    pub sectorsize: u32,\n    /// Total size of the source image\n    pub image_size: u64,\n    /// Volume information\n    pub volume: Volume,\n}\n\n/// Represents volume information\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Volume {\n    /// Byte runs that make up the volume\n    pub byte_runs: Vec\u003cByteRun\u003e,\n}\n\n/// Main carving report structure\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CarveReport {\n    /// Metadata about the report\n    pub metadata: Metadata,\n    /// Information about the tool that created the report\n    pub creator: Creator,\n    /// Source file/image information\n    pub source: Source,\n    /// Configuration used during carving (placeholder)\n    pub configuration: Value,\n    /// List of carved file objects\n    pub fileobjects: Vec\u003cFileObject\u003e,\n}\n\nimpl CarveReport {\n    /// Create a new carve report with provided execution environment\n    pub fn new_with_env(\n        source_filename: \u0026str,\n        source_size: u64,\n        execution_environment: ExecutionEnvironment,\n    ) -\u003e Self {\n        Self {\n            metadata: Metadata {\n                dc_type: \"Carve Report\".to_string(),\n            },\n            creator: Creator {\n                package: \"Utmost\".to_string(),\n                version: env!(\"CARGO_PKG_VERSION\").to_string(),\n                execution_environment,\n            },\n            source: Source {\n                image_filename: source_filename.to_string(),\n                sectorsize: 512,\n                image_size: source_size,\n                volume: Volume {\n                    byte_runs: vec![ByteRun {\n                        offset: 0,\n                        img_offset: 0,\n                        len: source_size,\n                    }],\n                },\n            },\n            configuration: Value::Object(serde_json::Map::new()),\n            fileobjects: Vec::new(),\n        }\n    }\n\n    /// Create a new carve report with default/minimal execution environment\n    /// This is suitable for WASM or other environments where system info is not available\n    pub fn new(source_filename: \u0026str, source_size: u64) -\u003e Self {\n        let default_env = ExecutionEnvironment {\n            os_sysname: env::consts::OS.to_string(),\n            os_release: \"Unknown\".to_string(),\n            os_version: \"Unknown\".to_string(),\n            host: \"Unknown\".to_string(),\n            arch: env::consts::ARCH.to_string(),\n            uid: 0, // Default UID\n            start_time: format_timestamp(SystemTime::now()),\n        };\n\n        Self::new_with_env(source_filename, source_size, default_env)\n    }\n\n    /// Add a carved file to the report\n    pub fn add_file_object(\u0026mut self, file_object: FileObject) {\n        self.fileobjects.push(file_object);\n    }\n}\n\n/// Format a SystemTime as an ISO 8601 timestamp\npub fn format_timestamp(time: SystemTime) -\u003e String {\n    match time.duration_since(UNIX_EPOCH) {\n        Ok(duration) =\u003e {\n            let secs = duration.as_secs();\n            let datetime = DateTime::from_timestamp(secs as i64, 0).unwrap_or_default();\n            datetime.format(\"%Y-%m-%dT%H:%M:%S%z\").to_string()\n        }\n        Err(_) =\u003e \"1970-01-01T00:00:00+0000\".to_string(),\n    }\n}\n\n/// Configuration for creating a State\n#[derive(Debug, Clone)]\npub struct StateConfig {\n    pub output_directory: String,\n    pub debug: bool,\n    pub prefix_filenames: bool,\n    pub chunk_size: Option\u003cusize\u003e,\n    pub block_size: Option\u003cusize\u003e,\n    pub skip: Option\u003cusize\u003e,\n    pub disable_validation: bool,\n    pub report_only: bool,\n    pub disable_report: bool,\n    pub disable_audit: bool,\n    /// Enable quick mode: search only on block-aligned boundaries\n    pub quick: bool,\n    /// Write all found headers as files even when no footer/validation; labels them \"(Header dump)\"\n    pub write_all: bool,\n}\n\n/// Core state structure that mirrors the C f_state\n#[derive(Clone)]\npub struct State {\n    pub config: StateConfig,\n    pub audit_file: Option\u003cArc\u003cMutex\u003cFile\u003e\u003e\u003e,\n    pub chunk_size: usize,\n    pub fileswritten: Arc\u003cAtomicUsize\u003e,\n    pub block_size: usize,\n    pub skip: usize,\n    pub start_time: Instant,\n    pub time_stamp: Instant,\n    pub num_builtin: usize,\n    pub search_specs: Arc\u003cMutex\u003cVec\u003cSearchSpec\u003e\u003e\u003e,\n    pub reporter: Option\u003cThreadSafeReporter\u003e,\n}\n\n/// File information structure that mirrors the C f_info\n#[derive(Debug, Clone)]\npub struct FileInfo {\n    pub filename: String,\n    pub total_bytes: usize,\n    pub total_megs: usize,\n    pub bytes_read: usize,\n    pub per_file_counter: usize,\n}\n\n/// Search specification for file types\n#[derive(Debug, Clone)]\npub struct SearchSpec {\n    pub file_type: FileType,\n    pub suffix: String,\n    pub max_len: usize,\n    pub header: Vec\u003cu8\u003e,\n    pub header_len: usize,\n    pub footer: Option\u003cVec\u003cu8\u003e\u003e,\n    pub footer_len: usize,\n    pub case_sensitive: bool,\n    pub search_type: SearchType,\n    pub markers: Vec\u003cMarker\u003e,\n    pub found: Arc\u003cAtomicUsize\u003e,\n    pub comment: String,\n    pub written: bool,\n}\n\n/// File type enumeration\n#[derive(Debug, Clone, Copy, PartialEq, Serialize, Deserialize)]\npub enum FileType {\n    Jpeg,\n    Gif,\n    Bmp,\n    Mpg,\n    Pdf,\n    Doc,\n    Avi,\n    Wmv,\n    Htm,\n    Zip,\n    Mov,\n    Xls,\n    Ppt,\n    Wpd,\n    Cpp,\n    Ole,\n    Gzip,\n    Riff,\n    Wav,\n    VJpeg,\n    Sxw,\n    Sxc,\n    Sxi,\n    Png,\n    Rar,\n    Exe,\n    Elf,\n    Reg,\n    Docx,\n    Xlsx,\n    Pptx,\n    Mp4,\n    Config,\n}\n\n/// Search type enumeration\n#[derive(Debug, Clone, Copy, PartialEq, Serialize, Deserialize)]\npub enum SearchType {\n    Forward,\n    Reverse,\n    ForwardNext,\n    Ascii,\n}\n\n/// Marker for additional search patterns\n#[derive(Debug, Clone)]\npub struct Marker {\n    pub value: Vec\u003cu8\u003e,\n    pub len: usize,\n}\n\n/// Endianness for multi-byte value extraction\n#[derive(Debug, Clone, Copy)]\npub enum Endianness {\n    Little,\n    Big,\n}\n\n/// Constants\npub const MEGABYTE: usize = 1024 * 1024;\npub const KILOBYTE: usize = 1024;\npub const DEFAULT_CHUNK_SIZE: usize = 100; // MB\npub const DEFAULT_BLOCK_SIZE: usize = 512;\npub const CONSERVATIVE_FALLBACK_SIZE: usize = 64 * 1024;\npub const WILDCARD: u8 = b'?';\n\nimpl State {\n    pub fn new(config: StateConfig) -\u003e Result\u003cSelf\u003e {\n        let audit_log_path = format!(\"{}/audit_log.txt\", config.output_directory);\n        let audit_file = if !config.disable_audit {\n            let file = OpenOptions::new()\n                .create(true)\n                .append(true)\n                .open(\u0026audit_log_path)?;\n            Some(Arc::new(Mutex::new(file)))\n        } else {\n            None\n        };\n\n        // Create reporter if not disabled\n        let reporter = if !config.disable_report {\n            let json_reporter = JsonReporter::new(\u0026config.output_directory);\n            Some(ThreadSafeReporter::new(Box::new(json_reporter)))\n        } else {\n            None\n        };\n\n        Ok(Self {\n            chunk_size: config.chunk_size.unwrap_or(DEFAULT_CHUNK_SIZE) * MEGABYTE,\n            block_size: config.block_size.unwrap_or(DEFAULT_BLOCK_SIZE),\n            skip: config.skip.unwrap_or(0),\n            config,\n            audit_file,\n            fileswritten: Arc::new(AtomicUsize::new(0)),\n            start_time: Instant::now(),\n            time_stamp: Instant::now(),\n            num_builtin: 0,\n            search_specs: Arc::new(Mutex::new(Vec::new())),\n            reporter,\n        })\n    }\n\n    pub fn audit_entry(\u0026self, message: \u0026str) -\u003e Result\u003c()\u003e {\n        if let Some(ref audit_file) = self.audit_file {\n            debug!(\"Audit: {}\", message);\n            let mut file = audit_file\n                .lock()\n                .map_err(|_| anyhow!(\"Failed to acquire audit file lock\"))?;\n\n            writeln!(file, \"{}\", message)?;\n            file.flush()?;\n        }\n        Ok(())\n    }\n\n    /// Set a custom reporter (useful for injecting system-aware reporters from CLI)\n    pub fn set_reporter(\u0026mut self, reporter: ThreadSafeReporter) {\n        self.reporter = Some(reporter);\n    }\n\n    pub fn audit_finish(\u0026self, file_info: \u0026FileInfo) -\u003e Result\u003c()\u003e {\n        self.audit_entry(\u0026format!(\n            \"\\nFinished carving {}. Total bytes read: {}\",\n            file_info.filename, file_info.bytes_read\n        ))\n    }\n\n    pub fn get_mode(\u0026self, mode: Mode) -\u003e bool {\n        match mode {\n            Mode::Verbose =\u003e self.config.debug,\n            Mode::Quiet =\u003e false,\n            Mode::WriteAll =\u003e self.config.write_all,\n            Mode::WriteAudit =\u003e false,\n            Mode::Quick =\u003e self.config.quick,\n        }\n    }\n\n    /// Thread-safe increment of files written counter\n    pub fn increment_fileswritten(\u0026self) -\u003e usize {\n        self.fileswritten.fetch_add(1, Ordering::SeqCst) + 1\n    }\n\n    /// Thread-safe read of files written counter\n    pub fn get_fileswritten(\u0026self) -\u003e usize {\n        self.fileswritten.load(Ordering::SeqCst)\n    }\n\n    /// Thread-safe access to search specs\n    pub fn get_search_specs(\u0026self) -\u003e Vec\u003cSearchSpec\u003e {\n        self.search_specs\n            .lock()\n            .expect(\"search specs lock poisoned\")\n            .clone()\n    }\n\n    /// Thread-safe update of search specs\n    pub fn set_search_specs(\u0026self, specs: Vec\u003cSearchSpec\u003e) {\n        *self\n            .search_specs\n            .lock()\n            .expect(\"search specs lock poisoned\") = specs;\n    }\n\n    /// Thread-safe increment of found count for a specific file type\n    pub fn increment_found_count(\u0026self, file_type: FileType) {\n        let specs = self\n            .search_specs\n            .lock()\n            .expect(\"search specs lock poisoned\");\n        for spec in specs.iter() {\n            if spec.file_type == file_type {\n                spec.increment_found();\n                break;\n            }\n        }\n    }\n}\n\n/// Extension trait implementation for State to add reporting capabilities\nimpl StateReporting for State {\n    fn get_reporter(\u0026self) -\u003e Option\u003c\u0026ThreadSafeReporter\u003e {\n        self.reporter.as_ref()\n    }\n\n    fn report_file(\n        \u0026self,\n        filename: \u0026str,\n        file_type: FileType,\n        file_size: u64,\n        img_offset: u64,\n        jpeg_scan: Option\u003cJpegScanInfo\u003e,\n    ) -\u003e Result\u003c()\u003e {\n        if let Some(ref reporter) = self.reporter {\n            let file_object =\n                create_file_object(filename, file_type, file_size, img_offset, jpeg_scan);\n            reporter.add_file(file_object)?;\n        }\n        Ok(())\n    }\n}\n\n/// Mode flags\n#[derive(Debug, Clone, Copy)]\npub enum Mode {\n    Verbose,\n    Quiet,\n    WriteAll,\n    WriteAudit,\n    Quick,\n}\n\nimpl SearchSpec {\n    pub fn new(\n        file_type: FileType,\n        suffix: \u0026str,\n        header: \u0026[u8],\n        footer: Option\u003c\u0026[u8]\u003e,\n        max_len: usize,\n        case_sensitive: bool,\n        search_type: SearchType,\n    ) -\u003e Self {\n        Self {\n            file_type,\n            suffix: suffix.to_string(),\n            max_len,\n            header: header.to_vec(),\n            header_len: header.len(),\n            footer: footer.map(|f| f.to_vec()),\n            footer_len: footer.map(|f| f.len()).unwrap_or(0),\n            case_sensitive,\n            search_type,\n            markers: Vec::new(),\n            found: Arc::new(AtomicUsize::new(0)),\n            comment: String::new(),\n            written: false,\n        }\n    }\n\n    pub fn add_marker(\u0026mut self, marker: \u0026[u8]) {\n        self.markers.push(Marker {\n            value: marker.to_vec(),\n            len: marker.len(),\n        });\n    }\n\n    /// Get the current found count\n    pub fn get_found(\u0026self) -\u003e usize {\n        self.found.load(Ordering::SeqCst)\n    }\n\n    /// Increment the found count and return the new value\n    pub fn increment_found(\u0026self) -\u003e usize {\n        self.found.fetch_add(1, Ordering::SeqCst) + 1\n    }\n}\n\n/// Utility functions for endianness conversion\npub fn bytes_to_u16(bytes: \u0026[u8], endianness: Endianness) -\u003e u16 {\n    if bytes.len() \u003c 2 {\n        return 0;\n    }\n\n    let bytes = bytes[0..2].try_into().expect(\"slice is exactly 2 bytes\");\n\n    match endianness {\n        Endianness::Little =\u003e u16::from_le_bytes(bytes),\n        Endianness::Big =\u003e u16::from_be_bytes(bytes),\n    }\n}\n\npub fn bytes_to_u32(bytes: \u0026[u8], endianness: Endianness) -\u003e u32 {\n    if bytes.len() \u003c 4 {\n        return 0;\n    }\n\n    let bytes = bytes[0..4].try_into().expect(\"slice is exactly 4 bytes\");\n\n    match endianness {\n        Endianness::Little =\u003e u32::from_le_bytes(bytes),\n        Endianness::Big =\u003e u32::from_be_bytes(bytes),\n    }\n}\n\npub fn bytes_to_u64(bytes: \u0026[u8], endianness: Endianness) -\u003e u64 {\n    if bytes.len() \u003c 8 {\n        return 0;\n    }\n\n    let bytes = bytes[0..8].try_into().expect(\"slice is exactly 8 bytes\");\n\n    match endianness {\n        Endianness::Little =\u003e u64::from_le_bytes(bytes),\n        Endianness::Big =\u003e u64::from_be_bytes(bytes),\n    }\n}\n\n/// Clean a filename for use in output filenames\n/// - Replace special characters with underscores\n/// - Limit to max_length characters\n/// - Convert to lowercase for consistency\npub fn clean_filename(filename: \u0026str, max_length: usize) -\u003e String {\n    let name = Path::new(filename)\n        .file_stem()\n        .unwrap_or_else(|| OsStr::new(filename))\n        .to_string_lossy();\n\n    let extension = Path::new(filename)\n        .extension()\n        .unwrap_or_else(|| OsStr::new(\"\"))\n        .to_string_lossy();\n\n    // Combine name and extension with underscore\n    let full_name = if extension.is_empty() {\n        name.to_string()\n    } else {\n        format!(\"{}_{}\", name, extension)\n    };\n\n    // Clean the filename: replace non-alphanumeric chars with underscores\n    let cleaned: String = full_name\n        .chars()\n        .map(|c| {\n            if c.is_alphanumeric() {\n                c.to_ascii_lowercase()\n            } else {\n                '_'\n            }\n        })\n        .collect();\n\n    // Remove consecutive underscores and trim\n    let cleaned = cleaned\n        .split('_')\n        .filter(|s| !s.is_empty())\n        .collect::\u003cVec\u003c_\u003e\u003e()\n        .join(\"_\");\n\n    // Truncate to max length\n    if cleaned.len() \u003e max_length {\n        cleaned[..max_length].to_string()\n    } else {\n        cleaned\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use tempfile::tempdir;\n\n    use super::*;\n\n    #[test]\n    fn test_state_new() {\n        let config = StateConfig {\n            output_directory: \"test_output\".to_string(),\n            debug: true,\n            prefix_filenames: false,\n            chunk_size: Some(50),\n            block_size: Some(1024),\n            skip: Some(100),\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            ..config\n        };\n\n        let state = State::new(config.clone()).unwrap();\n\n        assert_eq!(state.config.output_directory, config.output_directory);\n        assert!(state.config.debug);\n        assert!(!state.config.prefix_filenames);\n        assert_eq!(state.chunk_size, 50 * MEGABYTE);\n        assert_eq!(state.block_size, 1024);\n        assert_eq!(state.skip, 100);\n        assert_eq!(state.get_fileswritten(), 0);\n    }\n\n    #[test]\n    fn test_state_default_values() {\n        let config = StateConfig {\n            output_directory: \"test_output\".to_string(),\n            debug: false,\n            prefix_filenames: true,\n            chunk_size: None,\n            block_size: None,\n            skip: None,\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            ..config\n        };\n\n        let state = State::new(config).unwrap();\n\n        assert_eq!(state.chunk_size, DEFAULT_CHUNK_SIZE * MEGABYTE);\n        assert_eq!(state.block_size, 512);\n        assert_eq!(state.skip, 0);\n    }\n\n    #[test]\n    fn test_state_fileswritten_operations() {\n        let config = StateConfig {\n            output_directory: \"test_output\".to_string(),\n            debug: false,\n            prefix_filenames: false,\n            chunk_size: None,\n            block_size: None,\n            skip: None,\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            ..config\n        };\n\n        let state = State::new(config).unwrap();\n\n        assert_eq!(state.get_fileswritten(), 0);\n\n        let count1 = state.increment_fileswritten();\n        assert_eq!(count1, 1);\n        assert_eq!(state.get_fileswritten(), 1);\n\n        let count2 = state.increment_fileswritten();\n        assert_eq!(count2, 2);\n        assert_eq!(state.get_fileswritten(), 2);\n    }\n\n    #[test]\n    fn test_state_search_specs_operations() {\n        let config = StateConfig {\n            output_directory: \"test_output\".to_string(),\n            debug: false,\n            prefix_filenames: false,\n            chunk_size: None,\n            block_size: None,\n            skip: None,\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            ..config\n        };\n\n        let state = State::new(config).unwrap();\n\n        let initial_specs = state.get_search_specs();\n        assert!(initial_specs.is_empty());\n\n        let test_specs = vec![\n            SearchSpec::new(\n                FileType::Jpeg,\n                \"jpg\",\n                \u0026[0xFF, 0xD8, 0xFF],\n                Some(\u0026[0xFF, 0xD9]),\n                1024 * 1024,\n                true,\n                SearchType::Forward,\n            ),\n            SearchSpec::new(\n                FileType::Pdf,\n                \"pdf\",\n                b\"%PDF-\",\n                None,\n                10 * 1024 * 1024,\n                true,\n                SearchType::Forward,\n            ),\n        ];\n\n        state.set_search_specs(test_specs.clone());\n        let retrieved_specs = state.get_search_specs();\n        assert_eq!(retrieved_specs.len(), 2);\n        assert_eq!(retrieved_specs[0].file_type, FileType::Jpeg);\n        assert_eq!(retrieved_specs[1].file_type, FileType::Pdf);\n    }\n\n    #[test]\n    fn test_state_increment_found_count() {\n        let config = StateConfig {\n            output_directory: \"test_output\".to_string(),\n            debug: false,\n            prefix_filenames: false,\n            chunk_size: None,\n            block_size: None,\n            skip: None,\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            ..config\n        };\n\n        let state = State::new(config).unwrap();\n\n        let test_spec = SearchSpec::new(\n            FileType::Jpeg,\n            \"jpg\",\n            \u0026[0xFF, 0xD8, 0xFF],\n            None,\n            1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        assert_eq!(test_spec.get_found(), 0);\n\n        state.set_search_specs(vec![test_spec.clone()]);\n        state.increment_found_count(FileType::Jpeg);\n\n        let specs = state.get_search_specs();\n        assert_eq!(specs[0].get_found(), 1);\n    }\n\n    #[test]\n    fn test_state_audit_operations() {\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            debug: false,\n            prefix_filenames: false,\n            chunk_size: None,\n            block_size: None,\n            skip: None,\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let state = State::new(config).unwrap();\n\n        state.audit_entry(\"Test audit message\").unwrap();\n\n        let file_info = FileInfo {\n            filename: \"test.dat\".to_string(),\n            total_bytes: 1024,\n            total_megs: 1,\n            bytes_read: 1024,\n            per_file_counter: 1,\n        };\n\n        state.audit_finish(\u0026file_info).unwrap();\n\n        // Check that audit file was created\n        let audit_path = format!(\"{}/audit_log.txt\", temp_dir.path().to_string_lossy());\n        assert!(Path::new(\u0026audit_path).exists());\n    }\n\n    #[test]\n    fn test_mode_checking() {\n        let temp_dir = tempdir().unwrap();\n        let config = StateConfig {\n            output_directory: temp_dir.path().to_string_lossy().to_string(),\n            debug: true,\n            prefix_filenames: false,\n            chunk_size: None,\n            block_size: None,\n            skip: None,\n            disable_validation: false,\n            report_only: false,\n            disable_report: false,\n            disable_audit: false,\n            quick: false,\n            write_all: false,\n        };\n\n        let state = State::new(config).unwrap();\n        assert!(state.get_mode(Mode::Verbose));\n        assert!(!state.get_mode(Mode::Quiet));\n        assert!(!state.get_mode(Mode::WriteAll));\n        assert!(!state.get_mode(Mode::WriteAudit));\n        assert!(!state.get_mode(Mode::Quick));\n    }\n\n    #[test]\n    fn test_search_spec_new() {\n        let spec = SearchSpec::new(\n            FileType::Jpeg,\n            \"jpg\",\n            \u0026[0xFF, 0xD8, 0xFF],\n            Some(\u0026[0xFF, 0xD9]),\n            1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        assert_eq!(spec.file_type, FileType::Jpeg);\n        assert_eq!(spec.suffix, \"jpg\");\n        assert_eq!(spec.header, vec![0xFF, 0xD8, 0xFF]);\n        assert_eq!(spec.header_len, 3);\n        assert_eq!(spec.footer, Some(vec![0xFF, 0xD9]));\n        assert_eq!(spec.footer_len, 2);\n        assert_eq!(spec.max_len, 1024 * 1024);\n        assert!(spec.case_sensitive);\n        assert_eq!(spec.search_type, SearchType::Forward);\n        assert_eq!(spec.get_found(), 0);\n        assert!(spec.comment.is_empty());\n        assert!(!spec.written);\n    }\n\n    #[test]\n    fn test_search_spec_add_marker() {\n        let mut spec = SearchSpec::new(\n            FileType::Jpeg,\n            \"jpg\",\n            \u0026[0xFF, 0xD8, 0xFF],\n            None,\n            1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        assert!(spec.markers.is_empty());\n\n        spec.add_marker(\u0026[0xFF, 0xE0]);\n        assert_eq!(spec.markers.len(), 1);\n        assert_eq!(spec.markers[0].value, vec![0xFF, 0xE0]);\n        assert_eq!(spec.markers[0].len, 2);\n\n        spec.add_marker(\u0026[0xFF, 0xE1]);\n        assert_eq!(spec.markers.len(), 2);\n    }\n\n    #[test]\n    fn test_bytes_to_u16() {\n        let bytes_le = [0x34, 0x12];\n        assert_eq!(bytes_to_u16(\u0026bytes_le, Endianness::Little), 0x1234);\n        assert_eq!(bytes_to_u16(\u0026bytes_le, Endianness::Big), 0x3412);\n\n        // Test with insufficient bytes\n        let short_bytes = [0x34];\n        assert_eq!(bytes_to_u16(\u0026short_bytes, Endianness::Little), 0);\n    }\n\n    #[test]\n    fn test_bytes_to_u32() {\n        let bytes_le = [0x78, 0x56, 0x34, 0x12];\n        assert_eq!(bytes_to_u32(\u0026bytes_le, Endianness::Little), 0x12345678);\n        assert_eq!(bytes_to_u32(\u0026bytes_le, Endianness::Big), 0x78563412);\n\n        // Test with insufficient bytes\n        let short_bytes = [0x34, 0x12];\n        assert_eq!(bytes_to_u32(\u0026short_bytes, Endianness::Little), 0);\n    }\n\n    #[test]\n    fn test_bytes_to_u64() {\n        let bytes_le = [0xEF, 0xCD, 0xAB, 0x89, 0x67, 0x45, 0x23, 0x01];\n        assert_eq!(\n            bytes_to_u64(\u0026bytes_le, Endianness::Little),\n            0x0123456789ABCDEF\n        );\n        assert_eq!(bytes_to_u64(\u0026bytes_le, Endianness::Big), 0xEFCDAB8967452301);\n\n        // Test with insufficient bytes\n        let short_bytes = [0x34, 0x12, 0x78, 0x56];\n        assert_eq!(bytes_to_u64(\u0026short_bytes, Endianness::Little), 0);\n    }\n\n    #[test]\n    fn test_clean_filename() {\n        // Basic filename\n        assert_eq!(clean_filename(\"test.txt\", 50), \"test_txt\");\n\n        // Filename with special characters\n        assert_eq!(clean_filename(\"test file!@#.txt\", 50), \"test_file_txt\");\n\n        // Long filename truncation\n        let long_name = \"this_is_a_very_long_filename_that_should_be_truncated.txt\";\n        let cleaned = clean_filename(long_name, 20);\n        assert_eq!(cleaned.len(), 20);\n        assert_eq!(cleaned, \"this_is_a_very_long_\");\n\n        // Filename with path\n        assert_eq!(clean_filename(\"/path/to/file.dat\", 50), \"file_dat\");\n\n        // Filename without extension\n        assert_eq!(clean_filename(\"filename\", 50), \"filename\");\n\n        // Empty filename\n        assert_eq!(clean_filename(\"\", 50), \"\");\n\n        // Filename with consecutive special characters\n        assert_eq!(clean_filename(\"test---file...txt\", 50), \"test_file_txt\");\n\n        // Case conversion\n        assert_eq!(clean_filename(\"UPPERCASE.TXT\", 50), \"uppercase_txt\");\n\n        // Mixed case and numbers\n        assert_eq!(clean_filename(\"File123.dat\", 50), \"file123_dat\");\n    }\n\n    #[test]\n    fn test_file_info_creation() {\n        let file_info = FileInfo {\n            filename: \"test.dat\".to_string(),\n            total_bytes: 1024,\n            total_megs: 1,\n            bytes_read: 512,\n            per_file_counter: 5,\n        };\n\n        assert_eq!(file_info.filename, \"test.dat\");\n        assert_eq!(file_info.total_bytes, 1024);\n        asser     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
