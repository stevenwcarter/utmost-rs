<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

ow()),\n    }\n}\n\n#[derive(Parser, Debug, Clone)]\n#[command(\n    author,\n    version,\n    about = \"Recover fragmented JPEG files using a prior carve report\",\n    name = \"recover\"\n)]\npub struct RecoverArgs {\n    /// Source disk image to search for continuation fragments\n    #[arg(short, long)]\n    pub image: String,\n\n    /// Path to carve_report.json produced by a prior utmost run\n    #[arg(short, long)]\n    pub report: String,\n\n    /// Output directory for recovered files and recover_report.json\n    #[arg(short, long, default_value = \"recovered\")]\n    pub output: String,\n\n    /// Block / sector size for fragment alignment (bytes)\n    #[arg(short, long, default_value_t = 512)]\n    pub block_size: usize,\n\n    /// Search window around each fragmentation point (bytes)\n    #[arg(short = 'w', long, default_value_t = DEFAULT_SEARCH_WINDOW_BYTES)]\n    pub search_window: usize,\n\n    /// Maximum candidate reassemblies to attempt per incomplete JPEG\n    #[arg(short = 'n', long, default_value_t = 3)]\n    pub candidates: usize,\n\n    /// Minimum entropy score (0.0–8.0) for a block to be considered scan data\n    #[arg(long, default_value_t = 7.0)]\n    pub min_entropy: f64,\n\n    /// Activate debug mode\n    #[arg(short, long)]\n    pub debug: bool,\n}\n\n#[derive(Parser, Debug, Clone)]\n#[command(author, version, about = \"Carves files to extract other file types\", name=\"utmost\", long_about = None)]\npub struct CarveArgs {\n    /// Activate debug mode\n    #[arg(short, long)]\n    pub debug: bool,\n\n    /// File types to search for (e.g., jpeg, pdf, zip)\n    #[arg(short, long, value_delimiter = ',')]\n    pub types: Vec\u003cString\u003e,\n\n    /// Output directory for extracted files\n    #[arg(short, long, default_value_t = String::from(\"output\"))]\n    pub output_directory: String,\n\n    /// Always include input filename prefix in output filenames (even for single file or stdin)\n    #[arg(long)]\n    pub prefix_filenames: bool,\n\n    /// Disable built-in search specifications\n    #[arg(long)]\n    pub disable_builtin: bool,\n\n    /// Load search specifications from TOML config file\n    #[arg(short, long)]\n    pub config_file: Option\u003cString\u003e,\n\n    /// Save current built-in search specifications to TOML file and exit\n    #[arg(long)]\n    pub save_config: Option\u003cString\u003e,\n\n    /// Number of files to process concurrently (default: CPU cores - 1, minimum 1)\n    #[arg(short = 'j', long, default_value_t = calculate_default_concurrent_files())]\n    pub concurrent_files: usize,\n\n    /// Disable additional file validation checks (faster but less accurate)\n    #[arg(long)]\n    pub disable_validation: bool,\n\n    /// Only generate report without extracting files\n    #[arg(long)]\n    pub report_only: bool,\n\n    /// Disable generation of JSON carve report\n    #[arg(long)]\n    pub disable_report: bool,\n\n    /// Disable generation of audit log\n    #[arg(long)]\n    pub disable_audit: bool,\n\n    /// Enable quick mode: only search on block-aligned boundaries\n    #[arg(short = 'q', long)]\n    pub quick: bool,\n\n    /// Block size in bytes for quick mode and skip calculations (default: 512)\n    #[arg(short = 'b', long, default_value_t = DEFAULT_BLOCK_SIZE)]\n    pub block_size: usize,\n\n    /// Write all found headers as files even when no footer/validation (header dump mode)\n    #[arg(short = 'a', long)]\n    pub write_all: bool,\n\n    /// Input files to process (if none specified, reads from stdin)\n    pub input_files: Vec\u003cString\u003e,\n}\n\nfn main() -\u003e Result\u003c()\u003e {\n    // Manual subcommand dispatch: `utmost recover …` invokes the recovery\n    // engine; everything else is handled by the normal carve path.\n    let argv: Vec\u003cString\u003e = std::env::args().collect();\n    if argv.get(1).map(String::as_str) == Some(\"recover\") {\n        // Strip the \"recover\" word so clap sees a clean argv for RecoverArgs.\n        let recover_argv: Vec\u003cString\u003e = argv[..1].iter().chain(argv[2..].iter()).cloned().collect();\n        let recover_args = RecoverArgs::parse_from(recover_argv);\n        return run_recover(recover_args);\n    }\n\n    let args = CarveArgs::parse();\n    dotenvy::dotenv().ok();\n\n    tracing_subscriber::fmt()\n        .with_max_level(if args.debug {\n            tracing::Level::TRACE\n        } else {\n            tracing::Level::WARN\n        })\n        .init();\n\n    if args.debug {\n        debug!(\"Debug mode is on\");\n    }\n\n    // Handle save-config option - save built-in specs and exit\n    if let Some(save_path) = \u0026args.save_config {\n        info!(\"Saving built-in search specifications to: {}\", save_path);\n        let builtin_specs = init_all_search_specs();\n        save_specs_to_toml(\u0026builtin_specs, save_path)\n            .with_context(|| format!(\"Failed to save specs to file: {}\", save_path))?;\n        info!(\n            \"Successfully saved {} search specifications to {}\",\n            builtin_specs.len(),\n            save_path\n        );\n        return Ok(());\n    }\n\n    info!(\"Output directory: {}\", args.output_directory);\n\n    // ensure output directory exists BEFORE creating State (which creates audit file)\n    fs::create_dir_all(\u0026args.output_directory).with_context(|| {\n        format!(\n            \"Failed to create output directory: {}\",\n            args.output_directory\n        )\n    })?;\n\n    let config = StateConfig {\n        output_directory: args.output_directory.clone(),\n        debug: args.debug,\n        prefix_filenames: args.prefix_filenames,\n        chunk_size: None,\n        block_size: Some(args.block_size),\n        skip: None,\n        disable_validation: args.disable_validation,\n        report_only: args.report_only,\n        disable_report: args.disable_report,\n        disable_audit: args.disable_audit,\n        quick: args.quick,\n        write_all: args.write_all,\n    };\n\n    let mut state = State::new(config)?;\n\n    // If reporting is enabled, create a reporter with real system information\n    if !args.disable_report {\n        let exec_env = create_execution_environment();\n        let report = utmost_lib::CarveReport::new_with_env(\"\", 0, exec_env);\n        let json_reporter = JsonReporter::new_with_report(\u0026args.output_directory, report);\n        state.set_reporter(ThreadSafeReporter::new(Box::new(json_reporter)));\n    }\n\n    // Initialize search specifications using the new combined approach\n    let combined_specs = get_combined_search_specs(\n        \u0026args.types,\n        args.disable_builtin,\n        args.config_file.as_deref(),\n    )\n    .context(\"Failed to initialize search specifications\")?;\n\n    state.set_search_specs(combined_specs);\n\n    state.num_builtin = state.get_search_specs().len();\n    debug!(\"Loaded {} search specifications\", state.num_builtin);\n    for (i, spec) in state.get_search_specs().iter().enumerate() {\n        debug!(\"Spec {}: {} (header: {:?})\", i, spec.suffix, spec.header);\n    }\n\n    // Process files\n    if args.input_files.is_empty() {\n        // No files specified, read from stdin\n        info!(\"No input files specified, reading from stdin\");\n        process_stdin(\u0026state).context(\"processing stdin\")?;\n    } else {\n        // Process multiple files with controlled concurrency\n        process_files_parallel(\u0026state, \u0026args.input_files, args.concurrent_files)\n            .context(\"processing input files\")?;\n    }\n\n    // print stats\n    print_stats(\u0026state).context(\"printing stats\")?;\n\n    Ok(())\n}\n\nfn process_stdin(state: \u0026State) -\u003e Result\u003c()\u003e {\n    info!(\"Starting file carving from stdin\");\n    let mut file_info = FileInfo {\n        filename: \"stdin\".to_string(),\n        total_bytes: 0,\n        total_megs: 0,\n        bytes_read: 0,\n        per_file_counter: 0,\n    };\n\n    // Create eded in the thread\n            let input_file = input_file.clone();\n            let state_clone = state.clone();\n            let multi_progress_clone = multi_progress.clone();\n\n            let handle = thread::spawn(move || {\n                if let Err(e) =\n                    process_single_file(\u0026input_file, multi_progress_clone, state_clone, total_files)\n                {\n                    error!(\"failed to process file: {:?}\", e);\n                }\n            });\n\n            batch_handles.push(handle);\n        }\n\n        // Wait for this batch to complete before starting the next\n        for handle in batch_handles {\n            if let Err(e) = handle.join() {\n                error!(\"Thread panicked: {:?}\", e);\n            }\n        }\n    }\n\n    Ok(())\n}\n\nfn process_single_file(\n    input_file: \u0026str,\n    multi_progress_clone: Arc\u003cMultiProgress\u003e,\n    state_clone: State,\n    total_files: usize,\n) -\u003e Result\u003c()\u003e {\n    debug!(\"Processing file: {}\", input_file);\n\n    // Check if file exists\n    if !Path::new(\u0026input_file).exists() {\n        bail!(\"Input file does not exist: {}\", input_file);\n    }\n\n    // Get file size for progress bar\n    let file_size = match fs::metadata(input_file) {\n        Ok(metadata) =\u003e metadata.len(),\n        Err(_) =\u003e {\n            bail!(\"Cannot read file metadata: {}\", input_file);\n        }\n    };\n\n    // Create progress bar for this file\n    let pb = multi_progress_clone.add(ProgressBar::new(file_size));\n    pb.set_style(\n        ProgressStyle::default_bar()\n            .template(PROGRESS_BAR_TEMPLATE)\n            .expect(\"valid progress bar template\")\n            .progress_chars(\"█▉▊▋▌▍▎▏ \"),\n    );\n\n    // Set filename as prefix (truncate if too long)\n    let filename = Path::new(\u0026input_file)\n        .file_name()\n        .unwrap_or_else(|| OsStr::new(\u0026input_file))\n        .to_string_lossy();\n    let truncated_name = if filename.len() \u003e 15 {\n        format!(\"{}...\", \u0026filename[..12])\n    } else {\n        filename.to_string()\n    };\n    pb.set_prefix(format!(\"{:15}\", truncated_name));\n\n    // Process file with progress bar\n    if let Err(e) = process_file_with_progress_parallel(\u0026state_clone, input_file, \u0026pb, total_files)\n    {\n        pb.finish_with_message(\"Errored\");\n        bail!(\"Failed to process file {}: {}\", input_file, e);\n    }\n\n    pb.finish_with_message(\"Complete\");\n\n    Ok(())\n}\n\n/// Process a single file with progress bar (parallel-safe version)\nfn process_file_with_progress_parallel(\n    state: \u0026State,\n    filename: \u0026str,\n    pb: \u0026ProgressBar,\n    total_input_files: usize,\n) -\u003e Result\u003c()\u003e {\n    let mut file_info = FileInfo {\n        filename: filename.to_string(),\n        total_bytes: 0,\n        total_megs: 0,\n        bytes_read: 0,\n        per_file_counter: 0,\n    };\n\n    // open input file\n    let mut input_file = File::open(filename).context(\"opening input file\")?;\n\n    file_info.total_bytes = input_file\n        .metadata()\n        .context(\"getting file metadata\")?\n        .len() as usize;\n    file_info.total_megs = file_info.total_bytes / (1024 * 1024);\n\n    // Use progress callback to update progress bar\n    let progress_callback = |position: u64| {\n        pb.set_position(position);\n    };\n\n    engine::search_stream_with_progress(\n        \u0026mut input_file,\n        state,\n        \u0026mut file_info,\n        progress_callback,\n        total_input_files,\n    )\n    .context(\"searching stream\")?;\n\n    state.audit_finish(\u0026file_info).context(\"finishing audit\")?;\n\n    Ok(())\n}\n\n/// Entry point for `utmost recover …`\nfn run_recover(args: RecoverArgs) -\u003e Result\u003c()\u003e {\n    dotenvy::dotenv().ok();\n\n    tracing_subscriber::fmt()\n        .with_max_level(if args.debug {\n            tracing::Level::TRAC #[inline(always)]\npub fn bmp_file_size_heuristic(spec: \u0026SearchSpec, buf: \u0026[u8]) -\u003e usize {\n    if buf.len() \u003e= 6 {\n        let size = bytes_to_u32(\u0026buf[2..6], Endianness::Little);\n        cmp::min(size as usize, spec.max_len)\n    } else {\n        0\n    }\n}\n\n/// Validate BMP file structure to reduce false positives.\n/// Performs comprehensive validation of BMP header fields.\npub fn validate_bmp_file(data: \u0026[u8]) -\u003e bool {\n    if data.len() \u003c 54 {\n        return false;\n    }\n    let Some((file_size, pixel_offset)) = check_bmp_file_header(data) else {\n        return false;\n    };\n    if !check_bmp_dib_header(data, file_size, pixel_offset) {\n        return false;\n    }\n    check_bmp_image_params(data, file_size, pixel_offset)\n}\n\n/// Validate the 14-byte BMP file header (signature, file size, reserved, pixel offset).\n/// Returns `Some((file_size, pixel_data_offset))` on success.\nfn check_bmp_file_header(data: \u0026[u8]) -\u003e Option\u003c(usize, usize)\u003e {\n    // BM signature (already verified by search, but double-check)\n    if data[0] != b'B' || data[1] != b'M' {\n        return None;\n    }\n\n    // File size (bytes 2-5): must be ≥54 and not exceed the buffer\n    let file_size = bytes_to_u32(\u0026data[2..6], Endianness::Little) as usize;\n    if file_size \u003c 54 || file_size \u003e data.len() {\n        return None;\n    }\n\n    // Reserved fields (bytes 6-9) must be zero\n    if data[6] != 0 || data[7] != 0 || data[8] != 0 || data[9] != 0 {\n        return None;\n    }\n\n    // Pixel data offset (bytes 10-13): at least 54, must not exceed file_size\n    let pixel_data_offset = bytes_to_u32(\u0026data[10..14], Endianness::Little) as usize;\n    if pixel_data_offset \u003c 54 || pixel_data_offset \u003e file_size {\n        return None;\n    }\n\n    Some((file_size, pixel_data_offset))\n}\n\n/// Validate the DIB header (size, dimensions, pixel format, compression).\n/// Returns `false` immediately on any constraint violation.\nfn check_bmp_dib_header(data: \u0026[u8], _file_size: usize, _pixel_offset: usize) -\u003e bool {\n    // DIB header size (bytes 14-17): accepted values per spec\n    let dib_header_size = bytes_to_u32(\u0026data[14..18], Endianness::Little);\n    match dib_header_size {\n        40 | 52 | 56 | 108 | 124 =\u003e {}\n        _ =\u003e return false,\n    }\n\n    // All accepted DIB sizes are ≥40, so the BITMAPINFOHEADER fields are always present\n    let width = bytes_to_u32(\u0026data[18..22], Endianness::Little);\n    let height_raw = bytes_to_u32(\u0026data[22..26], Endianness::Little);\n\n    if width == 0 || width \u003e 65536 {\n        return false;\n    }\n\n    // Height can be negative (top-down bitmap); check absolute value\n    let height = if height_raw \u003e 0x80000000 {\n        !(height_raw - 1) // two's complement negate\n    } else {\n        height_raw\n    };\n    if height == 0 || height \u003e 65536 {\n        return false;\n    }\n\n    // Color planes (bytes 26-27) must be 1\n    let planes = bytes_to_u16(\u0026data[26..28], Endianness::Little);\n    if planes != 1 {\n        return false;\n    }\n\n    // Bits per pixel (bytes 28-29): only standard values accepted\n    let bits_per_pixel = bytes_to_u16(\u0026data[28..30], Endianness::Little);\n    match bits_per_pixel {\n        1 | 4 | 8 | 16 | 24 | 32 =\u003e {}\n        _ =\u003e return false,\n    }\n\n    // Compression method (bytes 30-33):\n    // 0=BI_RGB, 1=BI_RLE8, 2=BI_RLE4, 3=BI_BITFIELDS, 4=BI_JPEG, 5=BI_PNG\n    let compression = bytes_to_u32(\u0026data[30..34], Endianness::Little);\n    if compression \u003e 5 {\n        return false;\n    }\n\n    // Compression↔bpp compatibility\n    match compression {\n        1 if bits_per_pixel != 8 =\u003e return false, // BI_RLE8 requires 8-bit\n        2 if bits_per_pixel != 4 =\u003e return false, // BI_RLE4 requires 4-bit\n        _ =\u003e {}\n    }\n\n    true\n}\n\n/// Validate image data parameters: size consistency, resolution, palette, and bounds.\nfn check_bmp_image_params(data: \u0026[u8], file_size: usize, pixel_data_offset: usize) -\u003e bool {\n    let width = bytes_to_u32(\u0026data[18..22], Endianness::Little);\n    let height_raw = bytes_to_u32(\u0026data[22..26], Endianness::Little);\n    let height = if height_raw \u003e 0x80000000 {\n        !(height_raw - 1)\n    } else {\n        height_raw\n    };\n    let bits_per_pixel = bytes_to_u16(\u0026data[28..30], Endianness::Little);\n    let compression = bytes_to_u32(\u0026data[30..34], Endianness::Little);\n\n    // Image size (bytes 34-37) — may be 0 for uncompressed images\n    let image_size = bytes_to_u32(\u0026data[34..38], Endianness::Little);\n    if image_size \u003e 0 {\n        // Row size aligned to 4-byte boundaries: ((width * bpp + 31) / 32) * 4\n        let bits_per_row = width * bits_per_pixel as u32;\n        #[allow(clippy::manual_div_ceil)]\n        let calculated_row_size = ((bits_per_row + 31) / 32) * 4;\n        let expected_size = calculated_row_size * height;\n\n        if compression == 0 \u0026\u0026 image_size != expected_size {\n            return false;\n        }\n        if pixel_data_offset + image_size as usize \u003e file_size {\n            return false;\n        }\n    }\n\n    // X/Y pixels-per-meter (bytes 38-45): if non-zero must be in 1–1_000_000\n    let x_ppm = bytes_to_u32(\u0026data[38..42], Endianness::Little);\n    let y_ppm = bytes_to_u32(\u0026data[42..46], Endianness::Little);\n    let valid_range = 1..=1_000_000;\n    if (x_ppm \u003e 0 \u0026\u0026 !valid_range.contains(\u0026x_ppm)) || (y_ppm \u003e 0 \u0026\u0026 !valid_range.contains(\u0026y_ppm))\n    {\n        return false;\n    }\n\n    // Colors used (bytes 46-49): must not exceed palette capacity for the bit depth\n    let colors_used = bytes_to_u32(\u0026data[46..50], Endianness::Little);\n    if colors_used \u003e 0 {\n        let max_colors: u32 = match bits_per_pixel {\n            1 =\u003e 2,\n            4 =\u003e 16,\n            8 =\u003e 256,\n            _ =\u003e 0, // 16/24/32-bit don't use indexed palettes\n        };\n        if max_colors \u003e 0 \u0026\u0026 colors_used \u003e max_colors {\n            return false;\n        }\n    }\n\n    // Important colors (bytes 50-53): must not exceed colors_used\n    let important_colors = bytes_to_u32(\u0026data[50..54], Endianness::Little);\n    if important_colors \u003e colors_used \u0026\u0026 colors_used \u003e 0 {\n        return false;\n    }\n\n    // Final bounds: pixel data offset must be within the buffer\n    if pixel_data_offset \u003e data.len() {\n        return false;\n    }\n\n    true\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::types::{FileType, SearchSpec, SearchType};\n\n    fn create_valid_bmp_header() -\u003e Vec\u003cu8\u003e {\n        let mut data = vec![0u8; 54];\n\n        // BMP signature\n        data[0] = b'B';\n        data[1] = b'M';\n\n        // File size (54 bytes header)\n        data[2] = 54;\n        data[3] = 0;\n        data[4] = 0;\n        data[5] = 0;\n\n        // Reserved fields (bytes 6-9) = 0\n        // Already zeroed\n\n        // Offset to pixel data (54 bytes)\n        data[10] = 54;\n        data[11] = 0;\n        data[12] = 0;\n        data[13] = 0;\n\n        // DIB header size (40 bytes - BITMAPINFOHEADER)\n        data[14] = 40;\n        data[15] = 0;\n        data[16] = 0;\n        data[17] = 0;\n\n        // Width (100 pixels)\n        data[18] = 100;\n        data[19] = 0;\n        data[20] = 0;\n        data[21] = 0;\n\n        // Height (100 pixels)\n        data[22] = 100;\n        data[23] = 0;\n        data[24] = 0;\n        data[25] = 0;\n\n        // Color planes (1)\n        data[26] = 1;\n        data[27] = 0;\n\n        // Bits per pixel (24)\n        data[28] = 24;\n        data[29] = 0;\n\n        // Compression (0 = no compression)\n        data[30] = 0;\n        data[31] = 0;\n        data[32] = 0;\n        data[33] = 0;\n\n        // Image size (0 for uncompressed)\n        data[34] = 0;\n        data[35] = 0;\n        data[36] = 0;\n        data[37] = 0;\n\n        // X pixels per meter (2835 = ~72 DPI)\n        data[38] = 0x13;\n        data[39] = 0x0B;\n        data[40] = 0;\n        data[41] = 0;\n\n        // Y pixels per meter (2835 = ~72 DPI)\n        data[42] = 0x13;\n        data[43] = 0x0B;\n        data[44] = 0;\n        data[45] = 0;\n\n        // Colors used (0)\n        data[46] = 0;\n        data[47] = 0;\n        data[48] = 0;\n        data[49] = 0;\n\n        // Important colors (0)\n        data[50] = 0;\n        data[51] = 0;\n        data[52] = 0;\n        data[53] = 0;\n\n        data\n    }\n\n    #[test]\n    fn test_validate_bmp_file_valid() {\n        let valid_bmp = create_valid_bmp_header();\n        assert!(validate_bmp_file(\u0026valid_bmp));\n    }\n\n    #[test]\n    fn test_validate_bmp_file_too_small() {\n        let small_data = vec![b'B', b'M']; // Only 2 bytes\n        assert!(!validate_bmp_file(\u0026small_data));\n    }\n\n    #[test]\n    fn test_validate_bmp_file_wrong_signature() {\n        let mut invalid_bmp = create_valid_bmp_header();\n        invalid_bmp[0] = b'X'; // Wrong signature\n        assert!(!validate_bmp_file(\u0026invalid_bmp));\n    }\n\n    #[test]\n    fn test_validate_bmp_file_invalid_file_size() {\n        let mut invalid_bmp = create_valid_bmp_header();\n        // Set file size to be larger than buffer\n        invalid_bmp[2] = 255;\n        invalid_bmp[3] = 255;\n        invalid_bmp[4] = 255;\n        invalid_bmp[5] = 255;\n        assert!(!validate_bmp_file(\u0026invalid_bmp));\n    }\n\n    #[test]\n    fn test_validate_bmp_file_nonzero_reserved() {\n        let mut invalid_bmp = create_valid_bmp_header();\n        invalid_bmp[6] = 1; // Reserved field should be 0\n        assert!(!validate_bmp_file(\u0026invalid_bmp));\n    }\n\n    #[test]\n    fn test_validate_bmp_file_invalid () {\n        let mut invalid_bmp = create_valid_bmp_header();\n        invalid_bmp[28] = 24; // 24 bits per pixel\n        invalid_bmp[30] = 1; // BI_RLE8 compression (only valid for 8-bit)\n        assert!(!validate_bmp_file(\u0026invalid_bmp));\n    }\n\n    #[test]\n    fn test_validate_bmp_file_negative_height() {\n        let mut valid_bmp = create_valid_bmp_header();\n        // Set negative height (top-down bitmap) - should still be valid\n        valid_bmp[22] = 0x9C; // -100 in two's complement (little endian)\n        valid_bmp[23] = 0xFF;\n        valid_bmp[24] = 0xFF;\n        valid_bmp[25] = 0xFF;\n        assert!(validate_bmp_file(\u0026valid_bmp));\n    }\n\n    #[test]\n    fn test_bmp_file_size_heuristic() {\n        let spec = SearchSpec::new(\n            FileType::Bmp,\n            \"bmp\",\n            b\"BM\",\n            None,\n            10 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let mut data = vec![0u8; 100];\n        data[0] = b'B';\n        data[1] = b'M';\n        // File size = 64 bytes\n        data[2] = 64;\n        data[3] = 0;\n        data[4] = 0;\n        data[5] = 0;\n\n        let size = bmp_file_size_heuristic(\u0026spec, \u0026data);\n        assert_eq!(size, 64);\n    }\n\n    #[test]\n    fn test_bmp_file_size_heuristic_too_small() {\n        let spec = SearchSpec::new(\n            FileType::Bmp,\n            \"bmp\",\n            b\"BM\",\n            None,\n            10 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let data = vec![0u8; 4]; // Too small for size field\n        let size = bmp_file_size_heuristic(\u0026spec, \u0026data);\n        assert_eq!(size, 0);\n    }\n\n    #[test]\n    fn test_valid_dib_sizes() {\n        // DIB header sizes 52, 56, 108, 124 are all valid\n        for \u0026dib_size in \u0026[52u32, 56, 108, 124] {\n            let total_size = 14 + dib_size as usize;\n            let mut data = vec![0u8; total_size];\n            data[0] = b'B';\n            data[1] = b'M';\n            let sz = total_size as u32;\n            data[2..6].copy_from_slice(\u0026sz.to_le_bytes());\n            data[10..14].copy_from_slice(\u0026sz.to_le_bytes());\n            data[14..18].copy_from_slice(\u0026dib_size.to_le_bytes());\n            data[18] = 1; // width = 1\n            data[22] = 1; // height = 1\n            data[26] = 1; // planes = 1\n            data[28] = 24; // bpp = 24\n            assert!(\n                validate_bmp_file(\u0026data),\n                \"DIB size {dib_size} should be valid\"\n            );\n        }\n    }\n\n    #[test]\n    fn test_valid_compression_methods() {\n        // BI_RLE8 (1) requires bpp=8\n        let mut bmp = create_valid_bmp_header();\n        bmp[28] = 8;\n        bmp[30] = 1;\n        assert!(\n            validate_bmp_file(\u0026bmp),\n            \"BI_RLE8 with bpp=8 should be valid\"\n        );\n\n        // BI_RLE4 (2) requires bpp=4\n        let mut bmp = create_valid_bmp_header();\n        bmp[28] = 4;\n        bmp[30] = 2;\n        assert!(\n            validate_bmp_file(\u0026bmp),\n            \"BI_RLE4 with bpp=4 should be valid\"\n        );\n\n        // BI_BITFIELDS (3), BI_JPEG (4), BI_PNG (5) have no bpp constraint\n        for compression in [3u8, 4, 5] {\n            let mut bmp = create_valid_bmp_header();\n            bmp[30] = compression;\n            assert!(\n                validate_bmp_file(\u0026bmp),\n                \"compression method {compression} should be valid\"\n            );\n        }\n    }\n\n    #[test]\n    fn test_rle4_compression_mismatch() {\n        let mut bmp = create_valid_bmp_header();\n        bmp[28] = 8; // bpp=8, but BI_RLE4 requires bpp=4\n        bmp[30] = 2; // BI_RLE4\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_uncompressed_image_size_mismatch() {\n        let mut bmp = create_valid_bmp_header();\n        // width=100, height=100, bpp=24, compression=0 → expected size is 30000\n        // Set image_size=1 (wrong) to trigger mismatch rejection\n        bmp[34] = 1;\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_dpi_out_of_range() {\n        let mut bmp = create_valid_bmp_header();\n        // x_ppm = 1_000_001 exceeds the valid range of 1–1_000_000\n        let out_of_range: u32 = 1_000_001;\n        bmp[38..42].copy_from_slice(\u0026out_of_range.to_le_bytes());\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_colors_used_exceeds_palette_1bit() {\n        let mut bmp = create_valid_bmp_header();\n        bmp[28] = 1; // bpp=1 → max palette is 2\n        bmp[46] = 3; // colors_used=3 \u003e 2\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_colors_used_exceeds_palette_4bit() {\n        let mut bmp = create_valid_bmp_header();\n        bmp[28] = 4; // bpp=4 → max palette is 16\n        bmp[46] = 17; // colors_used=17 \u003e 16\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_colors_used_exceeds_palette_8bit() {\n        let mut bmp = create_valid_bmp_header();\n        bmp[28] = 8; // bpp=8 → max palette is 256\n        bmp[46..50].copy_from_slice(\u0026257u32.to_le_bytes()); // colors_used=257 \u003e 256\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_important_colors_exceeds_colors_used() {\n        let mut bmp = create_valid_bmp_header();\n        bmp[46] = 4; // colors_used=4\n        bmp[50] = 5; // important_colors=5 \u003e colors_used\n        assert!(!validate_bmp_file(\u0026bmp));\n    }\n\n    #[test]\n    fn test_bmp_file_size_heuristic_exceeds_max() {\n        let spec = SearchSpec::new(\n            FileType::Bmp,\n            \"bmp\",\n            b\"BM\",\n            None,\n            1024, // Max 1KB\n            true,\n            SearchType::Forward,\n        );\n\n        let mut data = vec SIZE_OF_IMAGE_FROM_LFANEW: usize = 80;\n\n/// Determine the on-disk size of a PE executable by reading `SizeOfImage`\n/// from the Optional Header.\n///\n/// `SizeOfImage` is the in-memory size of the image rounded up to section\n/// alignment — a reliable upper bound for the on-disk PE size.  Falls back\n/// to `min(spec.max_len, buf.len())` when the PE header cannot be parsed.\npub fn exe_file_size_heuristic(spec: \u0026SearchSpec, buf: \u0026[u8]) -\u003e usize {\n    // Need at least the DOS header to read e_lfanew\n    if buf.len() \u003c PE_DOS_HEADER_MIN_SIZE {\n        return cmp::min(spec.max_len, buf.len());\n    }\n\n    let e_lfanew = bytes_to_u32(\n        \u0026buf[PE_LFANEW_OFFSET..PE_DOS_HEADER_MIN_SIZE],\n        Endianness::Little,\n    ) as usize;\n\n    // SizeOfImage: e_lfanew + 4 (PE sig) + 20 (COFF header) + 56 (field offset)\n    let size_of_image_offset = e_lfanew.saturating_add(PE_SIZE_OF_IMAGE_FROM_LFANEW);\n    if size_of_image_offset + 4 \u003e buf.len() {\n        return cmp::min(spec.max_len, buf.len());\n    }\n\n    // Verify PE signature\n    if e_lfanew + 4 \u003e buf.len() || \u0026buf[e_lfanew..e_lfanew + 4] != b\"PE\\0\\0\" {\n        return cmp::min(spec.max_len, buf.len());\n    }\n\n    let size_of_image = bytes_to_u32(\n        \u0026buf[size_of_image_offset..size_of_image_offset + 4],\n        Endianness::Little,\n    ) as usize;\n\n    if size_of_image \u003e 0 \u0026\u0026 size_of_image \u003c= spec.max_len {\n        cmp::min(size_of_image, buf.len())\n    } else {\n        cmp::min(spec.max_len, buf.len())\n    }\n}\n\n/// Validate EXE file by checking PE header\npub fn validate_exe_file(data: \u0026[u8]) -\u003e bool {\n    // Check if we have enough data to read e_lfanew\n    if data.len() \u003c PE_DOS_HEADER_MIN_SIZE {\n        return false;\n    }\n\n    // Read e_lfanew value (4 bytes little-endian)\n    let e_lfanew_bytes = \u0026data[PE_LFANEW_OFFSET..PE_DOS_HEADER_MIN_SIZE];\n    let e_lfanew = bytes_to_u32(e_lfanew_bytes, Endianness::Little) as usize;\n\n    // Check if the PE header offset is within bounds\n    if e_lfanew \u003e= data.len() || e_lfanew + 4 \u003e data.len() {\n        return false;\n    }\n\n    // Check if PE signature exists at the calculated offset\n    let pe_signature = \u0026data[e_lfanew..e_lfanew + 4];\n    pe_signature == b\"PE\\0\\0\"\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":28},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","engine","gif.rs"],"content":"/// Validate a GIF file candidate.\n///\n/// Checks that the file starts with a GIF87a or GIF89a header and that\n/// the canvas dimensions are non-zero.\npub fn validate_gif_file(data: \u0026[u8]) -\u003e bool {\n    // Need at least 10 bytes: 6 header + 2 width + 2 height\n    if data.len() \u003c 10 {\n        return false;\n    }\n\n    // First 6 bytes must be \"GIF87a\" or \"GIF89a\"\n    if \u0026data[..6] != b\"GIF87a\" \u0026\u0026 \u0026data[..6] != b\"GIF89a\" {\n        return false;\n    }\n\n    // Bytes 6-7: canvas width (little-endian u16), must be \u003e 0\n    let width = u16::from_le_bytes([data[6], data[7]]);\n    // Bytes 8-9: canvas height (little-endian u16), must be \u003e 0\n    let height = u16::from_le_bytes([data[8], data[9]]);\n\n    width \u003e 0 \u0026\u0026 height \u003e 0\n}\n","traces":[{"line":5,"address":[],"length":0,"stats":{"Line":0}},{"line":7,"address":[],"length":0,"stats":{"Line":0}},{"line":8,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":8},{"path":["/","Users","steve","src","utmost","crates","utmost-lib","src","engine","gz.rs"],"content":"use std::cmp;\n\nuse crate::{\n    SearchSpec,\n    types::{CONSERVATIVE_FALLBACK_SIZE, Endianness, bytes_to_u16, bytes_to_u32},\n};\n\n/// Validate GZIP file structure to reduce false positives.\n/// Performs comprehensive validation of GZIP header fields.\npub fn validate_gz_file(data: \u0026[u8]) -\u003e bool {\n    let Some(flags) = check_gz_fixed_header(data) else {\n        return false;\n    };\n    let Some(header_end) = skip_gz_optional_fields(data, flags) else {\n        return false;\n    };\n    validate_gz_payload(data, header_end)\n}\n\n/// Validate the 10-byte fixed GZIP header.\n/// Returns `Some(flags)` on success, `None` on any violation.\nfn check_gz_fixed_header(data: \u0026[u8]) -\u003e Option\u003cu8\u003e {\n    if data.len() \u003c 10 {\n        return None;\n    }\n\n    // Magic number (already verified by search, but double-check)\n    if data[0] != 0x1F || data[1] != 0x8B {\n        return None;\n    }\n\n    // Compression method must be 8 (deflate)\n    if data[2] != 0x08 {\n        return None;\n    }\n\n    let flags = data[3];\n\n    // Reserved bits 5-7 must be zero\n    if (flags \u0026 0xE0) != 0 {\n        return None;\n    }\n\n    // Modification time: 0 = unknown; otherwise in range 86400–3_153_600_000 (~1970–2070)\n    let mtime = bytes_to_u32(\u0026data[4..8], Endianness::Little);\n    if mtime != 0 \u0026\u0026 !(86400..=3153600000).contains(\u0026mtime) {\n        return None;\n    }\n\n    // Extra flags: 0=unknown, 2=max compression, 4=fastest compression\n    match data[8] {\n        0 | 2 | 4 =\u003e {}\n        _ =\u003e return None,\n    }\n\n    // OS: 0–13 are defined values, 255 = unknown\n    if data[9] \u003e 13 \u0026\u0026 data[9] != 255 {\n        return None;\n    }\n\n    Some(flags)\n}\n\n/// Walk the optional GZIP header fields (FEXTRA, FNAME, FCOMMENT, FHCRC).\n/// Returns `Some(header_end_pos)` on success, `None` on truncation or invalid content.\nfn skip_gz_optional_fields(data: \u0026[u8], flags: u8) -\u003e Option\u003cusize\u003e {\n    let mut pos = 10;\n\n    // FEXTRA (bit 2): 2-byte length field followed by that many bytes\n    if (flags \u0026 0x04) != 0 {\n        if pos + 2 \u003e data.len() {\n            return None;\n        }\n        let xlen = bytes_to_u16(\u0026data[pos..pos + 2], Endianness::Little) as usize;\n        pos += 2;\n        if pos + xlen \u003e data.len() {\n            return None;\n        }\n        pos += xlen;\n    }\n\n    // FNAME (bit 3): null-terminated original filename\n    if (flags \u0026 0x08) != 0 {\n        let start = pos;\n        loop {\n            if pos \u003e= data.len() {\n                return None; // no null terminator\n            }\n            let byte = data[pos];\n            pos += 1;\n            if byte == 0 {\n                break;\n            }\n        }\n        let filename_len = pos - start - 1;\n        if filename_len \u003e 1024 {\n            return None;\n        }\n        for \u0026byte in \u0026data[start..pos - 1] {\n            if !(32..=126).contains(\u0026byte) \u0026\u0026 byte \u003c 128 \u0026\u0026 byte != 9 \u0026\u0026 byte != 10 \u0026\u0026 byte != 13 {\n                return None;\n            }\n        }\n    }\n\n    // FCOMMENT (bit 4): null-terminated comment\n    if (flags \u0026 0x10) != 0 {\n        let start = pos;\n        loop {\n            if pos \u003e= data.len() {\n                return None;\n            }\n            let byte = data[pos];\n            pos += 1;\n            if byte == 0 {\n                break;\n            }\n        }\n        let comment_len = pos - start - 1;\n        if comment_len \u003e 2048 {\n            return None;\n        }\n        for \u0026byte in \u0026data[start..pos - 1] {\n            if !(32..=126).contains(\u0026byte) \u0026\u0026 byte \u003c 128 \u0026\u0026 byte != 9 \u0026\u0026 byte != 10 \u0026\u0026 byte != 13 {\n                return None;\n            }\n        }\n    }\n\n    // FHCRC (bit 1): 2-byte header CRC\n    if (flags \u0026 0x02) != 0 {\n        if pos + 2 \u003e data.len() {\n            return None;\n        }\n        pos += 2;\n    }\n\n    Some(pos)\n}\n\n/// Validate the deflate payload and GZIP trailer starting at `header_end`.\nfn validate_gz_payload(data: \u0026[u8], header_end: usize) -\u003e bool {\n    // Must have at least 8 bytes for the CRC32 + ISIZE trailer\n    if data.len() \u003c header_end + 8 {\n        return false;\n    }\n\n    // Basic deflate stream validation (first block header)\n    let deflate = \u0026data[header_end..];\n    if deflate.len() \u003e= 3 {\n        let btype = (deflate[0] \u003e\u003e 1) \u0026 0x03;\n        // BTYPE 3 is reserved/invalid\n        if btype == 3 {\n            return false;\n        }\n        // Uncompressed block (BTYPE=0): validate LEN/NLEN one's complement\n        if btype == 0 \u0026\u0026 deflate.len() \u003e= 5 {\n            let len = bytes_to_u16(\u0026deflate[1..3], Endianness::Little);\n            let nlen = bytes_to_u16(\u0026deflate[3..5], Endianness::Little);\n            if len != !nlen {\n                return false;\n            }\n        }\n    }\n\n    // Trailer: check that there is a non-empty compressed data section\n    let trailer_start = data.len() - 8;\n    let compressed_size = trailer_start - header_end;\n    if compressed_size == 0 {\n        return false;\n    }\n\n    true\n}\n\n/// Determine GZIP file size heuristic\n/// GZIP files have a defined trailer at the end with CRC32 and ISIZE\npub fn gz_file_size_heuristic(spec: \u0026SearchSpec, buf: \u0026[u8]) -\u003e usize {\n    // For GZIP files, we need to find the end of the deflate stream\n    // This is complex as it requires parsing the deflate format\n    // For now, use a simple heuristic that looks for the trailer pattern\n\n    if buf.len() \u003c 18 {\n        // Minimum: 10 byte header + some data + 8 byte trailer\n        return 0;\n    }\n\n    // For validation purposes, if the entire buffer validates as a complete\n    // GZIP file, return the full buffer size\n    if validate_gz_file(buf) {\n        return buf.len();\n    }\n\n    // Otherwise, look for potential GZIP trailer (last 8 bytes contain CRC32 + ISIZE)\n    // We'll search forwards from a reasonable minimum to find a valid end\n\n    let max_search = cmp::min(spec.max_len, buf.len());\n\n    // Start from a reasonable minimum (18 bytes) and search forward\n    for end_pos in 18..=max_search {\n        if end_pos \u003e buf.len() {\n            break;\n        }\n\n        // Check if this position could be a valid GZIP file end\n        let candidate = \u0026buf[..end_pos];\n        if validate_gz_file(candidate) {\n            return end_pos;\n        }\n    }\n\n    // Fallback to a reasonable size if no clear end found\n    cmp::min(\n        CONSERVATIVE_FALLBACK_SIZE,\n        cmp::min(spec.max_len, buf.len()),\n    )\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::types::{FileType, SearchSpec, SearchType};\n\n    fn create_valid_gzip_header() -\u003e Vec\u003cu8\u003e {\n        let mut data = vec![\n            0x1F, 0x8B, // Magic number\n            0x08, // Compression method (deflate)\n            0x00, // Flags (no optional fields)\n            0x00, 0x00, 0x00, 0x00, // Modification time (0 = unknown)\n            0x00, // Extra flags (0 = unknown)\n            0xFF, // OS (255 = unknown)\n        ];\n\n        // Add some deflate data (simplified)\n        // Final block, uncompressed, 5 bytes: \"hello\"\n        data.push(0x01); // BFINAL=1, BTYPE=00 (uncompressed)\n        data.extend_from_slice(\u0026[0x05, 0x00]); // LEN = 5\n        data.extend_from_slice(\u0026[0xFA, 0xFF]); // NLEN = ~5\n        data.extend_from_slice(b\"hello\"); // Uncompressed data\n\n        // Trailer: CRC32 + ISIZE\n        data.extend_from_slice(\u0026[0x36, 0x38, 0xFE, 0x90]); // CRC32 for \"hello\"\n        data.extend_from_slice(\u0026[0x05, 0x00, 0x00, 0x00]); // ISIZE = 5\n\n        data\n    }\n\n    #[test]\n    fn test_validate_gz_file_valid() {\n        let valid_gz = create_valid_gzip_header();\n        assert!(validate_gz_file(\u0026valid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_too_small() {\n        let small_data = vec![0x1F, 0x8B]; // Only 2 bytes\n        assert!(!validate_gz_file(\u0026small_data));\n    }\n\n    #[test]\n    fn test_validate_gz_file_wrong_magic() {\n        let mut invalid_gz = create_valid_gzip_header();\n        invalid_gz[0] = 0x1E; // Wrong magic number\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_wrong_compression_method() {\n        let mut invalid_gz = create_valid_gzip_header();\n        invalid_gz[2] = 0x09; // Wrong compression method\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_reserved_flags() {\n        let mut invalid_gz = create_valid_gzip_header();\n        invalid_gz[3] = 0x80; // Reserved bit set\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_invalid_mtime() {\n        let mut invalid_gz = create_valid_gzip_header();\n        // Set invalid timestamp (too old)\n        invalid_gz[4] = 0x01;\n        invalid_gz[5] = 0x00;\n        invalid_gz[6] = 0x00;\n        invalid_gz[7] = 0x00;\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_invalid_xfl() {\n        let mut invalid_gz = create_valid_gzip_header();\n        invalid_gz[8] = 0x01; // Invalid extra flags\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_invalid_os() {\n        let mut invalid_gz = create_valid_gzip_header();\n        invalid_gz[9] = 50; // Invalid OS identifier\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_with_filename() {\n        let mut data = Vec::new();\n\n        // Magic number and compression method\n        data.extend_from_slice(\u0026[0x1F, 0x8B, 0x08]);\n\n        // Flags with FNAME set\n        data.push(0x08);\n\n        // Modification time, xfl, os\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00, 0x00, 0xFF]);\n\n        // Filename\n        data.extend_from_slice(b\"test.txt\\0\");\n\n        // Minimal deflate data and trailer\n        data.push(0x01); // Final uncompressed block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0xFF, 0xFF]); // Empty block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // CRC32\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // ISIZE\n\n        assert!(validate_gz_file(\u0026data));\n    }\n\n    #[test]\n    fn test_validate_gz_file_with_comment() {\n        let mut data = Vec::new();\n\n        // Magic number and compression method\n        data.extend_from_slice(\u0026[0x1F, 0x8B, 0x08]);\n\n        // Flags with FCOMMENT set\n        data.push(0x10);\n\n        // Modification time, xfl, os\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00, 0x00, 0xFF]);\n\n        // Comment\n        data.extend_from_slice(b\"This is a test file\\0\");\n\n        // Minimal deflate data and trailer\n        data.push(0x01); // Final uncompressed block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0xFF, 0xFF]); // Empty block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // CRC32\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // ISIZE\n\n        assert!(validate_gz_file(\u0026data));\n    }\n\n    #[test]\n    fn test_validate_gz_file_invalid_deflate_block() {\n        let mut invalid_gz = create_valid_gzip_header();\n        // Corrupt the deflate block type\n        invalid_gz[10] = 0x07; // BTYPE = 11 (reserved/invalid)\n        assert!(!validate_gz_file(\u0026invalid_gz));\n    }\n\n    #[test]\n    fn test_validate_gz_file_uncompressed_block_mismatch() {\n        let mut data = Vec::new();\n\n        // Valid header\n        data.extend_from_slice(\u0026[0x1F, 0x8B, 0x08, 0x00]);\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00, 0x00, 0xFF]);\n\n        // Uncompressed block with mismatched LEN/NLEN\n        data.push(0x01); // BFINAL=1, BTYPE=00 (uncompressed)\n        data.extend_from_slice(\u0026[0x05, 0x00]); // LEN = 5\n        data.extend_from_slice(\u0026[0xFB, 0xFF]); // NLEN = ~5 + 1 (wrong)\n        data.extend_from_slice(b\"hello\");\n\n        // Trailer\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]);\n        data.extend_from_slice(\u0026[0x05, 0x00, 0x00, 0x00]);\n\n        assert!(!validate_gz_file(\u0026data));\n    }\n\n    #[test]\n    fn test_gz_file_size_heuristic() {\n        let spec = SearchSpec::new(\n            FileType::Gzip,\n            \"gz\",\n            \u0026[0x1F, 0x8B, 0x08],\n            Some(\u0026[0x00, 0x00, 0x00, 0x00]),\n            100 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let valid_gz = create_valid_gzip_header();\n        let size = gz_file_size_heuristic(\u0026spec, \u0026valid_gz);\n\n        // Should detect the full file size\n        assert_eq!(size, valid_gz.len());\n    }\n\n    #[test]\n    fn test_gz_file_size_heuristic_too_small() {\n        let spec = SearchSpec::new(\n            FileType::Gzip,\n            \"gz\",\n            \u0026[0x1F, 0x8B, 0x08],\n            Some(\u0026[0x00, 0x00, 0x00, 0x00]),\n            100 * 1024 * 1024,\n            true,\n            SearchType::Forward,\n        );\n\n        let data = vec![0x1F, 0x8B, 0x08]; // Too small\n        let size = gz_file_size_heuristic(\u0026spec, \u0026data);\n        assert_eq!(size, 0);\n    }\n\n    #[test]\n    fn test_validate_gz_file_with_extra_field() {\n        let mut data = Vec::new();\n\n        // Magic number and compression method\n        data.extend_from_slice(\u0026[0x1F, 0x8B, 0x08]);\n\n        // Flags with FEXTRA set\n        data.push(0x04);\n\n        // Modification time, xfl, os\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00, 0x00, 0xFF]);\n\n        // Extra field length (4 bytes)\n        data.extend_from_slice(\u0026[0x04, 0x00]);\n\n        // Extra field data\n        data.extend_from_slice(\u0026[0x01, 0x02, 0x03, 0x04]);\n\n        // Minimal deflate data and trailer\n        data.push(0x01); // Final uncompressed block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0xFF, 0xFF]); // Empty block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // CRC32\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // ISIZE\n\n        assert!(validate_gz_file(\u0026data));\n    }\n\n    #[test]\n    fn test_validate_gz_mtime_zero() {\n        // mtime=0 means \"unknown timestamp\" and is explicitly allowed\n        let mut gz = create_valid_gzip_header();\n        gz[4..8].copy_from_slice(\u00260u32.to_le_bytes());\n        assert!(validate_gz_file(\u0026gz));\n    }\n\n    #[test]\n    fn test_validate_gz_mtime_boundary() {\n        // mtime=86400 is the exact lower bound of the valid non-zero range\n        let mut gz = create_valid_gzip_header();\n        gz[4..8].copy_from_slice(\u002686400u32.to_le_bytes());\n        assert!(validate_gz_file(\u0026gz));\n    }\n\n    #[test]\n    fn test_validate_gz_xfl_values() {\n        // xfl=2 (max compression) and xfl=4 (fast compression) are both valid\n        let mut gz = create_valid_gzip_header();\n        gz[8] = 2;\n        assert!(\n            validate_gz_file(\u0026gz),\n            \"xfl=2 (max compression) should be valid\"\n        );\n\n        let mut gz = create_valid_gzip_header();\n        gz[8] = 4;\n        assert!(\n            validate_gz_file(\u0026gz),\n            \"xfl=4 (fast compression) should be valid\"\n        );\n    }\n\n    #[test]\n    fn test_validate_gz_btype_fixed_huffman() {\n        // BTYPE=1 (fixed Huffman coding) is a valid deflate block type\n        let mut gz = create_valid_gzip_header();\n        // Byte 10 is the first deflate byte; BFINAL=1, BTYPE=01 → 0x03\n        gz[10] = 0x03;\n        assert!(validate_gz_file(\u0026gz));\n    }\n\n    #[test]\n    fn test_validate_gz_btype_dynamic_huffman() {\n        // BTYPE=2 (dynamic Huffman coding) is a valid deflate block type\n        let mut gz = create_valid_gzip_header();\n        // BFINAL=1, BTYPE=10 → 0x05\n        gz[10] = 0x05;\n        assert!(validate_gz_file(\u0026gz));\n    }\n\n    #[test]\n    fn test_validate_gz_all_optional_fields() {\n        // All four optional header fields present simultaneously\n        let mut data = Vec::new();\n        data.extend_from_slice(\u0026[0x1F, 0x8B, 0x08]);\n        data.push(0x1E); // flags: FHCRC(0x02)|FEXTRA(0x04)|FNAME(0x08)|FCOMMENT(0x10)\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // mtime=0\n        data.push(0x00); // xfl=0\n        data.push(0xFF); // os=255 (unknown)\n\n        // FEXTRA: 2-byte length + 2 bytes of data\n        data.extend_from_slice(\u0026[0x02, 0x00]);\n        data.extend_from_slice(\u0026[0xAB, 0xCD]);\n\n        // FNAME: null-terminated filename\n        data.extend_from_slice(b\"test.txt\\0\");\n\n        // FCOMMENT: null-terminated comment\n        data.extend_from_slice(b\"ok\\0\");\n\n        // FHCRC: 2-byte header CRC (value not validated)\n        data.extend_from_slice(\u0026[0x12, 0x34]);\n\n        // Deflate: final uncompressed block with \"hello\"\n        data.push(0x01); // BFINAL=1, BTYPE=00\n        data.extend_from_slice(\u0026[0x05, 0x00]); // LEN=5\n        data.extend_from_slice(\u0026[0xFA, 0xFF]); // NLEN=~5\n        data.extend_from_slice(b\"hello\");\n\n        // Trailer: CRC32 + ISIZE (CRC not validated)\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]);\n        data.extend_from_slice(\u0026[0x05, 0x00, 0x00, 0x00]);\n\n        assert!(validate_gz_file(\u0026data));\n    }\n\n    #[test]\n    fn test_validate_gz_file_with_header_crc() {\n        let mut data = Vec::new();\n\n        // Magic number and compression method\n        data.extend_from_slice(\u0026[0x1F, 0x8B, 0x08]);\n\n        // Flags with FHCRC set\n        data.push(0x02);\n\n        // Modification time, xfl, os\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00, 0x00, 0xFF]);\n\n        // Header CRC\n        data.extend_from_slice(\u0026[0x12, 0x34]);\n\n        // Minimal deflate data and trailer\n        data.push(0x01); // Final uncompressed block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0xFF, 0xFF]); // Empty block\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // CRC32\n        data.extend_from_slice(\u0026[0x00, 0x00, 0x00, 0x00]); // ISIZE\n\n        assert!(validate_gz_file(\u0026data));\n    }\n}\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":0}},{"line":11,"address":[],"length":0,"stats":{"Line":0}},{"line":12,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":15,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line": PEG structure analysis pass.\n#[allow(dead_code)]\npub struct JpegScanResult {\n    /// Offset of the FFD9 (EOI) byte pair relative to `buf` start, if found.\n    pub end_offset: Option\u003cusize\u003e,\n    /// Offset within `buf` where compressed scan data begins (after the SOS\n    /// segment header).  Zero when the SOS marker was not reached.\n    pub scan_data_start: usize,\n    /// Offset within `buf` where an unexpected marker was encountered inside\n    /// scan data, suggesting a fragmentation boundary.  `None` when the scan\n    /// data either ended cleanly (EOI found) or was simply truncated at the\n    /// buffer edge with no anomalous marker.\n    pub fragmentation_point: Option\u003cusize\u003e,\n    /// Image width in pixels from the SOF marker, if parsed.\n    pub sof_width: Option\u003cu16\u003e,\n    /// Image height in pixels from the SOF marker, if parsed.\n    pub sof_height: Option\u003cu16\u003e,\n    /// Whether any RST0–RST7 restart markers were observed in the scan data.\n    pub has_restart_markers: bool,\n}\n\n/// Analyse a JPEG buffer and return rich structural metadata alongside the\n/// location of the EOI marker.\n///\n/// Parses the JPEG segment chain (APP, DQT, DHT, SOF, SOS …), extracts image\n/// dimensions and table presence flags, then walks the compressed scan data\n/// byte-by-byte to detect the EOI, restart markers, and potential\n/// fragmentation boundaries.\npub fn analyze_jpeg(buf: \u0026[u8], max_len: usize) -\u003e JpegScanResult {\n    let search_limit = cmp::min(max_len, buf.len());\n    let footer = \u0026[0xFF_u8, 0xD9];\n\n    // Helper that builds a minimal result using simple footer search.\n    let simple = |sof_width, sof_height| JpegScanResult {\n        end_offset: find_first_pattern(\u0026buf[..search_limit], footer),\n        scan_data_start: 0,\n        fragmentation_point: None,\n        sof_width,\n        sof_height,\n        has_restart_markers: false,\n    };\n\n    if buf.len() \u003c 10 {\n        return simple(None, None);\n    }\n\n    // SOI must be FF D8 FF\n    if buf[0] != 0xFF || buf[1] != 0xD8 || buf[2] != 0xFF {\n        return JpegScanResult {\n            end_offset: None,\n            scan_data_start: 0,\n            fragmentation_point: None,\n            sof_width: None,\n            sof_height: None,\n            has_restart_markers: false,\n        };\n    }\n\n    // Only attempt full structural parsing for JFIF (E0) and EXIF (E1) headers.\n    if buf[3] != 0xE0 \u0026\u0026 buf[3] != 0xE1 {\n        return simple(None, None);\n    }\n\n    let mut pos = 2; // start after FF D8\n    let mut has_quantization_table = false;\n    let mut has_huffman_table = false;\n    let mut sof_width: Option\u003cu16\u003e = None;\n    let mut sof_height: Option\u003cu16\u003e = None;\n    let mut found_sos = false;\n\n    // ── Walk JPEG segment chain ──────────────────────────────────────────────\n    'segments: loop {\n        // Need at least FF + marker byte\n        if pos + 2 \u003e search_limit {\n            break;\n        }\n        if buf[pos] != 0xFF {\n            break; // reached raw image data without SOS — unusual, stop\n        }\n\n        // Skip padding FF bytes\n        while pos + 1 \u003c search_limit \u0026\u0026 buf[pos + 1] == 0xFF {\n            pos += 1;\n        }\n        if pos + 2 \u003e search_limit {\n            break;\n        }\n\n        let marker = buf[pos + 1];\n        pos += 2; // advance past FF + marker\n\n        match marker {\n            0xD8 =\u003e continue, // SOI inside stream — skip\n            0xD9 =\u003e break,    // EOI before scan data — treat as empty file\n\n            0xDA =\u003e {\n                // SOS: read the SOS segment header length, then leave `pos`\n                // pointing at the start of the compressed scan data.\n                found_sos = true;\n                if pos + 2 \u003e buf.len() {\n                    break;\n                }\n                let seg_len = u16::from_be_bytes([buf[pos], buf[pos + 1]]) as usize;\n                if seg_len \u003c 2 {\n                    break;\n                }\n                pos += seg_len; // skip over the SOS header (component selectors etc.)\n                break 'segments; // pos now = start of scan data\n            }\n\n            _ =\u003e {\n                // All other markers carry a big-endian length field immediately\n                // after the marker byte.\n                if pos + 2 \u003e buf.len() {\n                    break;\n                }\n                let seg_len = u16::from_be_bytes([buf[pos], buf[pos + 1]]) as usize;\n                if seg_len \u003c 2 || pos + seg_len \u003e buf.len() {\n                    break;\n                }\n\n                match marker {\n                    0xDB =\u003e has_quantization_table = true,\n                    0xC4 =\u003e has_huffman_table = true,\n                    // SOF0 (baseline), SOF1 (extended sequential), SOF2 (progressive)\n                    0xC0..=0xC2 =\u003e {\n                        // Layout after FF Cx [len_hi len_lo]:\n                        //   [precision 1B] [height 2B] [width 2B] …\n                        // `pos` currently points at len_hi.\n                        if pos + 7 \u003c= buf.len() {\n                            let h = u16::from_be_bytes([buf[pos + 3], buf[pos + 4]]);\n                            let w = u16::from_be_bytes([buf[pos + 5], buf[pos + 6]]);\n                            if w \u003e 0 \u0026\u0026 h \u003e 0 {\n                                sof_height = Some(h);\n                                sof_width = Some(w);\n                            }\n                        }\n                    }\n                    _ =\u003e {}\n                }\n\n                pos += seg_len; // skip past this segment\n            }\n        }\n    }\n\n    let scan_data_start = pos;\n\n    // Fall back to simple footer search when required tables are absent.\n    if !has_quantization_table || !has_huffman_table {\n        return JpegScanResult {\n            end_offset: find_first_pattern(\u0026buf[..search_limit], footer),\n            scan_data_start,\n            fragmentation_point: None,\n            sof_width,\n            sof_height,\n            has_restart_markers: false,\n        };\n    }\n\n    if !found_sos || scan_data_start \u003e= search_limit {\n        // No SOS found (or nothing left to scan): fall back to a simple footer\n        // search from wherever we stopped in the segment chain.  This handles\n        // minimal / truncated test fixtures that lack a formal SOS segment but\n        // still contain an EOI.\n        let end_offset = if scan_data_start \u003c search_limit {\n            let tail = \u0026buf[scan_data_start..search_limit];\n            find_first_pattern(tail, footer).map(|p| scan_data_start + p)\n        } else {\n            None\n        };\n        return JpegScanResult {\n            end_offset,\n            scan_data_start,\n            fragmentation_point: None,\n            sof_width,\n            sof_height,\n            has_restart_markers: false,\n        };\n    }\n\n    // ── Walk compressed scan data ────────────────────────────────────────────\n    let mut scan_pos = scan_data_start;\n    let mut has_restart_markers = false;\n    let mut fragmentation_point: Option\u003cusize\u003e = None;\n\n    while scan_pos \u003c search_limit {\n        if buf[scan_pos] == 0xFF \u0026\u0026 scan_pos + 1 \u003c search_limit {\n            match buf[scan_pos + 1] {\n                0x00 =\u003e {\n                    // Byte-stuffed FF — normal inside compressed data\n                    scan_pos += 2;\n                }\n                0xD0..=0xD7 =\u003e {\n                    // RST0–RST7 restart markers — normal inside compressed data\n                    has_restart_markers = true;\n                    scan_pos += 2;\n                }\n                0xD9 =\u003e {\n                    // EOI — clean end of image\n                    return JpegScanResult {\n                        end_offset: Some(scan_pos),\n                        scan_data_start,\n                        fragmentation_point: None,\n                        sof_width,\n                        sof_height,\n                        has_restart_markers,\n                    };\n                }\n                _ =\u003e {\n                    // Any other FF XX inside scan data is unexpected and suggests\n                    // a fragmentation boundary or corruption.\n                    fragmentation_point = Some(scan_pos);\n                    break;\n                }\n            }\n        } else {\n            scan_pos += 1;\n        }\n    }\n\n    JpegScanResult {\n        end_offset: None,\n        scan_data_start,\n        fragmentation_point,\n        sof_width,\n        sof_height,\n        has_restart_markers,\n    }\n}\n\n/// Find the appropriate JPEG end marker (FF D9) for this JPEG file.\n///\n/// Thin wrapper around [`analyze_jpeg`] kept for call sites that only need the\n/// EOI offset.\n#[allow(dead_code)]\npub fn find_jpeg_end_marker(buf: \u0026[u8], max_len: usize) -\u003e Option\u003cusize\u003e {\n    analyze_jpeg(buf, max_len).end_offset\n}\n\n/// Estimate a plausible upper-bound file size for a JPEG with the given\n/// pixel dimensions.\n///\n/// Uses 30 % of the uncompressed RGB byte count (`w × h × 3 × 0.30`).\n/// Even at the highest JPEG quality settings real compression ratios are\n/// well above 3.3×, so this ceiling is generous enough for any genuine\n/// image while still preventing multi-megabyte garbage when the actual\n/// content is only a few hundred kilobytes.\n///\n/// Returns `None` when either dimension is zero (no parseable SOF marker).\npub fn max_plausible_jpeg_size(w: u16, h: u16) -\u003e Option\u003cusize\u003e {\n    if w == 0 || h == 0 {\n        return None;\n    }\n    let uncompressed = (w as usize) * (h as usize) * 3;\n    // 30 % expressed as integer arithmetic: multiply by 3, divide by 10.\n    Some(uncompressed * 3 / 10)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // ── helpers ──────────────────────────────────────────────────────────────\n\n    /// Build a minimal valid JFIF JPEG with the supplied scan data.\n    fn build_jfif_jpeg(scan_data: \u0026[u8]) -\u003e Vec\u003cu8\u003e {\n        let mut buf = vec![\n            0xFF, 0xD8, 0xFF, 0xE0, // SOI + JFIF APP0 marker\n            0x00, 0x10, // APP0 segment length = 16\n            b'J', b'F', b'I', b'F', 0x00, // identifier\n            0x01, 0x01, 0x01, 0x00, 0x48, 0x00, 0x48, 0x00, 0x00,\n        ];\n        // DQT\n        buf.extend_from_slice(\u0026[0xFF, 0xDB, 0x00, 0x43]);\n        buf.extend(std::iter::repeat_n(0x10u8, 65));\n        // DHT\n        buf.extend_from_slice(\u0026[0xFF, 0xC4, 0x00, 0x1F]);\n        buf.extend(std::iter::repeat_n(0x00u8, 29));\n        // SOF0: precision=8, height=100, width=100, 3 components\n        buf.extend_from_slice(\u0026[\n            0xFF, 0xC0, 0x00, 0x11, // length = 17\n            0x08, // precision\n            0x00, 0x64, // height = 100\n            0x00, 0x64, // width = 100\n            0x03, // components\n            0x01, 0x11, 0x00, // component 1\n            0x02, 0x11, 0x01, // component 2\n            0x03, 0x11, 0x01, // component 3\n        ]);\n        // SOS header (minimal)\n        buf.extend_from_slice(\u0026[\n            0xFF, 0xDA, 0x00, 0x08, // length = 8\n            0x01, // 1 component\n            0x01, 0x00, // component selector\n            0x00, 0x3F, 0x00, // Ss, Se, Ah/Al\n        ]);\n        // compressed scan data\n        buf.extend_from_slice(scan_data);\n        buf\n    }\n\n    // ── analyze_jpeg tests ───────────────────────────────────────────────────\n\n    #[test]\n    fn test_analyze_jpeg_complete_jfif() {\n        let mut jpeg = build_jfif_jpeg(\u0026[0x12, 0x34, 0x56, 0x78]);\n        jpeg.extend_from_slice(\u0026[0xFF, 0xD9]); // EOI\n\n        let result = analyze_jpeg(\u0026jpeg, jpeg.len());\n        assert!(result.end_offset.is_some(), \"should find EOI\");\n        let eoi = result.end_offset.unwrap();\n        assert_eq!(\u0026jpeg[eoi..eoi + 2], \u0026[0xFF, 0xD9]);\n        assert_eq!(result.sof_width, Some(100));\n        assert_eq!(result.sof_height, Some(100));\n        assert!(!result.has_restart_markers);\n        assert!(result.fragmentation_point.is_none());\n    }\n\n    #[test]\n    fn test_analyze_jpeg_complete_with_restart_markers() {\n        let scan = [0x12, 0xFF, 0xD0, 0x34, 0xFF, 0xD1, 0x56]; // RST0 + RST1 in scan data\n        let mut jpeg = build_jfif_jpeg(\u0026scan);\n        jpeg.extend_from_slice(\u0026[0xFF, 0xD9]);\n\n        let result = analyze_jpeg(\u0026jpeg, jpeg.len());\n        assert!(result.end_offset.is_some());\n        assert!(result.has_restart_markers);\n    }\n\n    #[test]\n    fn test_analyze_jpeg_complete_with_stuffed_bytes() {\n        let scan = [0x12, 0xFF, 0x00, 0x34]; // FF 00 is a stuffed byte\n        let mut jpeg = build_jfif_jpeg(\u0026scan);\n        jpeg.extend_from_slice(\u0026[0xFF, 0xD9]);\n\n        let result = analyze_jpeg(\u0026jpeg, jpeg.len());\n        assert!(result.end_offset.is_some());\n        assert!(!result.has_restart_markers);\n    }\n\n    #[test]\n    fn test_analyze_jpeg_truncated_no_eoi() {\n        let jpeg = build_jfif_jpeg(\u0026[0x12, 0x34, 0x56, 0x78]);\n        // No EOI appended\n\n        let result = analyze_jpeg(\u0026jpeg, jpeg.len());\n        assert!(result.end_offset.is_none());\n        assert!(result.fragmentation_point.is_none()); // truncated, not fragmented\n        assert!(result.scan_data_start \u003e 0);\n    }\n\n    #[test]\n    fn test_analyze_jpeg_fragmented_unexpected_marker() {\n        // Scan data that contains a spurious non-RST marker (FF E0 = APP0)\n        let scan = [0x12, 0x34, 0xFF, 0xE0, 0x56, 0x78];\n        let jpeg = build_jfif_jpeg(\u0026scan);\n        // No EOI\n\n        let result = analyze_jpeg(\u0026jpeg, jpeg.len());\n        assert!(result.end_offset.is_none());\n        assert!(\n            result.fragmentation_point.is_some(),\n            \"should detect fragmentation point\"\n        );\n    }\n\n    #[test]\n    fn test_analyze_jpeg_sof_dimensions() {\n        let mut jpeg = build_jfif_jpeg(\u0026[0xAB]);\n        jpeg.extend_from_slice(\u0026[0xFF, 0xD9]);\n\n        let result = analyze_jpeg(\u0026jpeg, jpeg.len());\n        assert_eq!(result.sof_width, Some(100));\n        assert_eq!(result.sof_height, Some(100));\n    }\n\n    #[test]\n    fn test_analyze_jpeg_too_small() {\n        let result = analyze_jpeg(\u0026[0xFF, 0xD8, 0xFF], 100);\n        assert!(result.end_offset.is_none());\n    }\n\n    #[test]\n    fn test_analyze_jpeg_invalid_header() {\n        let data = vec![0xFF, 0xD8, 0xFF, 0xE2, 0x12, 0x34, 0xFF, 0xD9];\n        let result = analyze_jpeg(\u0026data, data.len());\n        // Falls back to simple search — should still find the footer\n        assert!(result.end_offset.is_some());\n        assert_eq!(result.end_offset.unwrap(), 6);\n    }\n\n    // ── find_jpeg_end_marker compatibility tests (original test-suite) ────────\n\n    #[test]\n    fn test_find_jpeg_end_marker_valid_jfif() {\n        let mut jpeg_data = vec![\n            0xFF, 0xD8, 0xFF, 0xE0, 0x00, 0x10, b'J', b'F', b'I', b'F', 0x00, 0x01, 0x01, 0x01,\n            0x00, 0x48, 0x00, 0x48, 0x00, 0x00, 0xFF, 0xDB, 0x00, 0x43,\n        ];\n        jpeg_data.extend(vec![0x00; 65]);\n        jpeg_data.extend_from_slice(\u0026[0xFF, 0xC4, 0x00, 0x1F]);\n        jpeg_data.extend(vec![0x00; 29]);\n        jpeg_data.extend_from_slice(\u0026[0x12, 0x34, 0x56, 0x78]);\n        jpeg_data.extend_from_slice(\u0026[0xFF, 0xD9]);\n\n        let result = find_jpeg_end_marker(\u0026jpeg_data, jpeg_data.len());\n        assert!(result.is_some());\n        let footer_pos = result.unwrap();\n        assert_eq!(\u0026jpeg_data[footer_pos..footer_pos + 2], \u0026[0xFF, 0xD9]);\n    }\n\n    #[test]\n    fn test_find_jpeg_end_marker_valid_exif() {\n        let mut jpeg_data = vec![\n            0xFF, 0xD8, 0xFF, 0xE1, 0x00, 0x16, b'E', b'x', b'i', b'f', 0x00, 0x00, 0x49, 0x49,\n            0x2A, 0x00, 0x08, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0xFF, 0xDB, 0x00, 0x43,\n        ];\n        jpeg_data.extend(vec![0x00; 65]);\n        jpeg_data.extend_from_slice(\u0026[0xFF, 0xC4, 0x00, 0x1F]);\n        jpeg_data.extend(vec![0x00; 29]);\n        jpeg_data.extend_from_slice(\u0026[0x12, 0x34]);\n        jpeg_data.extend_from_slice(\u0026[0xFF, 0xD9]);\n\n        let result = find_jpeg_end_marker(\u0026jpeg_data, jpeg_data.len());\n        assert!(result.is_some());\n    }\n\n    #[test]\n    fn test_find_jpeg_end_marker_invalid_header() {\n        let jpeg_data = vec![0xFF, 0xD8, 0xFF, 0xE2, 0x12, 0x34, 0xFF, 0xD9];\n        let result = find_jpeg_end_marker(\u0026jpeg_data, jpeg_data.len());\n        assert!(result.is_some());\n        assert_eq!(result.unwrap(), 6);\n    }\n\n    #[test]\n    fn test_find_jpeg_end_marker_too_small() {\n        let result = find_jpeg_end_marker(\u0026[0xFF, 0xD8, 0xFF], 100);\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn test_find_jpeg_end_marker_no_tables() {\n        let jpeg_data = vec![\n            0xFF, 0xD8, 0xFF, 0xE0, 0x00, 0x10, b'J', b'F', b'I', b'F', 0x00, 0x01, 0x01, 0x01,\n            0x00, 0x48, 0x00, 0x48, 0x00, 0x00, 0x12, 0x34, 0xFF, 0xD9,\n        ];\n        let result = find_jpeg_end_marker(\u0026jpeg_data, jpeg_data.len());\n        assert!(result.is_some());\n        let footer_pos = result.unwrap();\n        assert_eq!(\u0026jpeg_data[footer_pos..footer_pos + 2], \u0026[0xFF, 0xD9]);\n    }\n\n    #[test]\n    fn test_find_jpeg_end_marker_no_footer() {\n        let mut jpeg_data = vec![\n            0xFF, 0xD8, 0xFF, 0xE0, 0x00, 0x10, b'J', b'F', b'I', b'F', 0x00, 0x01, 0x01, 0x01,\n            0x00, 0x48, 0x00, 0x48, 0x00, 0x00, 0xFF, 0xDB, 0x00, 0x43,\n        ];\n        jpeg_data.extend(vec![0x00; 65]);\n        jpeg_data.extend_from_slice(\u0026[0xFF, 0xC4, 0x00, 0x1F]);\n        jpeg_data.extend(vec![0x00; 29]);\n        jpeg_data.extend_from_slice(\u0026[0x12, 0x34, 0x56, 0x78]);\n\n        let result = find_jpeg_end_marker(\u0026jpeg_data, jpeg_data.len());\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn test_find_first_pattern() {\n        let data = b\"Hello World\\xFF\\xD9End\";\n        let pattern = \u0026[0xFF, 0xD9];\n        assert_eq!(find_first_pattern(data, pattern), Some(11));\n    }\n\n    #[test]\n    fn test_find_first_pattern_not_found() {\n        let data = b\"Hello World End\";\n        let pattern = \u0026[0xFF, 0xD9];\n        assert_eq!(find_first_pattern(data, pattern), None);\n    }\n\n    #[test]\n    fn test_find_first_pattern_multiple_occurrences() {\n        let data = b\"AA\\xFF\\xD9BB\\xFF\\xD9CC\";\n        let pattern = \u0026[0xFF, 0xD9];\n        assert_eq!(find_first_pattern(data, pattern), Some(2));\n    }\n\n    // ── max_plausible_jpeg_size tests ─────────────────────────────────────────\n\n    #[test]\n    fn test_max_plausible_jpeg_size_typical() {\n        // 3264x2448 → uncompressed = 23,970,816 bytes → 30% ≈ 7,191,244\n        let result = max_plausible_jpeg_size(3264, 2448);\n        assert!(result.is_some());\n        let cap = result.unwrap();\n        // Should be well under the raw uncompressed size\n        assert!(cap \u003c 3264 * 2448 * 3);\n        // Should be above zero and reasonable\n        assert!(cap \u003e 1_000_000, \"cap={cap} should be \u003e 1MB for a 8MP image\");\n        assert!(\n            cap \u003c 10_000_000,\n            \"cap={cap} should be \u003c 10MB for a 8MP image\"\n        );\n    }\n\n    #[test]\n    fn test_max_plausible_jpeg_size_zero_width() {\n        assert_eq!(max_plausible_jpeg_size(0, 100), None);\n    }\n\n    #[test]\n    fn test_max_plausible_jpeg_size_zero_height() {\n        assert_eq!(max_plausible_jpeg_size(100, 0), None);\n    }\n\n    #[test]\n    fn test_max_plausible_jpeg_size_small_image() {\n        // 100x100 → uncompressed = 30,000 bytes → 30% = 9,000\n        let result = max_plausible_jpeg_size(100, 100);\n        assert_eq!(result, Some(9_000));\n    }\n}\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address
