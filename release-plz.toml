[workspace]
dependencies_update = true
git_release_enable = false   # release.yml handles GitHub releases on tag push
git_only = true              # use git tags as version source instead of crates.io
git_tag_name = "v{{ version }}"  # match existing tag format (v0.1.0 not utmost-cli-v0.1.0)

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/).

"""

body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/stevenwcarter/utmost-rs/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
"""

trim = true

[[changelog.commit_parsers]]
message = "^feat"
group = "Features"

[[changelog.commit_parsers]]
message = "^fix"
group = "Bug Fixes"

[[changelog.commit_parsers]]
message = "^perf"
group = "Performance"

[[changelog.commit_parsers]]
message = "^refactor"
group = "Refactoring"

[[changelog.commit_parsers]]
message = "^test"
group = "Testing"

[[changelog.commit_parsers]]
message = "^docs"
group = "Documentation"

[[changelog.commit_parsers]]
message = "^chore"
group = "Miscellaneous"
skip = true             # chore counts toward patch bump but is omitted from CHANGELOG

[[changelog.commit_parsers]]
message = "^ci"
skip = true

[[package]]
name = "utmost-lib"
git_release_enable = false
changelog_update = false   # single unified changelog lives at workspace root

[[package]]
name = "utmost-cli"
git_release_enable = false
changelog_path = "CHANGELOG.md"   # write to workspace root instead of crates/utmost-cli/
