[package]
name = "utmost"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.50", features = ["derive"] }
dotenvy = "0.15.7"
indicatif = "0.17"
tokio = { version = "1.48.0", features = [
    "full",
    "rt-multi-thread",
    "tracing",
] }
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
